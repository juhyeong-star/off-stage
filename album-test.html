<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>마이페이지 → 앨범 전환 테스트 · Off-Stage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Gaegu:wght@400;700&family=Caveat:wght@400;700&display=swap">
<link rel="preload" href="/fonts/Pretendard-Regular.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="/fonts/NanumJungShik.subset.woff2" as="font" type="font/woff2" crossorigin>
<style>
  @font-face{font-family:'Pretendard';font-style:normal;font-weight:400;font-display:swap;src:url('/fonts/Pretendard-Regular.ttf') format('truetype');}
  @font-face{font-family:'Nanum JungShik';font-style:normal;font-weight:400;font-display:block;src:url('/fonts/NanumJungShik.subset.woff2') format('woff2'),url('/fonts/NanumJungShik.ttf') format('truetype');}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
<link rel="stylesheet" href="css/global.css?v=798">
<style>
  /* ===== 테스트 전용: 두 화면 슬라이드 무대 + 디스코그래피 줄 ===== */
  html,body{margin:0;height:100%;background:#0b0916;overflow:hidden}
  /* reveal 애니메이션(앱은 IntersectionObserver로 in-view 부여) 무력화 → 바로 보이게 */
  .reveal{opacity:1!important;transform:none!important}
  #stage{position:fixed;inset:0;overflow:hidden}
  .screen{position:absolute;inset:0;overflow-y:auto;transition:transform .42s cubic-bezier(.4,0,.2,1)}
  #alScreen{transform:translateX(100%)}
  #stage.go #myScreen{transform:translateX(-26%)}
  #stage.go #alScreen{transform:translateX(0)}
  /* 좌상단 뒤로가기(앱과 비슷한 둥근 버튼) */
  .tb{position:absolute;top:16px;left:16px;z-index:30;width:44px;height:44px;border-radius:50%;
     background:rgba(18,16,28,.82);border:1px solid rgba(255,255,255,.14);color:#fff;font-size:24px;
     display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px)}
  .tb:active{transform:scale(.94)}
  /* 앨범 페이지는 왼쪽 정렬·넓게 (가운데 정렬 X) */
  #alScreen .sub-page.artist-page{padding:74px 30px 54px !important;max-width:none !important}
  /* 헤더 — 좌: 아바타+이름+소개+스탯+태그 / 우: 최신 데모 카드 (넓은 화면 우측 빈공간 채움) */
  .disc-hero{display:flex;align-items:flex-start;justify-content:space-between;gap:20px 30px;margin:0 0 16px;flex-wrap:wrap}
  .disc-hero-left{display:flex;align-items:flex-start;gap:16px;flex:1 1 460px;min-width:0}
  .disc-av{width:82px;height:82px;border-radius:50%;object-fit:cover;flex:0 0 auto;box-shadow:0 0 0 2px rgba(255,255,255,.14),0 6px 18px rgba(0,0,0,.4)}
  .disc-name{font-size:26px;font-weight:800;color:var(--text-primary);line-height:1.1;letter-spacing:-.3px}
  .disc-bio{font-size:13px;color:var(--text-secondary);margin-top:5px;line-height:1.45;max-width:460px}
  .disc-stats{margin-top:9px;display:flex;gap:9px;flex-wrap:wrap}
  .disc-stat{font-size:12.5px;font-weight:700;color:var(--text-secondary);background:rgba(255,255,255,.06);
     border:1px solid rgba(255,255,255,.1);padding:4px 11px;border-radius:999px}
  .disc-stat b{color:var(--text-primary);font-weight:800;margin-left:3px}
  .disc-stat.rel b{color:#fac775}
  .disc-tags{margin-top:9px;display:flex;gap:7px;flex-wrap:wrap}
  .disc-chip{font-size:12px;font-weight:700;color:#cdbcff;background:rgba(127,119,221,.15);
     border:1px solid rgba(127,119,221,.3);padding:3px 11px;border-radius:999px}
  /* 우측 최신 데모 카드 */
  .disc-feat{display:flex;align-items:center;gap:13px;background:var(--surface-color);border:1px solid var(--divider);
     border-radius:14px;padding:12px 15px;cursor:pointer;flex:0 1 380px;min-width:270px;transition:border-color .2s,transform .15s}
  .disc-feat:hover{border-color:rgba(127,119,221,.5);transform:translateY(-1px)}
  .disc-feat-cover{width:62px;height:62px;border-radius:10px;object-fit:cover;flex:0 0 auto;border:1px solid var(--divider)}
  .disc-feat-label{font-size:11px;font-weight:800;color:#ff6b6b;letter-spacing:.3px}
  .disc-feat-title{font-size:17px;font-weight:800;color:var(--text-primary);margin-top:3px;line-height:1.15}
  .disc-feat-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
  .disc-feat-play{margin-left:auto;width:42px;height:42px;border-radius:50%;background:var(--brand-color);color:#fff;
     border:none;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto}
  .disc-divider{height:1px;background:rgba(255,255,255,.1);margin:0 0 16px}
  .disc-secthead{max-width:none;margin:0 0 3px;padding:0;font-size:16px;font-weight:800;color:var(--text-primary);display:flex;align-items:center;gap:7px}
  .disc-secthead i{color:var(--brand-color)}
  .disc-count{font-size:13px;color:var(--text-secondary);font-weight:700}
  .disc-hint{max-width:none;margin:0 0 14px;padding:0;font-size:12.5px;color:var(--text-secondary)}
  /* 디스코그래피: 앨범마다 [마스터+데모] 한 줄, 세로 누적 — 왼쪽 정렬, 폭 꽉 */
  .disc-wrap{max-width:none;margin:0;padding:0 0 56px}
  .disc-album{padding:14px;border-radius:16px;margin-bottom:14px;border:1.5px solid transparent;
     background:var(--surface-color);transition:background .35s,border-color .35s}
  .disc-album.cur{background:rgba(127,119,221,.16);border-color:rgba(127,119,221,.6)}
  .disc-al-head{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
  .disc-al-title{font-size:16px;font-weight:800;color:var(--text-primary)}
  .disc-al-date{font-size:12px;color:var(--text-secondary)}
  .disc-here{margin-left:auto;font-size:11px;font-weight:800;color:#0b0916;background:#b5aef0;
     padding:3px 11px;border-radius:999px;opacity:0;transition:opacity .35s}
  .disc-album.cur .disc-here{opacity:1}
  /* 앨범 한 줄 = [마스터 정사각 커버] + [노란 데모 카드…] 가로, 앨범은 아래로 쌓임 */
  .disc-strip{display:flex;gap:14px;align-items:flex-start;overflow-x:auto;padding:4px 2px 10px;scrollbar-width:none}
  .disc-strip::-webkit-scrollbar{display:none}
  /* 마스터 = 정사각 커버. 크기는 JS 가 --mside 로 계산(항상 마스터+데모4=5개 맞춤) */
  .disc-master{flex:0 0 auto;box-sizing:border-box;position:relative;width:var(--mside,170px);height:var(--mside,170px);
     border:1.5px solid #111;border-radius:2px;box-shadow:2px 2px 0 #111;background:#FFF59D;overflow:hidden;cursor:pointer}
  .disc-master img{width:100%;height:100%;object-fit:cover;display:block}
  .disc-mchip{position:absolute;left:7px;top:7px;font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;
     background:#fac775;color:#3a2a00;z-index:2}
  .disc-mchip.off{background:rgba(0,0,0,.62);color:#fff}
  /* 데모 = 노란 데모카드. 폭 --dw, 높이 --mside(마스터와 정렬). 둘 다 JS 가 화면폭에 맞춰 계산 */
  .disc-demo{flex:0 0 var(--dw,290px);box-sizing:border-box;width:var(--dw,290px);height:var(--mside,170px);
     position:relative;display:flex;flex-direction:column;background:#FFE500;border:1.5px solid #111;border-radius:2px;
     box-shadow:2px 2px 0 #111;padding:11px 14px;color:#111;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s}
  .disc-demo:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 #111}
  .disc-dtop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}
  .disc-dtag{font:800 15px 'Inter',sans-serif;color:#B5575A;letter-spacing:.3px;text-transform:uppercase;line-height:1}
  .disc-ddate{font:600 10.5px 'Inter',sans-serif;color:#111;opacity:.5;white-space:nowrap}
  .disc-dtitle{font:700 15px 'Pretendard',sans-serif;color:#111;line-height:1.3;
     display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .disc-dfoot{margin-top:auto;text-align:right}
  .disc-dmore{font:700 12px 'Inter',sans-serif;color:rgba(17,17,17,.5)}
  /* 재생 표시 — 초록 테두리 + 이퀄라이저 */
  .disc-demo.play,.disc-master.play{outline:2.5px solid #1DB954;outline-offset:2px}
  .disc-eq{position:absolute;right:9px;bottom:9px;display:none;align-items:flex-end;gap:3px;height:18px;z-index:4}
  .disc-eq i{width:3px;background:#111;border-radius:1px;height:5px;animation:dceq .8s ease-in-out infinite}
  .disc-eq i:nth-child(2){animation-delay:.18s}.disc-eq i:nth-child(3){animation-delay:.36s}.disc-eq i:nth-child(4){animation-delay:.54s}
  @keyframes dceq{0%,100%{height:5px}50%{height:18px}}
  .disc-demo.play .disc-eq,.disc-master.play .disc-eq{display:flex}
</style>
</head>
<body>
<div id="stage">

  <!-- ===================== 화면 1 : 마이페이지(현재 앱 그대로) ===================== -->
  <section class="screen" id="myScreen">
    <button class="tb" title="뒤로"><i class="ri-arrow-left-s-line"></i></button>
    <div class="artist-canvas cosmic">
      <div class="artist-bg-deco"></div>
      <div class="sub-page artist-page">

        <div class="artist-header-row reveal">
          <div class="artist-strip">
            <div class="artist-id">
              <div class="artist-avatar-wrap">
                <img src="https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?w=300&h=300&fit=crop" class="artist-avatar" alt="뮤덕1호">
              </div>
              <div class="artist-id-text">
                <div class="artist-name-row">
                  <h1>뮤덕1호</h1>
                  <button class="follow-btn-inline" type="button"><i class="ri-user-add-line"></i> 팔로우</button>
                </div>
                <div class="artist-follow-chips">
                  <button class="follow-chip" type="button"><i class="ri-group-line"></i> 팔로워 <strong>0</strong></button>
                  <button class="follow-chip" type="button"><i class="ri-user-3-line"></i> 팔로잉 <strong>0</strong></button>
                  <button class="follow-chip follow-chip-msg follow-chip-msg-dm" type="button"><i class="ri-mail-send-fill"></i> 메시지</button>
                </div>
                <div class="artist-bio-inline"><span class="artist-bio-text">덕질: 2016.07.27~Present</span></div>
              </div>
            </div>
          </div>
        </div>

        <div class="artist-content-tabs reveal" style="margin-top:28px;">
          <button type="button" class="content-tab active" data-content-tab="music"><i class="ri-music-2-fill"></i> 음악</button>
        </div>

        <div class="artist-content-pane" data-content-tab="music">
          <div class="atl-page">

            <!-- 최신 데모 hero -->
            <div class="atl-section-head" style="margin-top:18px;">
              <div class="atl-section-title"><i class="ri-fire-fill" style="color:#ff6b6b;"></i> 최신 데모</div>
            </div>
            <div class="atl-hero reveal" onclick="open_(0)">
              <img class="atl-hero-cover" id="heroCover" src="" alt="">
              <div class="atl-hero-info">
                <span class="atl-hero-badge">I Am Changing</span>
                <div class="atl-hero-title">I Am Changing</div>
                <div class="atl-hero-sub">뮤덕1호</div>
                <div class="atl-hero-actions">
                  <button class="atl-hero-play" type="button" onclick="event.stopPropagation();" aria-label="재생"><i class="ri-play-fill"></i></button>
                </div>
              </div>
            </div>

            <!-- 음악(앨범 카드 선반) — 누르면 앨범 페이지로 -->
            <div class="atl-section-head">
              <div class="atl-section-title"><i class="ri-album-fill" style="color:var(--brand-color);"></i> 음악</div>
            </div>
            <div class="atl-albums reveal" id="shelf"></div>

            <!-- 주절주절 -->
            <div class="atl-divider"></div>
            <div class="atl-feed-head"><i class="ri-chat-smile-2-line" style="color:var(--brand-color);"></i> 주절주절</div>
            <div class="atl-feed-empty">아직 주절주절이 없어요.</div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- ===================== 화면 2 : 앨범 페이지(전체 디스코그래피) ===================== -->
  <section class="screen" id="alScreen">
    <button class="tb" onclick="back_()" title="뒤로"><i class="ri-arrow-left-s-line"></i></button>
    <div class="artist-canvas cosmic">
      <div class="artist-bg-deco"></div>
      <div class="sub-page artist-page" style="padding-top:0;">
        <div class="disc-hero">
          <div class="disc-hero-left">
            <img class="disc-av" src="https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?w=200&h=200&fit=crop" alt="뮤덕1호">
            <div>
              <div class="disc-name">뮤덕1호</div>
              <div class="disc-bio">늦은 밤, 혼자 만든 데모와 정규를 차곡차곡 모아둔 작업실 🎧</div>
              <div class="disc-stats" id="discStats"></div>
              <div class="disc-tags" id="discTags"></div>
            </div>
          </div>
          <div class="disc-feat" id="discFeat">
            <img class="disc-feat-cover" id="featCover" src="" alt="">
            <div>
              <div class="disc-feat-label">🔥 최신 데모</div>
              <div class="disc-feat-title" id="featTitle"></div>
              <div class="disc-feat-sub" id="featSub"></div>
            </div>
            <button class="disc-feat-play" onclick="event.stopPropagation();"><i class="ri-play-fill"></i></button>
          </div>
        </div>
        <div class="disc-divider"></div>
        <div class="disc-secthead"><i class="ri-album-fill"></i> 음악 <span class="disc-count" id="discCount"></span></div>
        <div class="disc-hint">마이페이지에서 누른 곡 줄로 스크롤됩니다 · 카드를 누르면 재생</div>
        <div class="disc-wrap" id="discog"></div>
      </div>
    </div>
  </section>

</div>

<script>
// Coming Soon 커버 — 실제 앱과 동일한 SVG
var CS='data:image/svg+xml;utf8,'+encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">'+
  '<rect width="500" height="500" fill="#FFF59D"/>'+
  '<rect x="200" y="0" width="100" height="22" fill="rgba(255,255,255,0.55)"/>'+
  '<g transform="rotate(-3 250 260)" font-family="Comic Sans MS, Gaegu, cursive" font-weight="800" fill="#3a2a00" text-anchor="middle">'+
  '<text x="250" y="250" font-size="62">Coming</text><text x="250" y="322" font-size="62">Soon...</text></g></svg>');

// 뮤덕1호의 음악(최신순). master=정규발매 여부, demos=데모 수. (현재 앱처럼 커버는 전부 Coming Soon)
var ALBUMS=[
  {t:'I Am Changing', date:'2024.05', master:false, demos:2},
  {t:'밤하늘 한 조각',  date:'2024.02', master:true,  demos:4},
  {t:'첫 무대',        date:'2023.10', master:true,  demos:1},
  {t:'연습실에서',      date:'2023.07', master:false, demos:5},
  {t:'데뷔 전야',       date:'2023.04', master:true,  demos:3}
];

function shelfMeta(a){ return a.master ? (a.demos? '정규 · 데모 '+a.demos : '정규') : '데모 '+a.demos+'개'; }
var EQ='<span class="disc-eq"><i></i><i></i><i></i><i></i></span>';
// 마스터 = 정사각 Coming Soon 커버(앨범 대표). 발매/미발매 칩.
function masterHtml(a){
  return '<div class="disc-master" onclick="play_(this)">'+
    '<img src="'+CS+'" alt="">'+
    '<span class="disc-mchip'+(a.master?'':' off')+'">'+(a.master?'발매':'미발매')+'</span>'+EQ+'</div>';
}
// 데모 = 앱 노란 데모카드 모양(전용 클래스). 제목 줄 = 곡 제목.
function demoCardHtml(a,n){
  return '<div class="disc-demo" onclick="play_(this)">'+
    '<div class="disc-dtop"><span class="disc-dtag">DEMO '+n+'</span>'+
    '<span class="disc-ddate">· '+a.date+'</span></div>'+
    '<div class="disc-dtitle">'+a.t+'</div>'+
    '<div class="disc-dfoot"><span class="disc-dmore">💬 댓글 달기</span></div>'+
    EQ+'</div>';
}
function build(){
  document.getElementById('heroCover').src=CS;
  var shelf='', dis='';
  ALBUMS.forEach(function(a,i){
    shelf+='<div class="atl-album" onclick="open_('+i+')"><img class="atl-album-cover" src="'+CS+'" loading="lazy">'+
      '<div class="atl-album-title">'+a.t+'</div><div class="atl-album-meta">'+shelfMeta(a)+'</div></div>';
    var covers=masterHtml(a);
    for(var n=a.demos;n>=1;n--) covers+=demoCardHtml(a,n);
    dis+='<div class="disc-album" id="A'+i+'"><div class="disc-al-head">'+
      '<span class="disc-al-title">'+a.t+'</span><span class="disc-al-date">'+a.date+'</span>'+
      '<span class="disc-here">여기</span></div><div class="disc-strip">'+covers+'</div></div>';
  });
  document.getElementById('shelf').innerHTML=shelf;
  document.getElementById('discog').innerHTML=dis;
  // 헤더 스탯: 앨범/데모/발매 수
  var nAlb=ALBUMS.length;
  var nDemo=ALBUMS.reduce(function(s,a){return s+a.demos;},0);
  var nRel=ALBUMS.filter(function(a){return a.master;}).length;
  document.getElementById('discStats').innerHTML=
    '<span class="disc-stat">앨범<b>'+nAlb+'</b></span>'+
    '<span class="disc-stat">데모<b>'+nDemo+'</b></span>'+
    '<span class="disc-stat rel">발매<b>'+nRel+'</b></span>'+
    '<span class="disc-stat">덕질<b style="font-weight:700">2016~</b></span>';
  document.getElementById('discCount').textContent=nAlb;
  // 해시태그
  document.getElementById('discTags').innerHTML=
    ['자작곡','발라드','늦은밤','홈레코딩'].map(function(t){return '<span class="disc-chip">#'+t+'</span>';}).join('');
  // 최신 데모 카드 = 가장 최근 앨범(ALBUMS[0])
  var L=ALBUMS[0];
  document.getElementById('featCover').src=CS;
  document.getElementById('featTitle').textContent=L.t;
  document.getElementById('featSub').textContent='DEMO '+L.demos+' · '+L.date;
  document.getElementById('discFeat').onclick=function(){ open_(0); };
}
build();

// 카드 크기 반응형 — 화면폭에 맞춰 '마스터 + 데모 4 = 5개'가 딱 들어가게 계산
function sizeCards(){
  var album=document.querySelector('.disc-album');
  if(!album) return;
  var avail=album.clientWidth - 28;        // .disc-album 좌우 패딩 14*2
  var gap=14, ar=1.7;                       // 데모카드 가로:세로 = 1.7 : 1
  // s(마스터변) + 4*(ar*s)(데모폭) + 4*gap = avail  →  s=(avail-4gap)/(1+4ar)
  var s=(avail - 4*gap)/(1 + 4*ar);
  s=Math.max(104, Math.min(s, 208));        // 너무 작/크지 않게 클램프
  document.documentElement.style.setProperty('--mside', Math.round(s)+'px');
  document.documentElement.style.setProperty('--dw', Math.round(ar*s)+'px');
}
sizeCards();
window.addEventListener('resize', sizeCards);

function open_(i){
  sizeCards();
  document.getElementById('stage').classList.add('go');
  var al=document.getElementById('alScreen');
  [].forEach.call(document.querySelectorAll('.disc-album'),function(d){d.classList.remove('cur')});
  var t=document.getElementById('A'+i);
  if(t){
    t.classList.add('cur');
    setTimeout(function(){
      var top=t.getBoundingClientRect().top - al.getBoundingClientRect().top + al.scrollTop - 66;
      al.scrollTo({top:Math.max(0,top),behavior:'smooth'});
    },460);
  }
}
function back_(){ document.getElementById('stage').classList.remove('go'); }
function play_(el){
  [].forEach.call(document.querySelectorAll('.disc-demo.play,.disc-master.play'),function(c){c.classList.remove('play')});
  el.classList.add('play');
}
</script>
