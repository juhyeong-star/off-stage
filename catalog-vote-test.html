<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>카탈로그 · 투표 시안 (TEST)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#17131a; --ink:#f4f1e8; --line:#FF3B3B;
    --y:#FFD24A; --p:#E24A9C; --t:#26C6C6; --b:#45CEEB; --v:#B49BEE; --g:#8BE04B;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:
      radial-gradient(circle at 12% 0%, rgba(255,59,59,.18), transparent 40%),
      radial-gradient(circle at 90% 8%, rgba(69,206,235,.12), transparent 45%),
      var(--bg);
    color:var(--ink); font-family:'Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
    padding:18px 14px 90px; min-height:100vh;
  }
  .brand{font-family:'Black Han Sans',sans-serif; font-size:12px; letter-spacing:1px; opacity:.5; margin:0 0 2px;}
  h1{font-family:'Black Han Sans',sans-serif; font-size:30px; margin:0 0 4px; line-height:1.05;}
  h1 .em{color:var(--y);}
  .sub{font-size:12.5px; opacity:.6; margin:0 0 20px;}

  /* 카테고리(투표 섹션) */
  .cat{margin:0 0 26px; position:relative;}
  .cat-pill{
    display:inline-block; background:var(--ink); color:#141018;
    font-weight:800; font-size:15px; padding:7px 16px; border-radius:999px;
    box-shadow:3px 3px 0 rgba(0,0,0,.5); position:relative; z-index:2; margin-left:6px;
  }
  .cat-box{
    border:2.5px solid var(--line); border-radius:14px; margin-top:-14px; padding:22px 12px 14px;
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
    box-shadow:0 0 0 1px rgba(255,59,59,.25), 0 8px 24px rgba(0,0,0,.4);
    background:rgba(255,255,255,.02);
  }
  /* 카드 */
  .card{position:relative; cursor:pointer; transition:transform .12s;}
  .card:active{transform:scale(.97);}
  .thumb-wrap{position:relative;}
  .thumb{
    aspect-ratio:1/1; border-radius:10px; overflow:hidden; position:relative;
    border:2px solid #111; box-shadow:3px 3px 0 #111;
    display:flex; align-items:center; justify-content:center; padding:8px 8px 22px;
  }
  .thumb .cover-note{font-family:'Black Han Sans',sans-serif; font-size:30px; color:rgba(0,0,0,.8); line-height:.95; text-align:center;}
  .label{
    position:absolute; left:8px; bottom:-10px; background:var(--ink); color:#141018;
    font-weight:800; font-size:12px; padding:4px 10px; border-radius:6px; z-index:5;
    max-width:calc(100% - 16px); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    box-shadow:2px 2px 0 rgba(0,0,0,.5);
  }
  .meta{margin:18px 4px 0; display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .artist{font-size:12px; opacity:.72; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  /* 투표 버튼 */
  .vote{
    display:inline-flex; align-items:center; gap:5px; flex-shrink:0;
    background:#211b26; border:1.5px solid #3a3040; color:var(--ink);
    padding:4px 10px; border-radius:999px; font-weight:800; font-size:12px; cursor:pointer;
    transition:transform .1s, background .15s, border-color .15s;
  }
  .vote .up{font-size:11px; transform:translateY(-1px);}
  .vote.voted{background:var(--y); color:#141018; border-color:var(--y);}
  .vote:active{transform:scale(.9);}
  /* 랭킹 왕관 */
  .rank{
    position:absolute; top:-10px; right:-6px; z-index:4; font-size:20px;
    filter:drop-shadow(1px 1px 0 rgba(0,0,0,.6));
  }
  .cat-foot{font-size:11.5px; opacity:.5; margin:10px 6px 0;}

  /* 하단 안내바 */
  .note{
    position:fixed; left:0; right:0; bottom:0; padding:10px 16px; text-align:center;
    background:rgba(20,16,24,.92); border-top:1px solid rgba(255,255,255,.08);
    font-size:11.5px; opacity:.85; backdrop-filter:blur(6px);
  }
  .note b{color:var(--y);}
</style>
</head>
<body>
  <p class="brand">OFF-STAGE · 시안</p>
  <h1><span class="em">이달의</span> 투표 🗳</h1>
  <p class="sub">테마별로 곡을 모아두고, ▲를 눌러 투표해요. (프로토타입 · 실제 데이터 아님)</p>

  <div id="app"></div>

  <div class="note"><b>TEST</b> — 실제 사이트엔 영향 없어요. 이 컨셉이 괜찮으면 메인에 적용합니다.</div>

<script>
const COLORS = ['#FFD24A','#E24A9C','#26C6C6','#45CEEB','#B49BEE','#8BE04B','#F06CA8','#FF8A5C'];
const CATS = [
  { name:'6월 월평 투표', foot:'6월에 올라온 작곡 과제 중 이달의 곡을 뽑아요',
    items:[
      {t:'꿈속에서',    a:'조연우',   note:'월평', v:42},
      {t:'Stellar Cycle',a:'전아름',  note:'궤적', v:38},
      {t:'지하철 노선도', a:'한승수',  note:'감기', v:27},
      {t:'이면',        a:'임설아',   note:'발라드', v:19},
    ]},
  { name:'이달의 데모 투표', foot:'가장 응원받은 미완성 데모가 다음 마스터 후보로',
    items:[
      {t:'lover of my life', a:'DJ KARLIN', note:'✏', v:31},
      {t:'Deep house', a:'DJ KARLIN', note:'✏', v:22},
      {t:'몽환 사운드', a:'조연우', note:'✏', v:16},
    ]},
  { name:'밴드 음악 투표', foot:'밴드 편성 곡만 모아서 한판',
    items:[
      {t:'푸르름',   a:'전아름', note:'밴드', v:35},
      {t:'짝사랑 중독', a:'파워레인저', note:'ROCK', v:28},
      {t:'15살차이연애', a:'승빈', note:'인디', v:12},
    ]},
];

function render(){
  const app = document.getElementById('app');
  app.innerHTML = CATS.map((cat, ci) => {
    // 투표수 내림차순으로 정렬해 1위 왕관
    const ranked = cat.items.map((it,i)=>({...it,_i:i})).sort((a,b)=>b.v-a.v);
    const topId = ranked[0]._i;
    const cards = cat.items.map((it,i)=>{
      const c1 = COLORS[(ci*3+i)%COLORS.length];
      const c2 = COLORS[(ci*3+i+3)%COLORS.length];
      const crown = (i===topId) ? '<div class="rank">👑</div>' : '';
      return `
        <div class="card">
          ${crown}
          <div class="thumb-wrap">
            <div class="thumb" style="background:linear-gradient(150deg,${c1},${c2});">
              <span class="cover-note">${it.note||''}</span>
            </div>
            <span class="label">「${it.t}」</span>
          </div>
          <div class="meta">
            <span class="artist">— ${it.a}</span>
            <button class="vote" data-c="${ci}" data-i="${i}"><span class="up">▲</span><span class="cnt">${it.v}</span></button>
          </div>
        </div>`;
    }).join('');
    return `
      <section class="cat">
        <span class="cat-pill">🗳 ${cat.name}</span>
        <div class="cat-box">${cards}</div>
        <p class="cat-foot">${cat.foot}</p>
      </section>`;
  }).join('');

  app.querySelectorAll('.vote').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const ci=+btn.dataset.c, i=+btn.dataset.i;
      if(btn.classList.contains('voted')){ CATS[ci].items[i].v--; btn.classList.remove('voted'); }
      else { CATS[ci].items[i].v++; btn.classList.add('voted'); }
      render(); // 재정렬 + 왕관 갱신
    });
  });
}
render();
</script>
</body>
</html>
