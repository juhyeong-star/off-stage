<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>카탈로그 · 투표 시안 (TEST)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#45CEEB;          /* 기존 메인(발견) 하늘색 배경 유지 */
    --ink:#111;
    --line:#FF3B3B;        /* 카테고리 박스 빨간 라인 */
    --y:#FFE800;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
    padding:16px 12px 96px; min-height:100vh; overflow-x:hidden;
  }
  /* 워드마크 — 기존 '슬로우 뮤직' 톤 */
  h1{
    font-family:'Black Han Sans',sans-serif; font-size:34px; margin:2px 0 2px;
    color:var(--y); text-shadow:2px 3px 0 rgba(0,0,0,.25); letter-spacing:1px;
  }
  .sub{font-size:12.5px; color:rgba(0,0,0,.55); margin:0 0 18px; font-weight:600;}

  /* ── 카테고리 줄 ── */
  .cat{margin:0 0 30px; position:relative;}
  .cat-pill{
    display:inline-block; background:#fff; color:#111;
    font-weight:900; font-size:15px; padding:7px 16px; border-radius:10px;
    border:2px solid #111; box-shadow:3px 3px 0 #111;
    position:relative; z-index:3; margin-left:8px;
  }
  .cat-box{
    border:3px solid var(--line); border-radius:16px; margin-top:-16px;
    padding:30px 10px 18px;
    display:flex; flex-wrap:wrap; align-items:center; justify-content:center;
    gap:6px 4px; min-height:170px;
    background:rgba(255,255,255,.10);
  }
  .cat-foot{font-size:11.5px; color:rgba(0,0,0,.5); margin:8px 8px 0; font-weight:600;}

  /* ── 도형 (투표할수록 커짐) ── */
  .shape{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; cursor:pointer; position:relative; flex-shrink:0;
    font-weight:800; line-height:1.25; color:#111;
    transition:width .35s cubic-bezier(.34,1.56,.64,1), height .35s cubic-bezier(.34,1.56,.64,1), font-size .35s;
    user-select:none;
  }
  .shape:active{transform:scale(.93);}
  /* 배경 레이어에만 clip-path — 글씨/숫자는 안 잘림 */
  .shape .bg{
    position:absolute; inset:0; z-index:1;
    background:var(--shape-color,#E24A9C);
    filter:drop-shadow(2px 3px 0 rgba(0,0,0,.22));
  }
  .shape .tags{position:relative; z-index:2; padding:4px;}
  .shape .cnt{
    position:relative; z-index:2; margin-top:3px;
    background:rgba(0,0,0,.78); color:#fff;
    font-size:11px; font-weight:900; padding:2px 9px; border-radius:999px;
    box-shadow:1px 1px 0 rgba(0,0,0,.3);
  }
  .shape.voted .cnt{background:#111; color:var(--y);}
  /* 도형 모양들 (배경 레이어에 적용) */
  .s-circle .bg{border-radius:50%;}
  .s-tri .bg{clip-path:polygon(50% 0, 100% 100%, 0 100%);}
  .s-tri .tags{padding-top:26%;}
  .s-star .bg{clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}
  .s-hex .bg{clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%);}
  .s-square .bg{border-radius:14px;}
  .s-blob .bg{border-radius:58% 42% 55% 45% / 48% 55% 45% 52%;}
  /* 1위 왕관 */
  .crown{position:absolute; top:-14px; left:50%; transform:translateX(-50%); font-size:22px; z-index:5;
    filter:drop-shadow(1px 2px 0 rgba(0,0,0,.4));}
  /* 투표 팡 애니메이션 */
  @keyframes pop{ 0%{transform:scale(1);} 40%{transform:scale(1.12);} 100%{transform:scale(1);} }
  .shape.pop{animation:pop .35s ease-out;}

  .note{
    position:fixed; left:0; right:0; bottom:0; padding:10px 16px; text-align:center;
    background:rgba(0,0,0,.85); color:#fff; font-size:11.5px; z-index:50;
  }
  .note b{color:var(--y);}
</style>
</head>
<body>
  <h1>슬로우 뮤직</h1>
  <p class="sub">도형을 누르면 투표! 투표가 쌓일수록 도형이 커져요 🗳 (프로토타입)</p>

  <div id="app"></div>

  <div class="note"><b>TEST</b> — 실제 사이트엔 영향 없어요. 도형을 눌러보세요 → 커집니다!</div>

<script>
const SHAPES = ['s-circle','s-tri','s-star','s-hex','s-square','s-blob'];
const COLORS = ['#E24A9C','#FFD24A','#8BE04B','#B49BEE','#FF8A5C','#26C6C6','#F06CA8','#5B7CFA'];

const CATS = [
  { name:'6월 월평 투표', foot:'6월 작곡 과제 중 이달의 곡을 뽑아요',
    items:[
      {tags:['#조연우','#월평','#꿈속'], v:18},
      {tags:['#전아름','#궤적','#푸가'], v:12},
      {tags:['#한승수','#지하철노선도','#감기'], v:8},
      {tags:['#임설아','#이면','#발라드'], v:5},
      {tags:['#김이든','#문틈'], v:3},
    ]},
  { name:'이달의 데모 투표', foot:'가장 응원받은 데모가 다음 마스터 후보로',
    items:[
      {tags:['#DJKARLIN','#lover'], v:14},
      {tags:['#조연우','#몽환'], v:9},
      {tags:['#DeepHouse','#런던'], v:6},
      {tags:['#박승빈','#첫데모'], v:2},
    ]},
  { name:'밴드 음악 투표', foot:'밴드 편성 곡만 모아서 한판',
    items:[
      {tags:['#푸르름','#휴게이징'], v:16},
      {tags:['#파워레인저','#ROCK'], v:11},
      {tags:['#짝사랑','#중독'], v:7},
      {tags:['#15살차이연애','#인디'], v:4},
      {tags:['#자우림','#밴드'], v:6},
      {tags:['#트로트','#7080'], v:2},
    ]},
];

// 투표수 → 도형 크기 (px). 기본 86, 표당 +3.5, 최대 190
function sizeOf(v){ return Math.min(86 + v*3.5, 190); }
// 크기에 비례한 글자 크기
function fontOf(v){ return Math.min(10 + v*0.28, 16); }

function render(){
  const app=document.getElementById('app');
  app.innerHTML = CATS.map((cat,ci)=>{
    const top = cat.items.reduce((m,it,i)=> it.v>cat.items[m].v? i:m, 0);
    const shapes = cat.items.map((it,i)=>{
      const shape = SHAPES[(ci*2+i)%SHAPES.length];
      const color = COLORS[(ci*3+i)%COLORS.length];
      const s = sizeOf(it.v), f = fontOf(it.v);
      const crown = i===top ? '<span class="crown">👑</span>' : '';
      return `
        <div class="shape ${shape} ${it._voted?'voted':''}" data-c="${ci}" data-i="${i}"
             style="width:${s}px;height:${s}px;--shape-color:${color};font-size:${f}px;">
          <span class="bg"></span>
          ${crown}
          <span class="tags">${it.tags.join('<br>')}</span>
          <span class="cnt">▲ ${it.v}</span>
        </div>`;
    }).join('');
    return `
      <section class="cat">
        <span class="cat-pill">🗳 ${cat.name}</span>
        <div class="cat-box">${shapes}</div>
        <p class="cat-foot">${cat.foot}</p>
      </section>`;
  }).join('');

  app.querySelectorAll('.shape').forEach(el=>{
    el.addEventListener('click', ()=>{
      const ci=+el.dataset.c, i=+el.dataset.i;
      const it=CATS[ci].items[i];
      if(it._voted){ it.v--; it._voted=false; }
      else { it.v++; it._voted=true; }
      render();
      // 방금 누른 도형에 팡 효과
      const again=app.querySelector(`.shape[data-c="${ci}"][data-i="${i}"]`);
      if(again) again.classList.add('pop');
    });
  });
}
render();
</script>
</body>
</html>
