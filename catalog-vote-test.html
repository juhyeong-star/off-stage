<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>카탈로그 · 투표 시안 (TEST)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#45CEEB; --ink:#111; --y:#FFE800; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
    padding:12px 10px 90px; min-height:100vh; overflow-x:hidden; position:relative;
  }
  /* ── 배경: 큰 도형 은은히 + 하늘에서 떨어지는 작은 도형 ── */
  .bg-layer{position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0;}
  .bg-big{position:absolute; opacity:.22; filter:blur(.3px);}
  .fall{position:absolute; top:0; width:var(--fw,26px); height:var(--fw,26px); animation:fall linear infinite; opacity:.92;}
  .fall>i,.bg-big>i{display:block; width:100%; height:100%; background:var(--fc,#E24A9C); filter:drop-shadow(1px 2px 0 rgba(0,0,0,.15));}
  .c-circle>i{border-radius:50%;}
  .c-square>i{border-radius:6px;}
  .c-blob>i{border-radius:58% 42% 55% 45% / 48% 55% 45% 52%;}
  .c-star>i{clip-path:polygon(50% 0%,71% 21%,98% 35%,84% 61%,79% 91%,50% 86%,21% 91%,16% 61%,2% 35%,29% 21%);}
  .c-hex>i{clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%);}
  @keyframes fall{0%{transform:translateY(-14vh) rotate(-12deg);opacity:0;}8%{opacity:.92;}90%{opacity:.92;}100%{transform:translateY(116vh) rotate(200deg);opacity:0;}}
  h1,.sub,#app{position:relative; z-index:2;}

  h1{font-family:'Black Han Sans',sans-serif; font-size:30px; margin:2px 0 0;
    color:var(--y); text-shadow:2px 3px 0 rgba(0,0,0,.25); letter-spacing:1px;}
  .sub{font-size:12px; color:rgba(0,0,0,.55); margin:2px 0 14px; font-weight:700;}

  /* ── 카테고리 — 정사각형 칸 (모바일 한눈에) ── */
  .cat{margin:0 0 24px; position:relative;}
  .cat-pill{display:inline-block; background:#fff; color:#111; font-weight:900; font-size:15px;
    padding:7px 16px; border-radius:10px; border:2px solid #111; box-shadow:3px 3px 0 #111;
    position:relative; z-index:10; margin-left:8px;}
  .cat-box{
    border:3px dashed rgba(255,255,255,.95); border-radius:18px; margin-top:-16px;
    position:relative; overflow:hidden;
    aspect-ratio:1/.86; height:auto; max-height:min(52vh,380px);  /* 세로 더 줄임 — 한눈에 */
    background:rgba(255,255,255,.08);
  }
  /* 칸 하단 카운트다운 — 박스 안 아래 가운데 흰색 */
  .cd-strip{
    position:absolute; left:0; right:0; bottom:0; z-index:9;
    display:flex; align-items:center; justify-content:center; gap:7px;
    padding:6px 10px 8px;
    background:linear-gradient(0deg, rgba(0,0,0,.30), rgba(0,0,0,0));
    pointer-events:none;
  }
  .cd-strip .lab{font-size:10.5px; font-weight:800; color:rgba(255,255,255,.92); text-shadow:0 1px 3px rgba(0,0,0,.5);}
  .cd-strip .tm{font-family:'Black Han Sans',sans-serif; color:#fff; font-size:19px; line-height:1;
    text-shadow:0 2px 6px rgba(0,0,0,.55);}
  .cd-strip .tm small{font-family:'Pretendard',sans-serif; font-size:11px; font-weight:800; opacity:.9; margin-right:3px;}
  .cd-strip .tm .colon{opacity:.55; padding:0 1px;}

  /* ── 떠다니는 투표 도형 ── */
  .shape{position:absolute; left:0; top:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; cursor:pointer;
    font-weight:800; line-height:1.22; color:#111; user-select:none; will-change:transform;}
  .shape .bg{position:absolute; inset:0; z-index:1; background:var(--shape-color,#E24A9C);
    filter:drop-shadow(2px 3px 0 rgba(0,0,0,.2)); transition:filter .2s;}
  .shape .tags{position:relative; z-index:2; padding:4px; pointer-events:none;}
  .shape .tg{pointer-events:auto; cursor:pointer; border-radius:4px; transition:background .12s;}
  .shape .tg:hover,.shape .tg:active{background:rgba(255,255,255,.35); text-decoration:underline;}
  .s-circle .bg{border-radius:50%;}
  .s-star .bg{clip-path:polygon(50% 0%,71% 21%,98% 35%,84% 61%,79% 91%,50% 86%,21% 91%,16% 61%,2% 35%,29% 21%);}
  .s-star .tags{padding-top:8%;}
  .s-hex .bg{clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%);}
  .s-square .bg{border-radius:16px;}
  .s-blob .bg{border-radius:58% 42% 55% 45% / 48% 55% 45% 52%;}

  /* 투표수 — 상위 1·2위만, 흰색, 우측 상단 */
  .cnt{position:absolute; top:9%; right:12%; z-index:4; display:none;
    font-family:'Black Han Sans',sans-serif; color:#fff; font-size:1.15em; line-height:1;
    text-shadow:0 1px 3px rgba(0,0,0,.55), 1px 1px 0 rgba(0,0,0,.35); pointer-events:none;}
  .shape.show-cnt .cnt{display:block;}

  /* 1위 = 네온사인 반짝임 (왕관 대신) — 잔잔하게 */
  @keyframes neon{
    0%,100%{filter:drop-shadow(2px 3px 0 rgba(0,0,0,.2)) drop-shadow(0 0 4px rgba(255,255,255,.7)) drop-shadow(0 0 9px var(--shape-color));}
    50%{filter:drop-shadow(2px 3px 0 rgba(0,0,0,.2)) drop-shadow(0 0 9px rgba(255,255,255,.85)) drop-shadow(0 0 18px var(--shape-color));}
  }
  .shape.top .bg{animation:neon 2.2s ease-in-out infinite;}

  /* 재생중 ♪ */
  .shape .note-ico{position:absolute; top:-6px; left:-2px; z-index:6; font-size:18px; display:none;
    animation:bob 1s ease-in-out infinite alternate; filter:drop-shadow(1px 1px 0 rgba(0,0,0,.4));}
  .shape.playing .note-ico{display:block;}
  @keyframes bob{from{transform:translateY(0);}to{transform:translateY(-5px);}}
  @keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.14);}100%{transform:scale(1);}}
  .shape.pop{animation:pop .4s ease-out;}
  .plus1{position:absolute; z-index:20; font-family:'Black Han Sans',sans-serif; font-size:22px; color:var(--y);
    text-shadow:1px 2px 0 rgba(0,0,0,.5); pointer-events:none; animation:rise .8s ease-out forwards;}
  @keyframes rise{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-40px);}}

  /* 작은 TEST 태그 */
  .test-tag{position:fixed; top:calc(env(safe-area-inset-top) + 6px); right:8px; z-index:60;
    background:rgba(15,15,20,.72); color:#fff; font-size:10px; font-weight:800; padding:3px 8px; border-radius:20px;}

  /* ── 하단 음원 플레이바 (재생/이전/다음 + 진행바 + 공유) ── */
  .playbar{position:fixed; left:10px; right:10px; bottom:calc(env(safe-area-inset-bottom) + 10px); z-index:55;
    background:var(--ink); color:#fff; border-radius:16px; padding:9px 12px;
    display:flex; align-items:center; gap:10px; box-shadow:0 8px 24px rgba(0,0,0,.35);
    border:2px solid rgba(255,255,255,.12);}
  .pb-disc{width:40px; height:40px; flex:0 0 auto; position:relative;}
  .pb-disc .pbg{position:absolute; inset:0; background:var(--pb-color,#666);}      /* 도형 모양 담김 */
  .pb-disc.spin{animation:spin 2.6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  /* 재생 중인 도형 모양대로 */
  .pb-disc.m-circle .pbg{border-radius:50%;}
  .pb-disc.m-square .pbg{border-radius:9px;}
  .pb-disc.m-blob .pbg{border-radius:58% 42% 55% 45% / 48% 55% 45% 52%;}
  .pb-disc.m-star .pbg{clip-path:polygon(50% 0%,71% 21%,98% 35%,84% 61%,79% 91%,50% 86%,21% 91%,16% 61%,2% 35%,29% 21%);}
  .pb-disc.m-hex .pbg{clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%);}
  .pb-info{flex:1; min-width:0;}
  .pb-title{font-weight:900; font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pb-title small{font-weight:700; opacity:.6; font-size:11px;}
  /* 진행바 — 손으로 드래그 */
  .pb-prog{height:14px; display:flex; align-items:center; margin-top:3px; cursor:pointer; touch-action:none;}
  .pb-prog .track{position:relative; height:5px; width:100%; background:rgba(255,255,255,.18); border-radius:3px;}
  .pb-prog .fill{position:absolute; left:0; top:0; height:100%; width:0%; background:var(--y); border-radius:3px;}
  .pb-prog .knob{position:absolute; top:50%; left:0%; width:13px; height:13px; border-radius:50%; background:#fff;
    transform:translate(-50%,-50%); box-shadow:0 1px 4px rgba(0,0,0,.5); border:2px solid var(--y);}
  .pb-btn{flex:0 0 auto; background:none; border:none; color:#fff; font-size:17px; cursor:pointer; padding:2px 3px; line-height:1;}
  .pb-btn:active{transform:scale(.88);}
  .pb-play{width:34px; height:34px; border-radius:50%; background:var(--y); color:#111; font-size:15px; display:flex; align-items:center; justify-content:center;}
  .pb-share{font-size:16px;}
  /* 공유 토스트 */
  .toast{position:fixed; left:50%; bottom:80px; transform:translateX(-50%) translateY(10px); z-index:70;
    background:rgba(0,0,0,.9); color:#fff; font-size:12px; font-weight:700; padding:8px 16px; border-radius:20px;
    opacity:0; transition:opacity .2s, transform .2s; pointer-events:none;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  /* ── 마감 카운트다운 (하단 가운데, 흰색) ── */
  .countdown{position:fixed; left:0; right:0; bottom:44px; z-index:49; text-align:center; pointer-events:none;}
  .countdown .cd-label{font-size:11px; font-weight:800; color:rgba(255,255,255,.9); letter-spacing:.5px;
    text-shadow:0 1px 4px rgba(0,0,0,.5); margin-bottom:2px;}
  .countdown .cd-time{display:inline-flex; align-items:baseline; gap:3px;
    font-family:'Black Han Sans',sans-serif; color:#fff; font-size:26px; line-height:1;
    text-shadow:0 2px 8px rgba(0,0,0,.55), 1px 1px 0 rgba(0,0,0,.3);}
  .countdown .cd-time small{font-family:'Pretendard',sans-serif; font-size:12px; font-weight:800; opacity:.85; margin:0 4px 0 0;}
  .countdown .cd-time .colon{opacity:.6; padding:0 1px;}
</style>
</head>
<body>
  <div class="bg-layer" id="bg"></div>
  <h1>슬로우 뮤직</h1>
  <p class="sub">실제 업로드된 곡으로 투표! 1위(반짝이는 도형)가 다음 발매곡으로 🗳 <span style="opacity:.7">(한 번=듣기·두 번=투표, 투표는 이 화면에서만 임시 집계)</span></p>

  <div id="app"><p style="position:relative;z-index:2;color:rgba(0,0,0,.55);font-weight:700;font-size:13px;padding:30px 4px;">🎧 실제 업로드된 곡 불러오는 중…</p></div>
  <audio id="audioEl" preload="none"></audio>

  <div class="test-tag">🧪 투표 시안 TEST</div>
  <div class="playbar" id="playbar">
    <div class="pb-disc" id="pbDisc"><span class="pbg"></span></div>
    <div class="pb-info">
      <div class="pb-title" id="pbTitle">— <small>곡을 눌러 재생 · 두 번 눌러 투표</small></div>
      <div class="pb-prog" id="pbProg"><div class="track"><div class="fill" id="pbFill"></div><div class="knob" id="pbKnob"></div></div></div>
    </div>
    <button class="pb-btn pb-prev" id="pbPrev">⏮</button>
    <button class="pb-btn pb-play" id="pbPlay">▶</button>
    <button class="pb-btn pb-next" id="pbNext">⏭</button>
    <button class="pb-btn pb-share" id="pbShare" title="공유">🔗</button>
  </div>
  <div class="toast" id="toast"></div>

<script>
const SHAPES=['s-circle','s-star','s-hex','s-square','s-blob'];
let CATS=[]; // 실제 데이터로 채워짐 (fetchRealTracks)

// ── 실제 사이트 Supabase 에서 곡 목록 읽기 (읽기 전용, 이미 공개된 publishable key) ──
const SUPABASE_URL='https://vayzhmaggwpkbsrrsdqt.supabase.co';
const SUPABASE_KEY='sb_publishable_1PxNV0BGL7Wy_strTMqnbA_pCBCsOPG';
async function fetchRealTracks(){
  const cols='id,title,artist_id,is_demo,tags,shape,shape_color,cover_url,audio_url,likes_count,created_at,profiles(name,avatar_url)';
  const url=`${SUPABASE_URL}/rest/v1/tracks?select=${encodeURIComponent(cols)}&order=created_at.desc&limit=200`;
  const r=await fetch(url,{headers:{apikey:SUPABASE_KEY, Authorization:'Bearer '+SUPABASE_KEY}});
  if(!r.ok) throw new Error('fetch failed '+r.status);
  const rows=await r.json();
  return rows.map(row=>({
    id:row.id,
    title:row.title||'제목 없음',
    artist:(row.profiles&&row.profiles.name)||'알수없는 아티스트',
    isDemo:!!row.is_demo,
    tags:Array.isArray(row.tags)?row.tags:[],
    shapeColor:row.shape_color||'#E24A9C',
    audioUrl:row.audio_url||'',
    v:row.likes_count||0,
    createdAt:row.created_at
  }));
}
function toItem(t){ return { tags:[t.artist, ...t.tags.slice(0,2)], v:t.v, audioUrl:t.audioUrl, title:t.title, color:t.shapeColor, real:true }; }

async function loadRealData(){
  try{
    const tracks=await fetchRealTracks();
    const masters=tracks.filter(t=>!t.isDemo);
    const demos=tracks.filter(t=>t.isDemo).slice(0,10);
    CATS=[];
    if(masters.length) CATS.push({ name:'발매곡 투표', items:masters.map(toItem) });
    if(demos.length) CATS.push({ name:'최근 데모 투표', items:demos.map(toItem) });
    if(!CATS.length) throw new Error('no tracks');
  }catch(e){
    console.warn('[투표시안] 실제 데이터 로드 실패, 안내만 표시', e);
    document.getElementById('app').innerHTML='<p style="position:relative;z-index:2;color:rgba(0,0,0,.6);font-weight:700;padding:30px 4px;">⚠️ 실제 곡을 불러오지 못했어요. 네트워크 상태를 확인해주세요.</p>';
    return false;
  }
  return true;
}
// 순위대로 사이즈 — 전반적으로 더 크게
function sizeOf(v){ return Math.min(84 + v*3.6, 178); }
function fontOf(v){ return Math.min(12 + v*0.28, 19); }

const worlds=[];
function build(){
  const app=document.getElementById('app');
  app.innerHTML=CATS.map((cat,ci)=>`<section class="cat"><span class="cat-pill">${cat.name}</span><div class="cat-box" id="box${ci}"><div class="cd-strip"><span class="lab">투표 마감까지</span><span class="tm" id="cd${ci}">—</span></div></div></section>`).join('');
  CATS.forEach((cat,ci)=>{
    const box=document.getElementById('box'+ci), W=box.clientWidth||340, H=box.clientHeight||340, bodies=[];
    cat.items.forEach((it,i)=>{
      const el=document.createElement('div');
      el.className='shape '+SHAPES[(ci*2+i)%SHAPES.length];
      el.style.setProperty('--shape-color', it.color || '#E24A9C');
      // 첫 줄 = 아티스트 이름(클릭→아티스트 페이지), 나머지 = 실제 태그(설명용)
      const [artistName, ...restTags] = it.tags;
      const tagsHtml = `<span class="tg">${artistName}</span>` + restTags.map(t=>`<br>#${t}`).join('');
      el.innerHTML=`<span class="bg"></span><span class="note-ico">🎵</span><span class="tags">${tagsHtml}</span><span class="cnt">${it.v}</span>`;
      el.querySelectorAll('.tg').forEach(tg=>tg.addEventListener('click',ev=>{ ev.stopPropagation(); goArtist(tg.textContent); }));
      box.appendChild(el);
      const r=sizeOf(it.v)/2;
      const b={el,it,ci,i,r,tr:r,x:r+8+Math.random()*(W-2*r-16),y:r+8+Math.random()*(H-2*r-16),
        vx:(Math.random()*15+7)*(Math.random()<.5?-1:1),vy:(Math.random()*15+7)*(Math.random()<.5?-1:1)};
      bodies.push(b); applySize(b);
      let ct=null;
      el.addEventListener('click',()=>{ if(ct){clearTimeout(ct);ct=null;vote(b);} else {ct=setTimeout(()=>{ct=null;play(b);},260);} });
    });
    worlds.push({box,bodies,W,H}); updateRanks(ci);
  });
}
function applySize(b){const d=b.r*2; b.el.style.width=d+'px'; b.el.style.height=d+'px'; b.el.style.fontSize=fontOf(b.it.v)+'px';}
function updateRanks(ci){
  const w=worlds[ci]; if(!w) return;
  const sorted=[...w.bodies].sort((a,b)=>b.it.v-a.it.v);
  w.bodies.forEach(b=>{
    const rank=sorted.indexOf(b);
    b.el.classList.toggle('top',rank===0);            // 1위 네온
    b.el.classList.toggle('show-cnt',rank<2);         // 상위 1·2위만 투표수
    b.el.querySelector('.cnt').textContent=b.it.v;
  });
}
let curBody=null, dragging=false, seekFrac=0;
function flatList(){ const arr=[]; worlds.forEach(w=>w.bodies.forEach(b=>arr.push(b))); return arr; }
const SHAPE2M={'s-circle':'m-circle','s-square':'m-square','s-blob':'m-blob','s-star':'m-star','s-hex':'m-hex'};
const audioEl=document.getElementById('audioEl');
function play(b, fromFrac){
  if(!b.it.audioUrl){ toast('⚠️ 이 곡엔 음원 파일이 없어요'); return; }
  curBody=b;
  document.querySelectorAll('.shape.playing').forEach(e=>e.classList.remove('playing'));
  b.el.classList.add('playing');
  const color=getComputedStyle(b.el).getPropertyValue('--shape-color').trim();
  // 디스크 = 그 도형 모양/색 그대로
  const disc=document.getElementById('pbDisc');
  disc.className='pb-disc spin ' + (SHAPE2M[b.el.classList[1]]||'m-circle');
  disc.style.setProperty('--pb-color', color);
  document.getElementById('pbTitle').innerHTML=b.it.tags[0]+' <small>「'+(b.it.title||'')+'」 · ▶</small>';
  document.getElementById('pbPlay').textContent='⏸';
  // 실제 음원 재생
  if(audioEl.src!==b.it.audioUrl){ audioEl.src=b.it.audioUrl; }
  audioEl.currentTime = (fromFrac||0) * (audioEl.duration||0);
  audioEl.play().catch(()=>{ toast('⚠️ 재생할 수 없는 곡이에요'); });
}
function endPlay(){
  if(curBody) curBody.el.classList.remove('playing');
  document.getElementById('pbDisc').classList.remove('spin');
  document.getElementById('pbPlay').textContent='▶';
}
audioEl.addEventListener('ended', ()=>{ endPlay(); const l=flatList(); if(curBody && l.length){ const i=l.indexOf(curBody); const nxt=l[(i+1)%l.length]; if(nxt) play(nxt); } });
audioEl.addEventListener('pause', ()=>{ if(!audioEl.ended) document.getElementById('pbPlay').textContent='▶'; });
audioEl.addEventListener('play', ()=>{ document.getElementById('pbPlay').textContent='⏸'; if(curBody) curBody.el.classList.add('playing'); document.getElementById('pbDisc').classList.add('spin'); });
function updateProgUI(){
  if(dragging || !audioEl.duration) return;
  setProgUI(audioEl.currentTime/audioEl.duration);
}
function setProgUI(f){ document.getElementById('pbFill').style.width=(f*100)+'%'; document.getElementById('pbKnob').style.left=(f*100)+'%'; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1500); }
/* 아티스트 페이지로 (해시태그 클릭) — 실제 사이트 라우팅(index.html#/artist:이름)으로 진짜 이동 */
function goArtist(tag){
  const name = tag.replace(/^#/, '');
  toast('→ ' + tag + ' 아티스트 페이지로 이동');
  setTimeout(()=>{ location.href = 'index.html#/artist:' + encodeURIComponent(name); }, 550);
}
/* 플레이바 버튼 + 진행바 드래그 */
function wirePlaybar(){
  document.getElementById('pbPlay').addEventListener('click',()=>{
    if(!curBody){ const l=flatList(); if(l.length) play(l[0]); return; }
    if(audioEl.paused){ audioEl.play().catch(()=>{}); } else { audioEl.pause(); }
  });
  document.getElementById('pbPrev').addEventListener('click',()=>{ const l=flatList(); if(!l.length)return; let i=curBody?l.indexOf(curBody):0; play(l[(i-1+l.length)%l.length]); });
  document.getElementById('pbNext').addEventListener('click',()=>{ const l=flatList(); if(!l.length)return; let i=curBody?l.indexOf(curBody):-1; play(l[(i+1)%l.length]); });
  document.getElementById('pbShare').addEventListener('click',()=>{
    const shareText = curBody ? (curBody.it.tags[0]+' — 「'+(curBody.it.title||'')+'」') : '슬로우 뮤직';
    if(navigator.share){ navigator.share({title:'슬로우 뮤직', text:shareText, url:location.href}).catch(()=>{}); }
    else { toast(curBody? ('🔗 '+shareText+' 링크 복사됨!') : '🔗 재생 중인 곡이 없어요'); }
  });
  // 진행바 드래그
  const prog=document.getElementById('pbProg');
  function fracFromEvent(e){ const r=prog.getBoundingClientRect(); const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left; return Math.max(0,Math.min(1,x/r.width)); }
  function start(e){ if(!curBody)return; dragging=true; move(e); }
  function move(e){ if(!dragging)return; seekFrac=fracFromEvent(e); setProgUI(seekFrac); e.preventDefault&&e.preventDefault(); }
  function end(){ if(!dragging)return; dragging=false; if(curBody) play(curBody, seekFrac); }
  prog.addEventListener('mousedown',start); window.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
  prog.addEventListener('touchstart',start,{passive:false}); window.addEventListener('touchmove',move,{passive:false}); window.addEventListener('touchend',end);
  setInterval(updateProgUI, 60);
}
function vote(b){
  b.it.v++; b.tr=sizeOf(b.it.v)/2;
  b.el.classList.remove('pop'); void b.el.offsetWidth; b.el.classList.add('pop');
  const w=worlds[b.ci], p=document.createElement('div'); p.className='plus1'; p.textContent='+1';
  p.style.left=(b.x-8)+'px'; p.style.top=(b.y-b.r-26)+'px'; w.box.appendChild(p); setTimeout(()=>p.remove(),800);
  updateRanks(b.ci);
}
/* 물리 루프 */
let last=performance.now();
function stepLoop(now){
  const dt=Math.min((now-last)/1000,.05); last=now;
  worlds.forEach(w=>{
    w.W=w.box.clientWidth; w.H=w.box.clientHeight; const bs=w.bodies;
    bs.forEach(b=>{ if(Math.abs(b.tr-b.r)>0.3){b.r+=(b.tr-b.r)*0.08;applySize(b);}
      b.x+=b.vx*dt; b.y+=b.vy*dt;
      if(b.x<b.r){b.x=b.r;b.vx=Math.abs(b.vx);} if(b.x>w.W-b.r){b.x=w.W-b.r;b.vx=-Math.abs(b.vx);}
      if(b.y<b.r+6){b.y=b.r+6;b.vy=Math.abs(b.vy);} if(b.y>w.H-b.r-6){b.y=w.H-b.r-6;b.vy=-Math.abs(b.vy);} });
    for(let a=0;a<bs.length;a++)for(let c=a+1;c<bs.length;c++){const A=bs[a],B=bs[c];
      const dx=B.x-A.x,dy=B.y-A.y,dist=Math.hypot(dx,dy)||0.01,min=A.r+B.r-6;
      if(dist<min){const nx=dx/dist,ny=dy/dist,o=(min-dist)/2; A.x-=nx*o;A.y-=ny*o;B.x+=nx*o;B.y+=ny*o;
        const avn=A.vx*nx+A.vy*ny,bvn=B.vx*nx+B.vy*ny,d=(bvn-avn)*0.9; A.vx+=nx*d;A.vy+=ny*d;B.vx-=nx*d;B.vy-=ny*d;}}
    bs.forEach(b=>{const sp=Math.hypot(b.vx,b.vy); if(sp>26){b.vx*=26/sp;b.vy*=26/sp;} if(sp<6){b.vx*=6/(sp||1);b.vy*=6/(sp||1);}
      b.el.style.transform=`translate(${(b.x-b.r).toFixed(1)}px,${(b.y-b.r).toFixed(1)}px)`;});
  });
  requestAnimationFrame(stepLoop);
}
/* 배경 도형 (지금 사이트 감성) */
(function bgDeco(){
  const FCOL=['#E24A9C','#7FB2EC','#86CE34','#B49BEE','#F06CA8','#FF8A6E','#26C6C6','#FFB03A','#FFD24A','#3E6FD9'];
  const SH=['c-circle','c-square','c-blob','c-star','c-hex'];
  let html='';
  // 큰 도형 은은히 (뒤)
  for(let i=0;i<5;i++){const s=SH[i%SH.length],c=FCOL[(i*2)%FCOL.length],w=90+Math.random()*90;
    html+=`<span class="bg-big ${s}" style="width:${w}px;height:${w}px;left:${Math.random()*88}%;top:${Math.random()*88}%;--fc:${c};transform:rotate(${(Math.random()*40-20)|0}deg);"><i></i></span>`;}
  // 떨어지는 작은 도형
  for(let i=0;i<22;i++){const s=SH[i%SH.length],c=FCOL[i%FCOL.length],w=14+Math.random()*24,d=9+Math.random()*9;
    html+=`<span class="fall ${s}" style="left:${Math.random()*100}%;--fw:${w}px;--fc:${c};animation-duration:${d}s;animation-delay:${(-Math.random()*d).toFixed(1)}s;"><i></i></span>`;}
  document.getElementById('bg').innerHTML=html;
})();
/* ── 칸별 마감 카운트다운 (이달 말일 자정까지) ── */
(function countdown(){
  const now0=new Date();
  const end=new Date(now0.getFullYear(), now0.getMonth()+1, 1, 0,0,0);
  const p=n=>String(n).padStart(2,'0');
  function tick(){
    let s=Math.max(0, Math.floor((end - new Date())/1000));
    const d=Math.floor(s/86400); s-=d*86400;
    const h=Math.floor(s/3600); s-=h*3600;
    const m=Math.floor(s/60); s-=m*60;
    const html=(d>0?`<small>D-${d}</small>`:'')+`${p(h)}<span class="colon">:</span>${p(m)}<span class="colon">:</span>${p(s)}`;
    CATS.forEach((c,ci)=>{ const el=document.getElementById('cd'+ci); if(el) el.innerHTML=html; });
  }
  tick(); setInterval(tick,1000);
})();

(async function init(){
  const ok = await loadRealData();
  if(!ok) return;
  build();
  wirePlaybar();
  requestAnimationFrame(stepLoop);
})();
</script>
