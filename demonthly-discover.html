<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>demon'thly · 발견 테스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root{--sky:#45CEEB;--ink:#0f0f14;--yellow:#FFE800;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:var(--sky);color:var(--ink);overflow:hidden;}
  /* ===== 실제 발견(dp-*) 구성 그대로 ===== */
  .dp-scroll{position:absolute;inset:0;overflow-y:auto;background:#45CEEB;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-top:118px;}
  .dp-scroll::-webkit-scrollbar{display:none;}
  .dp-band{position:relative;}
  .dp-slot{position:absolute;transform:translate(-50%,-50%) rotate(var(--rot,0deg));width:var(--w);height:var(--h);display:flex;align-items:center;justify-content:center;z-index:1;}
  .dp-slot.info{z-index:5;cursor:pointer;transition:width .32s cubic-bezier(.34,1.4,.5,1),height .32s cubic-bezier(.34,1.4,.5,1);}
  .dp-shape{position:absolute;inset:0;width:100%;height:100%;filter:drop-shadow(0 4px 11px rgba(0,0,0,.5));}
  .dp-burst{clip-path:polygon(50% 0%,61% 26%,87% 13%,74% 39%,100% 47%,79% 62%,90% 90%,61% 75%,50% 100%,39% 75%,10% 90%,21% 62%,0% 47%,26% 39%,13% 13%,39% 26%);}
  .dp-tri{clip-path:polygon(50% 3%,3% 97%,97% 97%);}
  .dp-spark{clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);}
  .dp-circle,.dp-ellipse{border-radius:50%;}
  .dp-square{border-radius:6px;}
  .dp-stack .dp-shape{background:none;filter:none;}
  .dp-stack .p{position:absolute;background:#F4F1E8;border:1.5px solid #cfc7b2;border-radius:3px;width:74%;height:74%;box-shadow:0 3px 8px rgba(0,0,0,.45);}
  .dp-stack .p:nth-child(1){left:0;top:0;transform:rotate(-8deg);} .dp-stack .p:nth-child(2){left:14%;top:12%;transform:rotate(4deg);} .dp-stack .p:nth-child(3){left:26%;top:24%;transform:rotate(-3deg);}
  .dp-notes{font-size:var(--w);line-height:1;font-weight:900;filter:drop-shadow(0 3px 7px rgba(0,0,0,.5));}
  .dp-s-text{position:relative;z-index:2;text-align:center;font-weight:800;line-height:1.5;letter-spacing:-.2px;pointer-events:none;white-space:nowrap;color:#1b1522;font-size:15px;}
  .dp-tri-wrap .dp-s-text{transform:translateY(28%);}
  /* 곡 도형 배지 = 득표수 + ▲ 투표 / HOT */
  .dp-vbadge{position:absolute;bottom:2px;left:50%;transform:translate(-50%,50%) rotate(calc(-1*var(--rot,0deg)));z-index:8;display:inline-flex;align-items:center;background:var(--ink);border-radius:22px;padding:2px 2px 2px 9px;box-shadow:0 2px 8px rgba(0,0,0,.4);white-space:nowrap;}
  .dp-vbadge .vc{color:#fff;font-weight:900;font-size:12px;margin-right:5px;}
  .dp-vbadge .up{width:23px;height:23px;border-radius:50%;border:none;background:var(--yellow);color:var(--ink);font-size:13px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
  .dp-vbadge .up:active{transform:scale(.85);}
  .dp-hot{position:absolute;top:2px;right:2px;transform:translate(30%,-30%) rotate(calc(-1*var(--rot,0deg)));z-index:8;background:#fff;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:900;color:#ff4d2e;box-shadow:0 2px 6px rgba(0,0,0,.3);}
  .dp-slot.info.play .dp-shape{animation:pl .5s ease;}
  @keyframes pl{0%{transform:scale(1);}30%{transform:scale(1.08);}100%{transform:scale(1);}}
  .pop{position:absolute;z-index:9;font-family:'Black Han Sans';font-size:22px;pointer-events:none;text-shadow:0 2px 6px rgba(0,0,0,.35);animation:pop .7s ease forwards;}
  @keyframes pop{0%{opacity:0;transform:translateY(6px) scale(.6);}25%{opacity:1;transform:translateY(-10px) scale(1.1);}100%{opacity:0;transform:translateY(-34px);}}
  /* 떨어지는 장식 도형 */
  .dp-fall-layer{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:6;}
  .dp-fall{position:absolute;top:0;width:var(--fw,30px);height:var(--fw,30px);animation:dpFall linear infinite;}
  @keyframes dpFall{0%{transform:translateY(-16vh) rotate(-12deg);opacity:0;}7%{opacity:1;}90%{opacity:1;}100%{transform:translateY(112vh) rotate(220deg);opacity:0;}}

  /* ===== 상단 고정: demon'thly 워드마크 + 탭 ===== */
  .fixtop{position:fixed;top:0;left:0;right:0;z-index:20;padding:calc(env(safe-area-inset-top) + 8px) 12px 8px;
          background:linear-gradient(180deg,#45CEEB 74%,rgba(69,206,235,0));}
  .wm{font-family:'Black Han Sans';color:var(--yellow);font-size:clamp(30px,9vw,48px);line-height:.9;letter-spacing:-1px;text-align:center;text-shadow:0 4px 0 rgba(0,0,0,.07);display:inline-flex;align-items:baseline;width:100%;justify-content:center;}
  .wm .silent{position:relative;font-size:.6em;opacity:.4;transform:translateY(-.06em);margin:0 -.02em;}
  .wm .silent::after{content:"";position:absolute;left:-6%;right:-6%;top:52%;height:.09em;background:currentColor;transform:rotate(-14deg);border-radius:2px;opacity:.85;}
  .tabs{display:flex;gap:8px;margin:8px auto 0;max-width:520px;}
  .tab{flex:1;background:#fff;border:2.5px solid var(--ink);border-radius:11px;padding:9px 6px;font-weight:900;font-size:14px;color:var(--ink);cursor:pointer;transition:transform .1s;}
  .tab.on{background:var(--ink);color:#fff;} .tab:active{transform:scale(.96);}
  .flag{position:fixed;top:calc(env(safe-area-inset-top) + 5px);right:8px;background:rgba(15,15,20,.72);color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;z-index:30;}
  .nowbar{position:fixed;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 12px);z-index:25;background:var(--ink);color:#fff;border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:11px;box-shadow:0 8px 24px rgba(0,0,0,.3);transform:translateY(160%);transition:transform .3s cubic-bezier(.2,1,.3,1);}
  .nowbar.show{transform:none;}
  .nowbar .disc{width:34px;height:34px;border-radius:50%;flex:0 0 auto;} .nowbar .t{font-weight:900;font-size:14px;} .nowbar .t small{display:block;font-weight:700;font-size:11px;opacity:.6;} .nowbar .pl{margin-left:auto;font-size:20px;color:var(--yellow);}
</style>
</head>
<body>
  <div class="flag">🧪 발견 테스트</div>
  <div class="fixtop">
    <div class="wm">demo<span class="silent">n</span>thly</div>
    <div class="tabs">
      <button class="tab on" data-tab="vote">🗳️ 이달의 투표</button>
      <button class="tab" data-tab="hot">🔥 HOT 데모</button>
    </div>
  </div>
  <div class="dp-scroll" id="scroll"></div>
  <div class="dp-fall-layer" id="fall"></div>
  <div class="nowbar" id="nowbar"><div class="disc" id="nbDisc"></div><div class="t" id="nbT">—<small>재생 중</small></div><div class="pl">▶</div></div>

<script>
  var COL=['#E24A9C','#7FB2EC','#86CE34','#B49BEE','#F06CA8','#FF8A6E','#26C6C6','#FFB03A','#FFD24A','#3E6FD9'];
  // 실제 발견 TPL 과 같은 손배치(퍼센트). info=곡(밝은 도형), 나머지=장식.
  var TPL=[
    {x:13,y:6,  w:60, cls:'ellipse',color:'#FFD24A'},
    {x:60,y:8,  w:42, cls:'spark',  color:'#26C6C6'},
    {x:33,y:19, w:150,cls:'burst',  info:1},
    {x:79,y:26, w:150,cls:'tri',    info:1},
    {x:16,y:35, w:80, cls:'stack',  color:'#F4F1E8'},
    {x:40,y:38, w:38, cls:'notes',  color:'#E24A9C',glyph:'♪'},
    {x:44,y:46, w:132,cls:'circle', info:1},
    {x:82,y:52, w:158,cls:'tri',    info:1},
    {x:21,y:60, w:132,cls:'burst',  info:1},
    {x:72,y:68, w:140,cls:'burst',  info:1},
    {x:25,y:76, w:52, cls:'square', color:'#FFD24A'},
    {x:90,y:16, w:30, cls:'spark',  color:'#E24A9C'},
    {x:58,y:62, w:34, cls:'notes',  color:'#26C6C6',glyph:'♫'},
    {x:47,y:73, w:132,cls:'circle', info:1},
    {x:10,y:88, w:44, cls:'burst',  color:'#3E6FD9'},
    {x:80,y:84, w:132,cls:'tri',    info:1},
    {x:53,y:88, w:42, cls:'spark',  color:'#F06CA8'},
    {x:34,y:93, w:132,cls:'burst',  info:1}
  ];
  var voteDemos=[
    {nm:'이면',tags:['#발라드','#임설아'],votes:44},{nm:'여우야',tags:['#여름','#ㅠㅠ'],votes:31},
    {nm:'짝사랑',tags:['#트로트','#뽕짝'],votes:22},{nm:'문틈',tags:['#인디','#6월'],votes:17},
    {nm:'잠수이별',tags:['#시티팝'],votes:12},{nm:'6월월평',tags:['#어쿠스틱'],votes:9},
    {nm:'노을',tags:['#팝'],votes:7},{nm:'파도',tags:['#시티팝'],votes:5}
  ];
  var hotDemos=[
    {nm:'승빈이존잘',tags:['#힙합'],plays:342},{nm:'아애이오우',tags:['#R&B'],plays:288},
    {nm:'푸르름',tags:['#밴드'],plays:201},{nm:'뮤게이징',tags:['#EDM'],plays:176},
    {nm:'자작곡',tags:['#로파이'],plays:120},{nm:'15살차이',tags:['#발라드'],plays:98},
    {nm:'새벽세시',tags:['#R&B'],plays:77},{nm:'가로등',tags:['#인디'],plays:54}
  ];
  var scroll=document.getElementById('scroll'), nowbar=document.getElementById('nowbar');
  function sV(v){return Math.round(96+Math.min(v,60)*2.4);}
  function sP(p){return Math.round(92+Math.min(p,400)*0.28);}
  function mkShape(cls,color,glyph){
    if(cls==='stack') return '<div class="dp-shape"><div class="p"></div><div class="p"></div><div class="p"></div></div>';
    if(cls==='notes') return '<div class="dp-notes" style="color:'+color+'">'+glyph+'</div>';
    return '<div class="dp-shape dp-'+cls+'" style="background:'+color+'"></div>';
  }
  function render(tab){
    scroll.innerHTML='';
    var data=tab==='vote'?voteDemos:hotDemos;
    var BANDS=2;                                   // 2밴드 → 스크롤 아래로 쭉
    var bandH=Math.round(window.innerHeight*0.96);
    var di=0, ci=0;
    for(var b=0;b<BANDS;b++){
      var band=document.createElement('div'); band.className='dp-band'; band.style.height=bandH+'px'; scroll.appendChild(band);
      TPL.forEach(function(s){
        var el=document.createElement('div');
        el.className='dp-slot'+(s.info?' info':'')+(s.cls==='tri'?' dp-tri-wrap':'');
        el.style.left=(s.x+(Math.random()-.5)*4)+'%'; el.style.top=(s.y+(Math.random()-.5)*3)+'%';
        el.style.setProperty('--rot',((Math.random()-.5)*16)+'deg');
        if(s.info){
          var d=data[di%data.length]; di++;
          var col=COL[ci%COL.length]; ci++;
          var size=tab==='vote'?sV(d.votes):sP(d.plays);
          el.style.setProperty('--w',size+'px'); el.style.setProperty('--h',size+'px');
          var txt=d.tags.slice(0,3).map(function(x){return x;}).join('<br>');
          var badge=tab==='vote'
            ? '<div class="dp-vbadge"><span class="vc">🗳️ '+d.votes+'</span><button class="up">▲</button></div>'
            : '<div class="dp-hot">🔥 '+d.plays+'</div>';
          el.innerHTML=mkShape(s.cls,col)+'<div class="dp-s-text">'+txt+'</div>'+badge;
          el.__d=d;
          el.addEventListener('click',function(){ play(el,col,d); });
          var up=el.querySelector('.up'); if(up) up.addEventListener('click',function(e){e.stopPropagation();vote(el);});
        } else {
          el.style.setProperty('--w',s.w+'px'); el.style.setProperty('--h',s.w+'px');
          el.innerHTML=mkShape(s.cls,s.color,s.glyph);
        }
        band.appendChild(el);
      });
    }
  }
  function play(el,col,d){
    el.classList.remove('play'); void el.offsetWidth; el.classList.add('play');
    document.getElementById('nbDisc').style.background=col;
    document.getElementById('nbT').innerHTML=d.nm+' <small>'+d.tags[0]+' · 재생 중 ▶</small>';
    nowbar.classList.add('show');
  }
  function vote(el){
    var d=el.__d; d.votes++;
    el.style.setProperty('--w',sV(d.votes)+'px'); el.style.setProperty('--h',sV(d.votes)+'px');
    var vc=el.querySelector('.vc'); if(vc)vc.textContent='🗳️ '+d.votes;
    var r=el.getBoundingClientRect();
    var p=document.createElement('div'); p.className='pop'; p.textContent='+1'; p.style.color='#FFE800';
    p.style.left=(r.left+r.width/2-10)+'px'; p.style.top=(r.top)+'px'; document.body.appendChild(p); setTimeout(function(){p.remove();},700);
  }
  // 떨어지는 도형
  (function(){
    var cfg=[{c:'circle',col:'#FFD24A',w:26,l:8,d:6.4},{c:'tri',col:'#E24A9C',w:34,l:26,d:7.6},{c:'square',col:'#26C6C6',w:22,l:44,d:6.8},{c:'spark',col:'#B49BEE',w:28,l:60,d:8},{c:'circle',col:'#7FB2EC',w:20,l:80,d:6},{c:'tri',col:'#FFD24A',w:24,l:92,d:7.2}];
    document.getElementById('fall').innerHTML=cfg.map(function(f,i){return '<span class="dp-fall" style="left:'+f.l+'%;--fw:'+f.w+'px;animation-duration:'+f.d+'s;animation-delay:'+(i*0.8)+'s"><div class="dp-shape dp-'+f.c+'" style="background:'+f.col+'"></div></span>';}).join('');
  })();
  Array.prototype.forEach.call(document.querySelectorAll('.tab'),function(t){t.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});t.classList.add('on');nowbar.classList.remove('show');scroll.scrollTop=0;render(t.dataset.tab);});});
  render('vote');
</script>
</body>
</html>
