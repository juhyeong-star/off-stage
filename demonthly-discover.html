<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>demon'thly · 발견 테스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root{--sky:#45CEEB;--ink:#0f0f14;--yellow:#FFE800;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:var(--sky);color:var(--ink);
       overflow-x:hidden;-webkit-overflow-scrolling:touch;}
  /* 상단(워드마크+탭) = sticky 고정. 탭은 스크롤해도 항상 위에. */
  .top{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--sky) 78%,rgba(69,206,235,0));
       padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;}
  .wm{font-family:'Black Han Sans';color:var(--yellow);font-size:clamp(34px,10vw,54px);line-height:.9;letter-spacing:-1px;text-align:center;text-shadow:0 4px 0 rgba(0,0,0,.08);display:inline-flex;align-items:baseline;width:100%;justify-content:center;}
  .wm .silent{position:relative;font-size:.6em;opacity:.4;transform:translateY(-.06em);margin:0 -.02em;}
  .wm .silent::after{content:"";position:absolute;left:-6%;right:-6%;top:52%;height:.09em;background:currentColor;transform:rotate(-14deg);border-radius:2px;opacity:.85;}
  .sub{text-align:center;font-weight:800;font-size:12px;opacity:.82;margin-top:2px;}
  .sub b{background:var(--ink);color:#fff;padding:2px 8px;border-radius:5px;}
  .tabs{display:flex;gap:8px;margin:12px auto 0;max-width:520px;}
  .tab{flex:1;background:#fff;border:2.5px solid var(--ink);border-radius:11px;padding:11px 6px;font-weight:900;font-size:15px;color:var(--ink);cursor:pointer;transition:transform .1s;}
  .tab.on{background:var(--ink);color:#fff;}
  .tab:active{transform:scale(.96);}
  /* 스테이지 = 도형 개수만큼 길어지는 스크롤 영역 (탭 소환은 탭탭으로, 보긴 스크롤로) */
  .stage{position:relative;margin:6px 8px;padding-bottom:calc(env(safe-area-inset-bottom) + 16px);}

  .fs{position:absolute;display:flex;align-items:center;justify-content:center;cursor:pointer;
      animation:flyIn .6s cubic-bezier(.2,1,.3,1) both;
      transition:width .3s cubic-bezier(.34,1.4,.5,1),height .3s cubic-bezier(.34,1.4,.5,1),left .3s,top .3s;}
  @keyframes flyIn{0%{transform:translate(var(--fx),var(--fy)) scale(.35) rotate(var(--r0));opacity:0;}100%{transform:translate(0,0) scale(1) rotate(var(--rot));opacity:1;}}
  .fs.play{animation:play .5s ease;}
  @keyframes play{0%{transform:rotate(var(--rot)) scale(1);}30%{transform:rotate(var(--rot)) scale(1.12);}100%{transform:rotate(var(--rot)) scale(1);}}
  .fs.grew{animation:grew .28s ease;}
  @keyframes grew{0%{transform:rotate(var(--rot)) scale(1);}45%{transform:rotate(var(--rot)) scale(1.12);}100%{transform:rotate(var(--rot)) scale(1);}}
  .fs .bg{position:absolute;inset:0;}
  .fs .lbl{position:relative;z-index:2;text-align:center;color:#1b1522;font-weight:900;padding:4px;pointer-events:none;line-height:1.05;}
  .fs .lbl .nm{font-size:13px;display:block;} .fs .lbl .tg{font-size:10px;opacity:.8;display:block;margin-top:2px;font-weight:800;}
  .fs .play-ic{position:absolute;z-index:2;top:8px;left:8px;font-size:12px;opacity:.55;}
  .sh-circle{border-radius:50%;} .sh-square{border-radius:12px;}
  .sh-burst{clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}
  .sh-tri{clip-path:polygon(50% 4%,97% 96%,3% 96%);}
  .sh-dia{clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);}
  /* 투표수 + 투표버튼(▲) = 도형 아래 알약. 도형 탭=재생, 이 버튼=투표 */
  .vbadge{position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);z-index:4;display:inline-flex;align-items:center;gap:0;
          background:var(--ink);border-radius:22px;padding:2px 2px 2px 10px;box-shadow:0 2px 8px rgba(0,0,0,.35);white-space:nowrap;}
  .vbadge .vc{color:#fff;font-weight:900;font-size:12px;margin-right:6px;}
  .vbadge .up{width:24px;height:24px;border-radius:50%;border:none;background:var(--yellow);color:var(--ink);font-size:13px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:transform .1s;}
  .vbadge .up:active{transform:scale(.85);}
  .hot-badge{position:absolute;top:-6px;right:-6px;z-index:4;background:#fff;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:900;color:#ff4d2e;box-shadow:0 2px 6px rgba(0,0,0,.25);}
  .pop{position:absolute;z-index:6;font-family:'Black Han Sans';font-size:20px;pointer-events:none;text-shadow:0 2px 6px rgba(0,0,0,.35);animation:pop .7s ease forwards;}
  @keyframes pop{0%{opacity:0;transform:translateY(6px) scale(.6);}25%{opacity:1;transform:translateY(-8px) scale(1.1);}100%{opacity:0;transform:translateY(-30px) scale(1);}}
  .flag{position:fixed;top:calc(env(safe-area-inset-top) + 6px);right:8px;background:rgba(15,15,20,.72);color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;z-index:30;}
  /* 재생 토스트(하단) */
  .nowbar{position:fixed;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 12px);z-index:25;background:var(--ink);color:#fff;
          border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:11px;box-shadow:0 8px 24px rgba(0,0,0,.3);
          transform:translateY(140%);transition:transform .3s cubic-bezier(.2,1,.3,1);}
  .nowbar.show{transform:none;}
  .nowbar .disc{width:34px;height:34px;border-radius:50%;flex:0 0 auto;}
  .nowbar .t{font-weight:900;font-size:14px;} .nowbar .t small{display:block;font-weight:700;font-size:11px;opacity:.6;}
  .nowbar .pl{margin-left:auto;font-size:20px;color:var(--yellow);}
</style>
</head>
<body>
  <div class="flag">🧪 발견 테스트</div>
  <div class="top">
    <div class="wm">demo<span class="silent">n</span>thly</div>
    <div class="sub"><b>이달의 데모</b> — 탭으로 소환 · 스크롤로 쭉 · 도형 탭=재생</div>
    <div class="tabs">
      <button class="tab on" data-tab="vote">🗳️ 이달의 투표</button>
      <button class="tab" data-tab="hot">🔥 HOT 데모</button>
    </div>
  </div>
  <div class="stage" id="stage"></div>
  <div class="nowbar" id="nowbar"><div class="disc" id="nbDisc"></div><div class="t" id="nbT">—<small>재생 중</small></div><div class="pl">▶</div></div>

<script>
  var COL=['#E24A9C','#7FB2EC','#86CE34','#B49BEE','#F06CA8','#FF8A6E','#26C6C6','#FFB03A'];
  var voteDemos=[
    {nm:'이면',tg:'#발라드',votes:44,sh:'sh-tri'},{nm:'여우야',tg:'#여름',votes:31,sh:'sh-burst'},
    {nm:'짝사랑',tg:'#트로트',votes:22,sh:'sh-circle'},{nm:'문틈',tg:'#인디',votes:17,sh:'sh-burst'},
    {nm:'잠수이별',tg:'#시티팝',votes:12,sh:'sh-dia'},{nm:'6월월평',tg:'#어쿠스틱',votes:9,sh:'sh-circle'},
    {nm:'첫눈',tg:'#발라드',votes:7,sh:'sh-tri'},{nm:'노을',tg:'#팝',votes:5,sh:'sh-square'},
    {nm:'파도',tg:'#시티팝',votes:4,sh:'sh-burst'},{nm:'골목길',tg:'#인디',votes:3,sh:'sh-circle'},
    {nm:'그믐',tg:'#발라드',votes:2,sh:'sh-dia'},{nm:'환승',tg:'#힙합',votes:1,sh:'sh-tri'}
  ];
  var hotDemos=[
    {nm:'승빈이존잘',tg:'#힙합',plays:342,sh:'sh-circle'},{nm:'아애이오우',tg:'#R&B',plays:288,sh:'sh-burst'},
    {nm:'푸르름',tg:'#밴드',plays:201,sh:'sh-tri'},{nm:'뮤게이징',tg:'#EDM',plays:176,sh:'sh-square'},
    {nm:'자작곡',tg:'#로파이',plays:120,sh:'sh-dia'},{nm:'15살차이',tg:'#발라드',plays:98,sh:'sh-burst'},
    {nm:'새벽세시',tg:'#R&B',plays:77,sh:'sh-circle'},{nm:'가로등',tg:'#인디',plays:54,sh:'sh-tri'},
    {nm:'빗소리',tg:'#로파이',plays:41,sh:'sh-burst'},{nm:'첫차',tg:'#팝',plays:33,sh:'sh-circle'},
    {nm:'노트',tg:'#어쿠스틱',plays:22,sh:'sh-dia'},{nm:'하울',tg:'#밴드',plays:12,sh:'sh-tri'}
  ];
  var stage=document.getElementById('stage'), nowbar=document.getElementById('nowbar');
  function sV(v){return Math.round(80+Math.min(v,60)*2.0);}
  function sP(p){return Math.round(78+Math.min(p,400)*0.20);}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function render(tab){
    stage.innerHTML='';
    var data=tab==='vote'?voteDemos:hotDemos, W=stage.clientWidth||360;
    // 2열 지그재그 + 각 도형 높이만큼 아래로 → 스테이지가 길어져 스크롤됨
    var cols=2, colX=[W*0.27,W*0.72], colY=[10,70];
    data.forEach(function(d,i){
      var size=tab==='vote'?sV(d.votes):sP(d.plays), col=COL[i%COL.length], c=i%cols;
      var cx=colX[c]+(Math.random()-.5)*W*.06, cy=colY[c];
      var tx=clamp(cx-size/2,4,W-size-4), ty=cy;
      colY[c]=cy+size+34;   // 다음 칸 아래로 (뱃지 공간 포함)
      var el=document.createElement('div'); el.className='fs'; el.style.width=size+'px'; el.style.height=size+'px';
      el.style.left=tx+'px'; el.style.top=ty+'px';
      el.style.setProperty('--fx',((c===0?-1:1)*(W*.5+Math.random()*W*.3))+'px');
      el.style.setProperty('--fy',((Math.random()-.5)*160)+'px');
      el.style.setProperty('--r0',((Math.random()-.5)*90)+'deg');
      el.style.setProperty('--rot',((Math.random()-.5)*14)+'deg');
      el.style.animationDelay=(i*55)+'ms';
      var badge=tab==='vote'
        ? '<div class="vbadge"><span class="vc">🗳️ '+d.votes+'</span><button class="up" title="투표">▲</button></div>'
        : '<div class="hot-badge">🔥 '+d.plays+'</div>';
      el.innerHTML='<div class="bg '+d.sh+'" style="background:'+col+'"></div><span class="play-ic">▶</span><div class="lbl"><span class="nm">'+d.nm+'</span><span class="tg">'+d.tg+'</span></div>'+badge;
      el.__d=d; el.__col=col;
      el.addEventListener('click',function(){ play(el); });                 // 도형 탭 = 재생
      var up=el.querySelector('.up');
      if(up) up.addEventListener('click',function(e){ e.stopPropagation(); vote(el); });  // ▲ = 투표
      stage.appendChild(el);
    });
    stage.style.height=(Math.max(colY[0],colY[1])+10)+'px';   // 스크롤 길이
  }
  function play(el){
    var d=el.__d;
    el.classList.remove('play'); void el.offsetWidth; el.classList.add('play');
    document.getElementById('nbDisc').style.background=el.__col;
    document.getElementById('nbT').innerHTML=d.nm+' <small>'+d.tg+' · 재생 중 ▶</small>';
    nowbar.classList.add('show');
  }
  function vote(el){
    var d=el.__d; d.votes++;
    var W=stage.clientWidth, oldS=el.offsetWidth, newS=sV(d.votes), dl=(newS-oldS)/2;
    var nl=clamp(parseFloat(el.style.left)-dl,4,W-newS-4), nt=parseFloat(el.style.top)-dl;
    el.style.left=nl+'px'; el.style.top=nt+'px'; el.style.width=newS+'px'; el.style.height=newS+'px';
    el.classList.remove('grew'); void el.offsetWidth; el.classList.add('grew');
    var vc=el.querySelector('.vc'); if(vc)vc.textContent='🗳️ '+d.votes;
    var p=document.createElement('div'); p.className='pop'; p.textContent='+1'; p.style.color=el.__col;
    p.style.left=(nl+newS/2-10)+'px'; p.style.top=nt+'px'; stage.appendChild(p); setTimeout(function(){p.remove();},700);
  }
  Array.prototype.forEach.call(document.querySelectorAll('.tab'),function(t){t.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});t.classList.add('on');nowbar.classList.remove('show');render(t.dataset.tab);window.scrollTo({top:0,behavior:'smooth'});});});
  var booted=false;
  function boot(){ if(booted)return; if(stage.clientWidth<50){return setTimeout(boot,50);} booted=true; render('vote'); }
  window.addEventListener('load',boot); setTimeout(boot,300);
</script>
</body>
</html>
