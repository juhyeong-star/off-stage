<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>demon'thly · 주절주절 테스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--sky:#45CEEB;--ink:#0f0f14;--yellow:#FFE800;
        --c1:#FFC94D;--c2:#F06CA8;--c3:#86CE34;--c4:#B49BEE;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:var(--sky);color:var(--ink);
       padding:calc(env(safe-area-inset-top) + 12px) 0 40px;}
  .wrap{max-width:600px;margin:0 auto;padding:0 12px;}
  .flag{position:fixed;top:calc(env(safe-area-inset-top) + 6px);right:8px;background:rgba(15,15,20,.72);color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;z-index:9;}
  .wm{font-family:'Black Han Sans';color:var(--yellow);font-size:clamp(40px,12vw,60px);line-height:.9;letter-spacing:-1px;text-align:center;text-shadow:0 4px 0 rgba(0,0,0,.08);display:inline-flex;align-items:baseline;width:100%;justify-content:center;}
  .wm .silent{position:relative;font-size:.6em;opacity:.4;transform:translateY(-.06em);margin:0 -.02em;}
  .wm .silent::after{content:"";position:absolute;left:-6%;right:-6%;top:52%;height:.09em;background:currentColor;transform:rotate(-14deg);border-radius:2px;opacity:.85;}
  .seclabel{display:block;width:max-content;margin:10px auto 18px;padding:4px 22px;background:#fff;border:3px solid var(--ink);border-radius:5px;font-family:'Black Han Sans';font-size:22px;color:var(--ink);}

  /* ===== 투표 공지 카드 = 스크린샷 앨범카드 스타일 (검은 헤더 + 흰 번호칸) ===== */
  .card{margin-bottom:26px;animation:up .5s cubic-bezier(.22,1,.36,1) both;}
  @keyframes up{0%{opacity:0;transform:translateY(14px);}100%{opacity:1;transform:none;}}
  .head{display:flex;align-items:center;gap:9px;background:var(--ink);color:#fff;padding:12px 16px;}
  .head .pin{font-size:17px;}
  .head .ttl{font-family:'Pretendard';font-weight:800;font-size:15px;letter-spacing:-.3px;}
  .head .ttl small{display:block;font-weight:700;font-size:11px;opacity:.55;margin-top:1px;}
  .head .dday{margin-left:auto;text-align:right;font-size:11px;font-weight:800;opacity:.6;line-height:1.3;}
  .head .dday b{font-size:15px;color:var(--yellow);opacity:1;}

  .rows{display:flex;flex-direction:column;gap:8px;padding:11px 4px 4px;}
  /* 한 줄 = 각자 다른 '칸' (스크린샷 데모 행 그대로: 흰 박스 + 색 왼쪽테두리 + 번호 + #태그) */
  .vrow{display:flex;align-items:center;gap:8px;transition:transform .4s cubic-bezier(.2,1,.3,1);}
  .cell{display:inline-flex;align-items:center;background:#fff;color:#111;font-weight:700;font-size:15px;line-height:1.4;
        padding:8px 13px;border-radius:4px;border-left:5px solid var(--rc);max-width:100%;box-shadow:0 2px 8px rgba(0,0,0,.08);
        min-width:0;flex:1;}
  .cell .num{flex:0 0 auto;font-family:'Black Han Sans';font-size:19px;color:var(--rc);margin-right:10px;line-height:1;}
  .cell .tags{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cnt{flex:0 0 auto;display:inline-flex;align-items:center;gap:3px;font-weight:900;font-size:13px;color:#0b2733;}
  .vbtn{flex:0 0 auto;background:var(--ink);color:#fff;border:none;border-radius:20px;padding:7px 14px;font-weight:900;font-size:13px;cursor:pointer;transition:transform .1s,opacity .15s;}
  .vbtn:active{transform:scale(.92);}
  .vbtn.voted{background:#2ec77a;}
  .pop{position:fixed;font-family:'Black Han Sans';color:#2ec77a;font-size:22px;pointer-events:none;z-index:50;text-shadow:0 2px 6px rgba(0,0,0,.25);animation:pp .8s ease forwards;}
  @keyframes pp{0%{opacity:0;transform:translateY(4px) scale(.6);}25%{opacity:1;transform:translateY(-10px) scale(1.1);}100%{opacity:0;transform:translateY(-34px);}}

  .foot{padding:12px 6px 2px;}
  .foot .go{width:100%;background:var(--ink);color:#fff;border:none;border-radius:11px;padding:13px;font-weight:900;font-size:15px;cursor:pointer;}

  /* 아래 = 일반 앨범 카드(스크린샷) — 공지가 '맨 위'에 있음을 보여주는 컨텍스트 */
  .demohead{background:var(--ink);color:#fff;font-weight:800;font-size:15px;padding:11px 16px;letter-spacing:-.3px;}
  .demohead .d{opacity:.6;font-weight:700;margin-right:9px;}
  .demohead .a{font-weight:900;border-bottom:2px solid #fff;padding-bottom:1px;}
  .drows{display:flex;flex-direction:column;gap:6px;padding:9px 4px 0;}
  .drow{display:flex;align-items:center;gap:8px;}
  .dcell{display:inline-flex;align-items:center;background:#fff;color:#111;font-weight:700;font-size:15px;padding:6px 13px;border-radius:3px;border-left:4px solid var(--rc);max-width:100%;}
  .dcell .num{font-family:'Black Han Sans';color:var(--rc);margin-right:9px;}
  .dcnt{font-weight:900;font-size:12px;color:#0b2733;opacity:.8;display:inline-flex;gap:8px;}
  .dadd{width:26px;height:26px;border-radius:50%;background:rgba(15,15,20,.13);color:#0f0f14;font-size:18px;font-weight:900;border:none;cursor:pointer;line-height:1;}
  .cmt{display:flex;gap:6px;margin:12px 4px 0;}
  .cmt input{flex:1;border:none;border-radius:8px;padding:10px 12px;font-family:'Pretendard';font-size:14px;background:#fff;color:#111;}
  .cmt button{width:44px;border:none;border-radius:8px;background:var(--ink);color:#fff;font-size:20px;font-weight:900;cursor:pointer;}
</style>
</head>
<body>
  <div class="flag">🧪 주절주절 테스트</div>
  <div class="wrap">
    <div class="wm">demo<span class="silent">n</span>thly</div>
    <div class="seclabel">주절주절</div>

    <!-- 투표 공지 카드 (맨 위 고정 느낌) -->
    <div class="card">
      <div class="head">
        <span class="pin">📌</span>
        <div class="ttl">이달의 데모 투표<small>다음 demon'thly 를 골라주세요 · 6월</small></div>
        <div class="dday"><b>D-6</b><br>마감</div>
      </div>
      <div class="rows" id="rows"></div>
      <div class="foot"><button class="go" onclick="alert('테스트 — 전체 후보 보기/투표 화면')">후보 전체 보기 →</button></div>
    </div>

    <!-- 일반 앨범 카드 (스크린샷 그대로) — 공지 아래로 이어지는 피드 -->
    <div class="card">
      <div class="demohead"><span class="d">2026.07.02</span><span class="a">남유빈 조</span></div>
      <div class="drows">
        <div class="drow"><span class="dcell" style="--rc:#FFC94D"><b class="num">1</b>#발라드#우리들의발라드#이문세#1975#잠수이별</span><span class="dcnt"><span>▶ 0</span><span>🔖 0</span></span><button class="dadd">+</button></div>
        <div class="drow"><span class="dcell" style="--rc:#F06CA8"><b class="num">2</b>#여우야#ㅠㅠ</span><span class="dcnt"><span>▶ 2</span><span>🔖 0</span></span><button class="dadd">+</button></div>
      </div>
      <div class="cmt"><input placeholder="이 앨범에 한마디…"><button>+</button></div>
    </div>
  </div>

<script>
  var RC=['var(--c1)','var(--c2)','var(--c3)','var(--c4)'];
  var demos=[
    {nm:'이면', tags:'#발라드#임설아#이면#6월월평', votes:44, voted:false},
    {nm:'여우야', tags:'#여우야#ㅠㅠ#여름', votes:31, voted:false},
    {nm:'짝사랑', tags:'#트로트#뽕짝#짝사랑', votes:22, voted:false},
    {nm:'문틈', tags:'#김이든#문틈#6월월평', votes:17, voted:false}
  ];
  var rowsEl=document.getElementById('rows');
  function render(){
    var sorted=demos.slice().sort(function(a,b){return b.votes-a.votes;});
    rowsEl.innerHTML=sorted.slice(0,4).map(function(d,i){
      return '<div class="vrow" data-nm="'+d.nm+'">'+
        '<span class="cell" style="--rc:'+RC[i]+'"><b class="num">'+(i+1)+'</b><span class="tags">'+d.tags+'</span></span>'+
        '<span class="cnt">🗳️ '+d.votes+'</span>'+
        '<button class="vbtn'+(d.voted?' voted':'')+'" onclick="vote(\''+d.nm+'\',event)">'+(d.voted?'✓':'투표')+'</button>'+
      '</div>';
    }).join('');
  }
  window.vote=function(nm,e){
    var d=demos.find(function(x){return x.nm===nm;}); if(!d)return;
    if(d.voted){ d.voted=false; d.votes--; } else { d.voted=true; d.votes++;
      var p=document.createElement('div'); p.className='pop'; p.textContent='+1';
      var r=e.target.getBoundingClientRect(); p.style.left=(r.left+8)+'px'; p.style.top=(r.top-6)+'px';
      document.body.appendChild(p); setTimeout(function(){p.remove();},800);
    }
    render();
  };
  render();
</script>
</body>
</html>
