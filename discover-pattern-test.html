<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>발견 · 샘플 배경</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#0c0b10;color:#F4F4F7;font-family:'Pretendard',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:14px 0 40px;}
  .note{max-width:440px;font-size:11.5px;line-height:1.6;color:#c9b8ff;background:#1a1626;border:1px solid rgba(167,139,250,.3);border-radius:12px;padding:9px 12px;margin:0 12px 12px;text-align:center;}
  .note b{color:#fff;}

  .phone{position:relative;width:min(430px,94vw);aspect-ratio:9/18.2;border-radius:38px;background:#000;border:2px solid #221e2b;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  .scroll{position:absolute;inset:0;overflow-y:auto;scrollbar-width:none;background:#000;}
  .scroll::-webkit-scrollbar{display:none;}

  .band{position:relative;height:100%;}
  .slot{position:absolute;transform:translate(-50%,-50%) rotate(var(--rot,0deg));
        width:var(--w);height:var(--h);display:flex;align-items:center;justify-content:center;z-index:1;}
  .slot.info{z-index:5;}
  .shape{position:absolute;inset:0;width:100%;height:100%;}
  /* 샘플처럼 또렷한 스타버스트(뾰족한 별) */
  .burst{clip-path:polygon(50% 0%,61% 26%,87% 13%,74% 39%,100% 47%,79% 62%,90% 90%,61% 75%,50% 100%,39% 75%,10% 90%,21% 62%,0% 47%,26% 39%,13% 13%,39% 26%);}
  .tri{clip-path:polygon(50% 3%,3% 97%,97% 97%);}
  .spark{clip-path:polygon(50% 0%,58% 42%,100% 50%,58% 58%,50% 100%,42% 58%,0% 50%,42% 42%);}
  .circle{border-radius:50%;} .ellipse{border-radius:50%;}
  .square{border-radius:6px;} .semi{border-radius:999px 999px 0 0;}
  .stack .shape{background:none;}
  .stack .p{position:absolute;background:#F4F1E8;border:1.5px solid #cfc7b2;border-radius:3px;width:74%;height:74%;box-shadow:0 3px 8px rgba(0,0,0,.45);}
  .stack .p:nth-child(1){left:0;top:0;transform:rotate(-8deg);}
  .stack .p:nth-child(2){left:14%;top:12%;transform:rotate(4deg);}
  .stack .p:nth-child(3){left:26%;top:24%;transform:rotate(-3deg);}
  .notes{font-size:var(--w);line-height:1;font-weight:900;}
  .s-text{position:relative;z-index:2;text-align:center;font-weight:800;line-height:1.5;letter-spacing:-.2px;pointer-events:none;white-space:nowrap;}
  .tri-wrap .s-text{transform:translateY(28%);}  /* 삼각형은 글자를 넓은 아래쪽으로 */

  .scrollhint{position:absolute;left:0;right:0;bottom:12px;text-align:center;font-size:11px;color:rgba(255,255,255,.4);z-index:8;pointer-events:none;transition:opacity .4s;animation:bob 1.6s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
  .hint{font-size:11px;color:rgba(255,255,255,.4);margin-top:14px;text-align:center;max-width:410px;line-height:1.55;}
  .hint b{color:#c9b8ff;}
</style>
</head>
<body>
  <div class="note">🧪 <b>발견 · 샘플 배경</b> — 처음 주신 샘플의 멤피스 배치·레트로 색으로. 해시태그는 밝은 도형에(어두운 글씨), 판마다 살짝만 흔들림.</div>

  <div class="phone">
    <div class="scroll" id="scroll"></div>
    <div class="scrollhint" id="hint">↓ 쭉 내려보세요</div>
  </div>
  <div class="hint">샘플 구성 그대로 — 스타버스트·삼각형·종이더미·음표. 판마다 위치가 조금씩만 달라져요.</div>

<script>
  var INK='#1b1522';
  // ── 샘플 스크린샷의 배치(멤피스) 충실 재현. info=밝은 도형에만(어두운 글씨) ──
  var TPL = [
    {id:'s1', x:13,y:7,  w:58,h:38, cls:'ellipse', color:'#FFD24A'},
    {id:'s2', x:60,y:10, w:40,h:40, cls:'spark',   color:'#26C6C6'},
    {id:'s3', x:33,y:24, w:158,h:158, cls:'burst', color:'#E24A9C', info:1, fit:.5,  fitH:.46},
    {id:'s4', x:77,y:33, w:130,h:112, cls:'tri',   color:'#7FB2EC', info:1, fit:.56, fitH:.34},
    {id:'s5', x:17,y:45, w:78,h:78, cls:'stack',   color:'#F4F1E8'},
    {id:'s6', x:37,y:49, w:38,h:34, cls:'notes',   color:'#E24A9C', glyph:'♪'},
    {id:'s7', x:43,y:57, w:120,h:120, cls:'circle', color:'#86CE34', info:1, fit:.68, fitH:.62},
    {id:'s8', x:81,y:64, w:142,h:124, cls:'tri',   color:'#B49BEE', info:1, fit:.56, fitH:.34},
    {id:'s9', x:22,y:74, w:120,h:120, cls:'burst', color:'#F06CA8', info:1, fit:.5,  fitH:.46},
    {id:'s10',x:75,y:84, w:128,h:128, cls:'burst', color:'#E8433F'},
    {id:'s11',x:25,y:93, w:52,h:52, cls:'square',  color:'#FFD24A'},
    {id:'s12',x:92,y:89, w:52,h:30, cls:'semi',    color:'#F2913C'},
    {id:'s13',x:89,y:20, w:30,h:30, cls:'spark',   color:'#E24A9C'},
    {id:'s14',x:61,y:76, w:34,h:34, cls:'notes',   color:'#26C6C6', glyph:'♫'},
    // 살짝만 더 빽빽하게 — 빈 곳 채우는 작은 도형들
    {id:'a1', x:47,y:9,  w:46,h:46, cls:'burst',   color:'#FFD24A'},
    {id:'a2', x:10,y:31, w:40,h:40, cls:'spark',   color:'#E24A9C'},
    {id:'a3', x:91,y:46, w:50,h:44, cls:'tri',     color:'#26C6C6'},
    {id:'a4', x:58,y:45, w:32,h:32, cls:'notes',   color:'#86CE34', glyph:'♪'},
    {id:'a5', x:10,y:63, w:46,h:46, cls:'burst',   color:'#3E6FD9'},
    {id:'a6', x:52,y:89, w:42,h:42, cls:'spark',   color:'#F06CA8'}
  ];

  var TRACKS=[
    ['락','천둥','랩퍼의꿈'],['시티팝','새벽','드라이브'],['힙합','교실','탈출'],['발라드','여름','끝자락'],
    ['알앤비','보라빛','밤'],['팝','첫사랑','설렘'],['재즈','도현','재즈바'],['인디','새벽','편지'],
    ['트로트','막걸리','한잔'],['EDM','네온','드랍'],['포크','가을','낙엽'],['케이팝','너에게','닿기를'],
    ['로파이','비','빗소리'],['소울','재이','노래']
  ];

  var scroll=document.getElementById('scroll'), infoEls=[], BANDS=6, ti=0;

  for (var bi=0; bi<BANDS; bi++){
    var band=document.createElement('div'); band.className='band'; scroll.appendChild(band);
    var BW=band.clientWidth||340, BH=band.clientHeight||688;
    TPL.forEach(function(s){
      var el=document.createElement('div');
      el.className='slot'+(s.info?' info':'')+(s.cls==='stack'?' stack':'')+(s.cls==='tri'?' tri-wrap':'');
      // 판마다 살짝만 흔들기(위치 ±2.5%, 각도 ±7°), 프레임 밖 안 나가게 클램프
      var sz=Math.max(s.w,s.h), hw=(sz/2)/BW*100, hh=(sz/2)/BH*100;
      var nx=Math.max(hw+1, Math.min(99-hw, s.x+(Math.random()-0.5)*5));
      var ny=Math.max(hh+1, Math.min(99-hh, s.y+(Math.random()-0.5)*4));
      el.style.left=nx+'%'; el.style.top=ny+'%';
      el.style.setProperty('--w',s.w+'px'); el.style.setProperty('--h',s.h+'px'); el.style.setProperty('--rot',((s.rot||0)+(Math.random()-0.5)*14)+'deg');
      var inner='';
      if(s.cls==='stack') inner='<div class="shape"><div class="p"></div><div class="p"></div><div class="p"></div></div>';
      else if(s.cls==='notes') inner='<div class="notes" style="color:'+s.color+'">'+s.glyph+'</div>';
      else inner='<div class="shape '+s.cls+'" style="background:'+s.color+'"></div>';
      if(s.info){
        var tk=TRACKS[ti % TRACKS.length]; ti++;
        inner+='<div class="s-text" style="color:'+INK+'">#'+tk[0]+'<br>#'+tk[1]+'<br>#'+tk[2]+'</div>';
      }
      el.innerHTML=inner;
      if(s.info){ var te=el.querySelector('.s-text'); infoEls.push({te:te, maxW:s.w*s.fit, maxH:s.h*s.fitH}); }
      band.appendChild(el);
    });
  }

  // 해시태그가 도형 중앙 안에 들어오게 폰트 자동 축소(안 잘림)
  function fitAll(){
    infoEls.forEach(function(o){
      var fs=13, g=0; o.te.style.fontSize=fs+'px';
      while((o.te.offsetWidth>o.maxW || o.te.offsetHeight>o.maxH) && fs>7 && g++<40){ fs-=0.5; o.te.style.fontSize=fs+'px'; }
    });
  }
  fitAll();
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(fitAll);
  window.addEventListener('load', fitAll);

  scroll.addEventListener('scroll', function(){ var h=document.getElementById('hint'); if(scroll.scrollTop>40) h.style.opacity='0'; }, {passive:true});
</script>
</body>
</html>
