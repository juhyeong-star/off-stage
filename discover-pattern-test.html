<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>발견 · 배경패턴 + 자유배치</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#0c0b10;color:#F4F4F7;font-family:'Pretendard',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:14px 0 40px;}
  .note{max-width:440px;font-size:11.5px;line-height:1.6;color:#c9b8ff;background:#1a1626;border:1px solid rgba(167,139,250,.3);border-radius:12px;padding:9px 12px;margin:0 12px 12px;text-align:center;}
  .note b{color:#fff;}

  .phone{position:relative;width:min(430px,94vw);aspect-ratio:9/18.2;border-radius:38px;background:#050409;border:2px solid #221e2b;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  .scroll{position:absolute;inset:0;overflow-y:auto;scrollbar-width:none;background:#050409;}
  .scroll::-webkit-scrollbar{display:none;}

  .band{position:relative;height:100%;}
  /* 뒷배경: 은은한 고정 패턴(판마다 동일) */
  .bg{position:absolute;inset:0;opacity:.17;}
  /* 앞: 자유 배치(판마다 위치 다름) */
  .fg{position:absolute;inset:0;}

  .slot{position:absolute;transform:translate(-50%,-50%) rotate(var(--rot,0deg));
        width:var(--w);height:var(--h);display:flex;align-items:center;justify-content:center;z-index:2;}
  .fg .slot.info{z-index:5;}
  .shape{position:absolute;inset:0;width:100%;height:100%;}
  .fg .shape{filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));}
  .burst{clip-path:polygon(50% 0%,60% 25%,85% 15%,75% 40%,100% 50%,75% 60%,85% 85%,60% 75%,50% 100%,40% 75%,15% 85%,25% 60%,0% 50%,25% 40%,15% 15%,40% 25%);}
  .tri{clip-path:polygon(50% 2%,2% 98%,98% 98%);}
  .spark{clip-path:polygon(50% 0%,58% 42%,100% 50%,58% 58%,50% 100%,42% 58%,0% 50%,42% 42%);}
  .circle{border-radius:50%;}
  .square{border-radius:5px;}
  .notes{font-size:var(--w);line-height:1;font-weight:900;}
  .fg .notes{filter:drop-shadow(0 3px 7px rgba(0,0,0,.5));}
  .s-text{position:relative;z-index:2;text-align:center;font-weight:800;line-height:1.45;letter-spacing:-.2px;pointer-events:none;white-space:nowrap;}

  .scrollhint{position:absolute;left:0;right:0;bottom:12px;text-align:center;font-size:11px;color:rgba(255,255,255,.4);z-index:8;pointer-events:none;transition:opacity .4s;animation:bob 1.6s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
  .hint{font-size:11px;color:rgba(255,255,255,.4);margin-top:14px;text-align:center;max-width:410px;line-height:1.55;}
  .hint b{color:#c9b8ff;}
</style>
</head>
<body>
  <div class="note">🧪 <b>발견 · 배경패턴 + 자유배치</b> — 뒷배경은 <b>일정 패턴(유지)</b>, 앞의 해시태그·큰 도형은 <b>매 화면 자유롭게</b> 배치돼 반복 느낌 없이 이어져요.</div>

  <div class="phone">
    <div class="scroll" id="scroll"></div>
    <div class="scrollhint" id="hint">↓ 쭉 내려보세요</div>
  </div>
  <div class="hint">배경 별자리는 그대로인데 <b>앞 도형은 판마다 왼쪽·오른쪽 자유롭게</b> — 같은 패턴 반복 아님. 안 겹치게 자동 배치.</div>

<script>
  var INK='#211a29';
  var INFOCOL=['#FF80BC','#45DCD8','#B7E85A','#FFD453','#FF9A6E','#9A8CF0','#5CC7F0'];
  var FGDECOR=[
    {cls:'burst',w:58,color:'#9A4FF0'},{cls:'tri',w:60,color:'#FF9A2E'},{cls:'spark',w:46,color:'#12C6D6'},
    {cls:'burst',w:54,color:'#FA4DA0'},{cls:'notes',w:34,color:'#FF6038',glyph:'♫'},{cls:'tri',w:56,color:'#3D97F5'},
    {cls:'notes',w:32,color:'#B7E85A',glyph:'♪'},{cls:'spark',w:42,color:'#FFD453'}
  ];
  // 뒷배경 고정 패턴(deterministic → 판마다 동일)
  var BGCOL=['#FF80BC','#45DCD8','#B7E85A','#FFD453','#9A8CF0','#FF9A6E'];
  var BGSH=['spark','circle','tri','square'];
  var BG=[]; (function(){ var xs=[15,38,62,85], ys=[9,23,37,51,65,79,92], k=0;
    ys.forEach(function(y,r){ xs.forEach(function(x){ BG.push({x:x+(r%2?4:-3), y:y, w:16+(k*5)%12, cls:BGSH[k%4], color:BGCOL[k%6], rot:(k*41)%50-25}); k++; }); }); })();

  var TRACKS=[
    ['락','천둥','랩퍼의꿈'],['시티팝','새벽','드라이브'],['힙합','교실','탈출'],['발라드','여름','끝자락'],
    ['알앤비','보라빛','밤'],['팝','첫사랑','설렘'],['재즈','도현','재즈바'],['인디','새벽세시','편지'],
    ['트로트','막걸리','한잔'],['EDM','네온','드랍'],['포크','가을','낙엽'],['케이팝','너에게','닿기를'],
    ['로파이','비','빗소리'],['소울','재이','노래']
  ];

  var scroll=document.getElementById('scroll'), BANDS=6, ti=0, built=false;

  function mkShape(cls,color,glyph){
    if(cls==='notes') return '<div class="notes" style="color:'+color+'">'+glyph+'</div>';
    return '<div class="shape '+cls+'" style="background:'+color+'"></div>';
  }
  // 자유 배치: 안 겹치게 랜덤(못 찾으면 겹침 최소 지점). 반지름 px.
  function freePlace(items, W, H){
    var out=[];
    items.forEach(function(it){
      var best=null, bestM=-1e9, r=it.r, pad=it.pad;
      for(var t=0;t<90;t++){
        var x=r+7+Math.random()*(W-2*r-14), y=r+7+Math.random()*(H-2*r-14), m=1e9;
        for(var j=0;j<out.length;j++){ var d=Math.hypot(x-out[j].x,y-out[j].y)-(r+out[j].r); if(d<m)m=d; }
        if(m>=pad){ best={x:x,y:y}; break; }
        if(m>bestM){ bestM=m; best={x:x,y:y}; }
      }
      it.x=best.x; it.y=best.y; out.push({x:best.x,y:best.y,r:r});
    });
  }

  function buildAll(){
    if(built) return; built=true;
    for(var bi=0; bi<BANDS; bi++){
      var band=document.createElement('div'); band.className='band'; scroll.appendChild(band);
      // 뒷배경(고정 패턴)
      var bg=document.createElement('div'); bg.className='bg';
      BG.forEach(function(s){ var el=document.createElement('div'); el.className='slot'; el.style.left=s.x+'%'; el.style.top=s.y+'%'; el.style.setProperty('--w',s.w+'px'); el.style.setProperty('--h',s.w+'px'); el.style.setProperty('--rot',s.rot+'deg'); el.innerHTML=mkShape(s.cls,s.color); bg.appendChild(el); });
      band.appendChild(bg);
      // 앞(자유 배치)
      var fg=document.createElement('div'); fg.className='fg'; band.appendChild(fg);
      var W=band.clientWidth||360, H=band.clientHeight||728;
      var items=[];
      // 정보 원형 7개 — 해시태그, 글에 맞춰 크기
      for(var k=0;k<7;k++){
        var tk=TRACKS[ti % TRACKS.length]; ti++;
        var el=document.createElement('div'); el.className='slot info';
        el.innerHTML='<div class="shape circle" style="background:'+INFOCOL[k%INFOCOL.length]+'"></div><div class="s-text" style="color:'+INK+'">#'+tk[0]+'<br>#'+tk[1]+'<br>#'+tk[2]+'</div>';
        fg.appendChild(el);
        var te=el.querySelector('.s-text'); te.style.fontSize='11px'; te.style.whiteSpace='nowrap';
        var d=Math.round(Math.max(86, Math.min(146, Math.max(te.offsetWidth/0.72, te.offsetHeight/0.66))));
        el.style.setProperty('--w',d+'px'); el.style.setProperty('--h',d+'px'); el.style.setProperty('--rot',((k*53)%30-15)+'deg');
        items.push({el:el, r:d/2, pad:12});
      }
      // 앞 장식 7개
      for(var j=0;j<7;j++){
        var dc=FGDECOR[(bi*3+j) % FGDECOR.length];
        var e2=document.createElement('div'); e2.className='slot'; e2.style.setProperty('--w',dc.w+'px'); e2.style.setProperty('--h',dc.w+'px'); e2.style.setProperty('--rot',((j*67)%40-20)+'deg');
        e2.innerHTML=mkShape(dc.cls,dc.color,dc.glyph);
        fg.appendChild(e2);
        items.push({el:e2, r:dc.w/2, pad:4});
      }
      freePlace(items, W, H);
      items.forEach(function(it){ it.el.style.left=(it.x/W*100)+'%'; it.el.style.top=(it.y/H*100)+'%'; });
    }
  }
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(buildAll);
  setTimeout(buildAll, 650);

  scroll.addEventListener('scroll', function(){ var h=document.getElementById('hint'); if(scroll.scrollTop>40) h.style.opacity='0'; }, {passive:true});
</script>
</body>
</html>
