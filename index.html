  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://vayzhmaggwpkbsrrsdqt.supabase.co" crossorigin>
  <!-- Google Fonts — non-render-blocking (swap fallback fonts in until loaded) -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Gaegu:wght@400;700&family=Caveat:wght@400;700&family=Archivo+Black&family=Bebas+Neue&family=Press+Start+2P&family=VT323&family=Silkscreen:wght@400;700&family=Noto+Serif+KR:wght@400;500;700&family=Nanum+Pen+Script&family=Black+Han+Sans&display=swap" onload="this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Gaegu:wght@400;700&family=Caveat:wght@400;700&family=Archivo+Black&family=Bebas+Neue&family=Press+Start+2P&family=VT323&family=Silkscreen:wght@400;700&family=Noto+Serif+KR:wght@400;500;700&family=Nanum+Pen+Script&family=Black+Han+Sans&display=swap"></noscript>
  <!-- Local fonts. NanumJungShik(손글씨)는 원본 5MB TTF → 한글 서브셋 woff2(약 2.7MB)로
       줄이고 preload + display:block 으로, 폴백(이상한 글꼴) 없이 로드되면 바로 손글씨 표시. -->
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/woff2/PretendardVariable.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/NanumJungShik.subset.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    @font-face {
      /* Pretendard 가변 폰트 — 45~920 전 웨이트를 한 파일로. 예전엔 Regular.ttf(400) 하나뿐이라
         굵은 글씨가 '가짜 볼드' 합성 → iOS Safari 와 데스크탑(Chrome)이 서로 다르게 렌더됐음.
         이제 진짜 웨이트라 기기 상관없이 동일. CDN 실패 시 로컬 Regular.ttf 로 폴백(=예전 동작). */
      font-family: 'Pretendard';
      font-style: normal;
      font-weight: 45 920;
      font-display: swap;
      src: local('Pretendard Variable'),
           url('https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/woff2/PretendardVariable.woff2') format('woff2-variations'),
           url('/fonts/Pretendard-Regular.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Nanum JungShik';
      font-style: normal;
      font-weight: 400;
      /* block = 폰트 로드 전엔 폴백을 '보여주지 않고' 잠깐 숨겼다가 로드되면 손글씨로 표시.
         preload + 서브셋(약 2.7MB)이라 거의 즉시 로드 → 폴백(이상한 글꼴) 깜빡임 없음.
         (optional = 캐시 없으면 폴백 고정 → '글꼴 이상' 원인이었음. swap = 폴백 깜빡임.) */
      font-display: block;
      src: url('/fonts/NanumJungShik.subset.woff2') format('woff2'),
           url('/fonts/NanumJungShik.ttf') format('truetype');
    }
  </style>
  <!-- Remixicon — non-render-blocking -->
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" onload="this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"></noscript>
  <link rel="stylesheet" href="css/global.css?v=975">
</head>

  <!-- Player -->

    <button class="player-expand-btn" id="player-expand-btn" aria-label="플레이어 펼치기" onclick="window.togglePlayerExpand && window.togglePlayerExpand(event)">

    <div class="player-controls">

      <button class="control-btn seek-btn" type="button" aria-label="10초 앞으로" title="10초 앞으로 (→)" onclick="event.stopPropagation(); window.playerSeek && window.playerSeek(10)"><b>10</b><i class="ri-arrow-go-forward-line"></i></button>
      <button class="control-btn" aria-label="다음 곡"><i class="ri-skip-forward-fill"></i></button>

    <div class="progress-container">

    </div>
    <div class="player-track-info">
      <div class="player-art">
      <img src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' fill='%23333'/%3E%3C/svg%3E" alt="Cover" class="player-cover" id="player-cover" width="48" height="48" loading="lazy" decoding="async" onclick="event.stopPropagation(); window.playerArtOrExpand && window.playerArtOrExpand(event)" title="펼치기 / 아티스트" style="cursor:pointer;">
        <div class="player-tags" id="player-tags" aria-hidden="true"></div>
        <span class="player-pulse" aria-hidden="true"></span>
      </div>
      <div class="player-text" onclick="window.playerArtOrExpand && window.playerArtOrExpand(event)" title="펼치기 / 아티스트" style="cursor:pointer;">

        <div class="player-hashline" id="player-hashtags" aria-hidden="true"></div>
        <div class="player-lyric empty" id="player-lyric">가사 없음</div>
        <div class="player-wave" id="player-wave" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
      </div>

    <!-- 담기 — 현재 곡을 즐겨찾기에 모으기. 음향(볼륨) 옆에 배치 (사용자 요청). -->
    <button class="player-collect-btn" id="player-collect-btn" type="button" aria-label="담기"
            title="즐겨찾기에 담기"
            onclick="event.stopPropagation(); window.togglePlayerCollect && window.togglePlayerCollect(this)">
      <i class="ri-add-line"></i>
      <span class="player-collect-label"><span data-i18n-ko>담기</span><span data-i18n-en>Collect</span></span>
    </button>
    <!-- 공유 — 현재 곡 링크 공유. 미니바: 담기 옆 / 풀스크린: 오른쪽 중간 (사용자 요청). -->
    <button class="player-share-btn" id="player-share-btn" type="button" aria-label="노래 공유"

            onclick="event.stopPropagation(); window.sharePlayerTrack && window.sharePlayerTrack(event)">

      <span class="player-share-label"><span data-i18n-ko>공유</span><span data-i18n-en>Share</span></span>

    <!-- 볼륨 컨트롤 — PC 에서만 표시 (모바일은 OS 볼륨 키 사용).

  <!-- 풀스크린 플레이어 카드 — 테스트(#player-card) 디자인 그대로. 미니바 탭/스와이프업/펼치기 → openPlayerFs -->

    </div>
    <div class="pfs-stage">

        <span class="pfs-ping" aria-hidden="true"></span>
        <div class="pfs-tags" id="pfs-tags"></div>
      </div>
      <div class="pfs-meta">
        <div class="pfs-lcd">
          <h2 class="pfs-title" id="pfs-title" onclick="window.goToPlayerArtist && window.goToPlayerArtist(event)">선택된 곡 없음</h2>
          <p class="pfs-artist" id="pfs-artist" onclick="window.goToPlayerArtist && window.goToPlayerArtist(event)">-</p>
          <div class="pfs-lyrics empty" id="pfs-lyrics">가사 없음</div>
        </div>
        <div class="pfs-viz" id="pfs-viz" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
      </div>
    </div>
    <div class="pfs-bottom">
      <div class="pfs-progress">
        <div class="pfs-track"><div class="pfs-fill" id="pfs-fill"></div></div>
        <div class="pfs-times"><span id="pfs-cur">0:00</span><span id="pfs-tot">0:00</span></div>
      </div>
      <div class="pfs-controls">
        <button class="pfs-side" type="button" aria-label="셔플" onclick="window.toggleShuffle && window.toggleShuffle()"><i class="ri-shuffle-line"></i></button>
        <button class="pfs-seek" type="button" aria-label="10초 뒤로" onclick="window.playerSeek && window.playerSeek(-10)"><i class="ri-rewind-fill"></i><b>10</b></button>
        <button class="pfs-play" id="pfs-play" type="button" aria-label="재생/일시정지" onclick="window._pfsTogglePlay && window._pfsTogglePlay()"><i class="ri-play-fill"></i></button>
        <button class="pfs-seek" type="button" aria-label="10초 앞으로" onclick="window.playerSeek && window.playerSeek(10)"><b>10</b><i class="ri-speed-fill"></i></button>
        <button class="pfs-side" type="button" aria-label="공유" onclick="window.sharePlayerTrack && window.sharePlayerTrack(event)"><i class="ri-share-forward-fill"></i></button>
      </div>
    </div>
  </div>

  <!-- 가운데 볼륨 토스트 — 키보드 단축키 (↑/↓/M) 누를 때 1.5초 등장 -->
  <div id="vol-toast" aria-hidden="true">
    <i class="ri-volume-up-fill vol-toast-icon"></i>
    <div class="vol-toast-bar"><div class="vol-toast-fill" id="vol-toast-fill"></div></div>
    <span class="vol-toast-pct" id="vol-toast-pct">60%</span>
  </div>
