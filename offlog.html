<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>OFFLOG — 시안 v34</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Black+Han+Sans&family=Gaegu:wght@700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000; --card:#161618; --card2:#1F1F23; --line:#2A2A2E;
  --txt:#F5F5F2; --muted:#8A8A90;
  --pink:#FF5FE0; --mint:#53E0C8; --lemon:#FFE94A;
  --paper:#FFF3A6; --paper2:#CFEBFF; --ink:#2B2417;
  --green:#9FE84C; --shpink:#F06CB4; --coral:#E8695A;
  --blue:#7B8BE8; --yellow:#F2C94C; --purple:#B48CE8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#050505;min-height:100vh;display:flex;justify-content:center;padding:16px 8px 40px;
  font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased}
.phone{width:100%;max-width:400px;background:var(--bg);color:var(--txt);border-radius:44px;border:3px solid var(--pink);
  box-shadow:0 0 0 1px rgba(255,95,224,.35),0 0 38px rgba(255,95,224,.35);overflow:hidden;position:relative}
.screen{padding:16px 14px 150px;height:840px;overflow-y:auto;scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}

/* ── 헤더 ── */
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;min-height:38px}
.brand{font-family:'Fredoka';font-weight:600;font-size:17px;letter-spacing:.14em;color:var(--mint)}
.htitle{font-size:15px;font-weight:700;flex:1;text-align:center}
.htitle small{display:block;font-size:10.5px;color:var(--muted);font-weight:400;margin-top:1px}
.circ{width:38px;height:38px;border-radius:50%;background:var(--card2);border:none;color:var(--txt);font-size:15px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;flex-shrink:0}
.circ:active{transform:scale(.92)}
.circ:focus-visible{outline:2px solid var(--pink)}
.loginpill{background:transparent;border:1px solid var(--mint);color:var(--mint);border-radius:99px;padding:0 13px;height:34px;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer;flex-shrink:0}
.hd .r{display:flex;gap:7px}

/* ── Demo 업로드 ── */
.upfile{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px;margin-bottom:14px}
.upwv{display:flex;align-items:center;gap:2px;height:60px;margin-bottom:12px}
.upwv i{flex:1;border-radius:1.5px;background:var(--mint);opacity:.8;height:calc(var(--h)*1%);min-height:2px}
.upmeta{display:flex;align-items:center;gap:8px}
.upmeta b{font-size:13.5px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upmeta small{font-size:11px;color:var(--muted);font-family:'Black Han Sans';flex-shrink:0}
.upx{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:2px 4px;flex-shrink:0}
.upx:focus-visible{outline:2px solid var(--pink);border-radius:4px}
.fld{margin-bottom:16px}
.fld label{display:block;font-size:11px;color:var(--muted);font-weight:700;margin:0 4px 7px}
.fld input{width:100%;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px;
  color:var(--txt);font-family:inherit;font-size:14px}
.fld input:focus{outline:none;border-color:var(--mint)}
.tagadd{background:transparent;border:1px dashed var(--line);color:var(--muted);border-radius:99px;
  padding:5px 12px;font-size:11.5px;cursor:pointer;font-family:inherit}
.tagadd:hover{border-color:var(--mint);color:var(--mint)}

/* ── 이벤트 신청 ── */
.opt{font-style:normal;color:#5a5a62;font-weight:400;margin-left:4px}
.rulen{font-size:10.5px;color:var(--muted);text-align:center;margin:9px 0 0}
.evrow{width:100%;display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:12px 13px;margin-bottom:7px;cursor:pointer;font-family:inherit;color:var(--txt);text-align:left}
.evrow.on{border-color:var(--mint)}
.evrow:focus-visible{outline:2px solid var(--mint)}
.evck{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--line);flex-shrink:0;position:relative}
.evrow.on .evck{border-color:var(--mint);background:var(--mint)}
.evrow.on .evck::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#04231d;font-weight:900}
.evnm{flex:1;min-width:0}
.evnm b{font-size:13px;font-weight:700;display:block}
.evnm small{font-size:10.5px;color:var(--muted)}
.evwarn{font-size:9.5px;color:var(--lemon);flex-shrink:0}

.applied{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--mint);
  border-radius:13px;padding:13px;font-size:13px}
.ap-dot{width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint);flex-shrink:0}
.applied b{color:var(--mint)}
.ap-ch{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:99px;
  padding:5px 13px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.ap-ch:hover{border-color:var(--mint);color:var(--mint)}
.ap-ch:focus-visible{outline:2px solid var(--mint)}

/* ── 곡 선택 시트 ── */
.sheet-bd{position:absolute;inset:0;z-index:44;background:rgba(0,0,0,.6);backdrop-filter:blur(2px)}
.pksheet{position:absolute;left:0;right:0;bottom:0;z-index:45;background:var(--card2);
  border-top:1px solid var(--line);border-radius:24px 24px 0 0;padding:16px 14px 26px;
  animation:up .3s cubic-bezier(.34,1.3,.64,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pkhd{display:flex;align-items:center;margin-bottom:12px}
.pkhd b{font-size:14.5px;font-weight:700}
.pkx{margin-left:auto;background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:3px}
.pkx:focus-visible{outline:2px solid var(--pink);border-radius:5px}
.pkwarn{background:rgba(255,233,74,.09);border:1px solid rgba(255,233,74,.28);border-radius:11px;
  padding:9px 12px;font-size:11.5px;color:var(--lemon);margin-bottom:10px}
.pkwarn b{font-weight:700}
.pkrow{width:100%;display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:11px 13px;margin-bottom:7px;cursor:pointer;font-family:inherit;color:var(--txt);text-align:left}
.pkrow:hover{border-color:var(--mint)}
.pkrow.cur{border-color:var(--mint)}
.pkrow:focus-visible{outline:2px solid var(--mint)}
.pkplay{width:28px;height:28px;border-radius:50%;background:var(--mint);color:#04231d;font-size:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.pknm{flex:1;min-width:0}
.pknm b{font-size:13.5px;font-weight:700;display:block}
.pknm small{font-size:10px;color:var(--muted)}
.pkdur{font-family:'Black Han Sans';font-size:11.5px;color:var(--muted);flex-shrink:0}
.pkcur{font-size:9.5px;color:var(--mint);flex-shrink:0}
.pknote{font-size:10.5px;color:var(--muted);text-align:center;margin-top:11px}

/* ── 본인만 보이는 것 ── */
.mark .t{display:flex;align-items:center;gap:6px}
.mark.r .t{justify-content:flex-end}
.edit{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:0 3px;
  letter-spacing:1px;line-height:1;opacity:.55}
.edit:hover{opacity:1;color:var(--mint)}
.edit:focus-visible{outline:2px solid var(--mint);border-radius:4px}

/* ── 작품 소속 칩 — 이 로그가 어느 작품 것인지 (표시 전용) ── */
.wchip{background:var(--mint);border:1px solid var(--mint);color:#04231d;border-radius:99px;
  padding:2px 8px;font-size:9.5px;font-weight:700;font-family:inherit;line-height:1.5;
  max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── 곡 안에서 로그 담기 ── */
.sechd{display:flex;align-items:center;justify-content:space-between;margin:20px 4px 10px}
.pullbtn{background:transparent;border:1px solid var(--mint);color:var(--mint);border-radius:99px;
  padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.pullbtn:focus-visible{outline:2px solid var(--mint)}
.plrow.on{border-color:var(--mint);background:rgba(83,224,200,.06)}
.plck{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--line);flex-shrink:0;position:relative}
.plrow.on .plck{border-color:var(--mint);background:var(--mint)}
.plrow.on .plck::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#04231d;font-weight:900}
.plth{width:32px;height:32px;border-radius:8px;flex-shrink:0;background-size:cover;background-color:#22222a;
  display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted)}
.plth.paper{background:var(--paper);color:var(--ink)}
.plth.snd{background:linear-gradient(150deg,#1e1e26,#141419);color:var(--mint)}
.cta:disabled{opacity:.35;cursor:default}

/* ── 발매 ── */
.pksheet.tall{max-height:76%;overflow-y:auto;scrollbar-width:none}
.pksheet.tall::-webkit-scrollbar{display:none}
.pksub{font-size:10px;color:var(--muted);margin-left:7px}
.rsec{font-size:11px;color:var(--muted);font-weight:700;margin:15px 4px 8px}
.rsec:first-of-type{margin-top:4px}
.ubox{width:100%;display:flex;align-items:center;gap:11px;background:var(--card);border:1.5px dashed var(--line);
  border-radius:14px;padding:13px;cursor:pointer;font-family:inherit;color:var(--txt);text-align:left}
.ubox:hover{border-color:var(--mint)}
.ubox.on{border-style:solid;border-color:var(--mint)}
.ubox:focus-visible{outline:2px solid var(--mint)}
.ub-ic{width:34px;height:34px;border-radius:9px;background:var(--card2);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--mint)}
.artimg{width:44px;height:44px;border-radius:8px;flex-shrink:0;background-size:cover;background-position:center}
.ub-t{flex:1;min-width:0}
.ub-t b{font-size:13px;font-weight:700;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ub-t small{font-size:10px;color:var(--muted)}
.ub-ok{color:var(--mint);font-size:14px;flex-shrink:0}
.instck{width:100%;display:flex;align-items:center;gap:9px;background:none;border:none;color:var(--txt);
  font-family:inherit;font-size:12.5px;cursor:pointer;padding:4px 4px 10px}
.instck.on{color:var(--mint)}
.instck.on .evck{border-color:var(--mint);background:var(--mint)}
.instck.on .evck::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#04231d;font-weight:900}
.instck:focus-visible{outline:2px solid var(--mint);border-radius:8px}
.lyr{width:100%;min-height:110px;background:var(--card);border:1px solid var(--line);border-radius:13px;
  padding:12px;color:var(--txt);font-family:inherit;font-size:12.5px;line-height:1.6;resize:vertical}
.lyr:focus{outline:none;border-color:var(--mint)}
.crow{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.clab{font-size:11.5px;color:var(--muted);width:48px;flex-shrink:0;font-weight:700}
.cin{flex:1;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 11px;
  color:var(--txt);font-family:inherit;font-size:12.5px}
.cin:focus{outline:none;border-color:var(--mint)}
.missn{font-size:11px;color:var(--coral);text-align:center;margin-top:9px}
.relbtn{width:calc(100% - 24px);background:transparent;border:1.5px solid var(--lemon);color:var(--lemon);border-radius:13px;
  padding:13px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;margin:0 12px 12px}
.relbtn:focus-visible{outline:2px solid #fff}
.stagebtn{width:calc(100% - 24px);background:transparent;border:1.5px solid var(--mint);color:var(--mint);
  border-radius:13px;padding:13px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;margin:0 12px 8px}
.stagebtn:focus-visible{outline:2px solid #fff}
/* VOTE 신청 — 로그 스트림과 분리된 하단 독립 CTA. 스토리를 다 보고 난 뒤의 자리 */
.votecta{margin:18px 0 8px;text-align:center}
.votecta .stagebtn.full{width:100%;margin:0}
.votecta small{display:block;margin-top:9px;font-size:10.5px;color:var(--muted)}
.reldone{display:flex;align-items:center;gap:8px;margin:0 12px 12px;padding:11px 13px;background:var(--card2);
  border:1px solid var(--line);border-radius:12px;font-size:11.5px;color:var(--muted)}
.rdate{width:100%;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px;
  color:var(--txt);font-family:'Black Han Sans';font-size:13.5px;color-scheme:dark}
.rdate:focus{outline:none;border-color:var(--mint)}
/* 공연 이벤트 참여 선택 (발매 시 — 유통사 표시 대신) */
.evpick{display:flex;flex-direction:column;gap:7px}
.evopt{width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:11px 13px;font-family:inherit;color:var(--txt);min-height:44px}
.evopt b{display:block;font-size:13.5px;font-weight:800}
.evopt small{display:block;color:var(--muted);font-size:11px;margin-top:2px}
.evopt.on{border-color:var(--mint);background:rgba(83,224,200,.08)}
.evopt.on b{color:var(--mint)}
.evopt:focus-visible{outline:2px solid var(--mint)}
.relsum{font-size:11.5px;color:var(--muted);text-align:center;margin:18px 0 12px;line-height:1.5}
.relsum b{color:var(--mint)}
.profol{margin:8px 0 0;font-size:11.5px;padding:6px 18px}
.profol.on{background:var(--mint);color:#04231d}

/* ── 슬라이드 뷰 — 한 화면에 로그 하나. 위아래로 넘긴다 ── */
.slwrap{position:absolute;left:0;right:0;top:0;bottom:64px;z-index:40;background:#000;
  overflow-y:auto;scroll-snap-type:y mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.slwrap::-webkit-scrollbar{display:none}
.sl{height:100%;scroll-snap-align:start;scroll-snap-stop:always;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center}
.sl .bgimg{position:absolute;inset:0;background-size:cover;background-position:center}
.sl.paper{background:var(--paper)}
.sl.paper.b{background:var(--paper2)}
.sl.snd{background:linear-gradient(165deg,#17171d,#0a0a0e)}
.slwho{position:absolute;top:16px;left:16px;z-index:6;display:flex;align-items:center;gap:8px;
  font-size:13.5px;font-weight:700;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.7)}
.sl.paper .slwho{color:var(--ink);text-shadow:none}
.slfol{background:transparent;border:1px solid var(--mint);color:var(--mint);border-radius:99px;
  padding:4px 11px;font-size:10.5px;font-weight:700;cursor:pointer;font-family:inherit;margin-left:3px}
.slfol.on{background:var(--mint);color:#04231d}
.slfol:focus-visible{outline:2px solid #fff}
/* (.slmore 는 우측 상단 .sldots 로 통합 — 제거) */
.slmid{position:relative;z-index:3;text-align:center;padding:0 34px;width:100%}
.slts{font-family:'Black Han Sans';font-size:46px;letter-spacing:1px;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.8)}
.sl.snd .slts{font-size:34px;color:rgba(255,255,255,.55);text-shadow:none}
.sl.paper .slts{color:rgba(43,36,23,.3);text-shadow:none;font-size:17px;margin-bottom:14px}
.slcap{font-size:16px;color:#fff;text-shadow:0 1px 10px rgba(0,0,0,.85);margin-top:4px;line-height:1.4}
.sl.snd .slcap{color:#fff;text-shadow:none}
.slnote{font-family:'Gaegu';font-weight:700;font-size:27px;line-height:1.5;color:var(--ink)}
.slwave{display:flex;align-items:center;gap:3px;height:96px;margin:22px auto 18px;max-width:290px}
.slwave i{flex:1;background:#3a3a44;border-radius:2px;height:calc(var(--h)*1%);transform-origin:center;min-height:2px}
.sl.playing .slwave i{background:var(--mint);animation:wv 1s ease-in-out infinite;animation-delay:calc(var(--d)*-.09s)}
.slpill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);
  border-radius:99px;padding:8px 18px;font-size:13px;color:#fff;cursor:pointer;font-family:inherit;margin-top:8px}
.slpill b{font-family:'Black Han Sans';font-weight:400;letter-spacing:.5px}
.slpill em{font-style:normal;color:var(--mint)}
.slrx{display:flex;justify-content:center;align-items:center;gap:11px;margin-top:20px;z-index:6}
.sl.paper .slrx .rxn{color:rgba(43,36,23,.55)}
.slroom{display:flex;gap:8px;padding:0 16px;width:100%;z-index:3;position:relative}
.slroom .rm{width:auto;flex:1;height:190px}
.slhint{position:absolute;bottom:64px;left:50%;transform:translateX(-50%);z-index:6;color:rgba(255,255,255,.3);
  font-size:19px;animation:bounce 1.8s ease-in-out infinite;pointer-events:none}
@keyframes bounce{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,5px)}}
/* 오버레이 위 원형 버튼 = 전부 같은 크기(42px). 닫기·담기 등 어디서나 동일하게 */
.slx,.camx,.sldots{position:absolute;top:14px;z-index:8;width:42px;height:42px;border-radius:50%;
  background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.16);color:#fff;font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1;padding:0}
.slx,.camx{right:14px}
.sldots{right:66px}                                   /* ✕ 왼쪽에 나란히 */
.slx:active,.camx:active,.sldots:active{transform:scale(.92)}
.slx:focus-visible,.camx:focus-visible,.sldots:focus-visible{outline:2px solid #fff}

.showhint{font-size:10.5px;color:#55555d;text-align:center;margin-top:10px}

/* ── ♪ 탭 세그먼트: LIST | 투표 ── */
.lseg{display:flex;background:var(--card);border-radius:99px;padding:4px;margin-bottom:16px}
.lseg button{flex:1;background:none;border:none;color:var(--muted);font-family:'Fredoka';font-weight:600;
  letter-spacing:.12em;font-size:12px;padding:9px 0;border-radius:99px;cursor:pointer}
.lseg button.on{background:var(--card2);color:var(--txt)}
.lseg button:focus-visible{outline:2px solid var(--mint)}
/* 도형이 카테고리다: ◇음원 ○공연 ⬡추천 */
.vcats{display:flex;gap:8px;margin-bottom:18px}
.vcat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:13px 0 11px;
  cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:border-color .25s,transform .2s}
.vcat:hover{transform:translateY(-2px)}
.vcat small{font-size:10.5px;font-weight:700;color:var(--muted)}
.vcat.on{border-color:rgba(255,233,74,.5);background:linear-gradient(170deg,rgba(255,233,74,.06),transparent 65%),var(--card)}
.vcat.on small{color:var(--lemon)}
.vcat.on .vcsh{filter:drop-shadow(0 0 9px rgba(255,233,74,.5))}
.vcat:focus-visible{outline:2px solid var(--mint)}
.vcsh{display:flex}
.rhead{text-align:center;margin:6px 0 13px}
.rtitle{font-family:'Black Han Sans';font-size:17px;letter-spacing:.5px;display:flex;align-items:center;
  justify-content:center;gap:7px;flex-wrap:wrap}
.rtitle i{font-style:normal;color:var(--lemon);font-size:12px}
.rcd{font-family:'Black Han Sans';font-size:11.5px;color:var(--lemon);letter-spacing:.5px}
.rwhat{font-size:11.5px;color:var(--txt);margin-top:5px;line-height:1.5}
.rprize{font-size:10.5px;color:var(--mint);margin-top:3px}
.crow2{background:var(--card);border:1px solid transparent;border-radius:18px;margin-bottom:9px;overflow:hidden;
  cursor:pointer;transition:transform .2s,border-color .25s}
.crow2:hover{transform:translateY(-2px);border-color:var(--line)}
.crow2.voted{border-color:rgba(83,224,200,.4)}
.crow2.top{border-color:rgba(255,233,74,.4)}
.crow2.top .cshape{filter:drop-shadow(0 0 8px rgba(255,233,74,.55))}
.chd{display:flex;align-items:center;gap:10px;padding:11px 12px;cursor:pointer}
.cshape{flex-shrink:0;display:flex;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.cplay{width:30px;height:30px;border-radius:50%;background:transparent;border:1.5px solid var(--mint);
  color:var(--mint);font-size:10px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.cplay.on{background:var(--mint);color:#04231d}
.cinfo{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.cttl{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.cinfo b{font-size:13.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:170px}
.cinfo small{font-size:10.5px;color:var(--muted)}
.cprev{font-size:11px;color:#9a9aa0;margin-top:1px;overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;display:block;max-width:100%}
.cprev.note{font-family:'Gaegu';font-weight:700;color:#c7c7cc;font-size:12.5px}
.cprev.snd{color:var(--mint)}
.cprev.empty{color:#4a4a52;font-style:italic}
.toptag{font-style:normal;font-size:8.5px;font-weight:700;color:#241f00;background:var(--lemon);
  border-radius:99px;padding:1.5px 6px;flex-shrink:0;white-space:nowrap}
.mytag{font-style:normal;font-size:8.5px;font-weight:700;color:var(--mint);
  border:1px solid rgba(83,224,200,.35);border-radius:99px;padding:1px 5px;flex-shrink:0;white-space:nowrap}
.cv{font-family:'Black Han Sans';font-size:16px;letter-spacing:.5px;flex-shrink:0}
.crow2.voted .cv{color:var(--mint)}
.cbar{height:3px;background:var(--line)}
.cbar i{display:block;height:100%;background:var(--pink);transition:width .5s}
.cex{border-top:1px dashed var(--line);padding:11px 12px;background:rgba(255,255,255,.015)}
.cexh{font-family:'Gaegu';font-size:13px;color:var(--mint);margin-bottom:8px}
.clog{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
.clog .at{font-family:'Black Han Sans';font-size:10px;color:var(--muted);flex-shrink:0;margin-top:3px;letter-spacing:.5px}
.cnote{flex:1;background:var(--paper);color:var(--ink);border-radius:8px;padding:8px 10px;
  font-family:'Gaegu';font-weight:700;font-size:13.5px;line-height:1.4}
.cnote.b{background:var(--paper2)}
.csnd{flex:1;display:flex;align-items:center;gap:7px;background:var(--card2);border-radius:8px;padding:8px 10px;font-size:11px;color:var(--muted)}
.csnd em{font-style:normal;color:var(--mint)}
.cgo{background:none;border:none;color:var(--muted);font-size:11px;font-family:inherit;cursor:pointer;padding:3px 0 0;display:block}
.cgo:hover{color:var(--mint)}

/* ── 플레이리스트 ── */
.lrow{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.lcov{position:relative;width:62px;height:44px;flex-shrink:0}
.lcov i{position:absolute;top:0;width:44px;height:44px;border-radius:9px;border:1.5px solid var(--bg);background-size:cover}
.lcov.big{width:110px;height:74px}
.lcov.big i{width:74px;height:74px;border-radius:12px;border-width:2px}
.lnm{flex:1;min-width:0}
.lnm b{font-size:13.5px;font-weight:700;display:block}
.lnm small{font-size:10.5px;color:var(--muted)}
.lshare{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:5px;flex-shrink:0}
.lshare:hover{color:var(--mint)}
.lshare:focus-visible{outline:2px solid var(--mint);border-radius:6px}
.newlist{width:100%;background:transparent;border:1.5px dashed var(--line);color:var(--muted);border-radius:14px;
  padding:14px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:14px}
.newlist:hover{border-color:var(--mint);color:var(--mint)}
.newlist:focus-visible{outline:2px solid var(--mint)}
.lhero{display:flex;gap:14px;align-items:center;padding:6px 2px 16px}
.lhinfo{flex:1;min-width:0}
.lhinfo h3{font-size:17px;font-weight:700}
.lhinfo small{font-size:11px;color:var(--muted)}
.lhbtn{display:flex;gap:7px;margin-top:10px}
.lhbtn .cta{padding:9px 14px;font-size:12px}
.lhbtn .savebtn{padding:9px 14px;font-size:12px;flex:0 0 auto}
.trow{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line)}
.tno{font-family:'Black Han Sans';font-size:11px;color:#4a4a52;width:18px;flex-shrink:0}
.tplay{width:26px;height:26px;border-radius:50%;background:transparent;border:1.5px solid var(--mint);color:var(--mint);
  font-size:9px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.tplay.on{background:var(--mint);color:#04231d}
.tplay:focus-visible{outline:2px solid var(--mint)}
.tnm{flex:1;min-width:0}
.tnm b{font-size:13px;font-weight:700;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tnm small{font-size:10px;color:var(--muted)}
.tdur{font-family:'Black Han Sans';font-size:11px;color:var(--muted);flex-shrink:0}
.tx{background:none;border:none;color:#3f3f47;font-size:11px;cursor:pointer;padding:4px;flex-shrink:0}
.tx:hover{color:var(--coral)}
.shlink{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:11px 13px;margin-bottom:10px}
.shlink span{flex:1;font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.shcopy{background:var(--mint);border:none;color:#04231d;border-radius:99px;padding:5px 13px;
  font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.evck.on{border-color:var(--mint);background:var(--mint)}
.evck.on::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#04231d;font-weight:900}
.shrow{display:flex;gap:8px;margin-top:12px}
.shbtn{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 0;
  cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:4px}
.shbtn span{font-size:18px;line-height:1}
.shbtn small{font-size:9.5px;color:var(--muted)}
.shbtn:hover{border-color:var(--mint)}
.shbtn:focus-visible{outline:2px solid var(--mint)}

/* ── 내 로그 카드 — 칩과 수정은 카드 안 오버레이 ── */
.fcard.my .rcard{overflow:visible}
.mychip{position:absolute;top:11px;left:11px;z-index:6;background:var(--mint);border:none;color:#04231d;
  border-radius:99px;padding:3px 9px;font-size:9.5px;font-weight:700;line-height:1.5;
  max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.edit.mine,.edit.save{position:absolute;top:9px;right:11px;z-index:6;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);
  border:none;color:#fff;width:26px;height:26px;border-radius:50%;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;letter-spacing:0;opacity:.7;padding:0}
.edit.mine:hover,.edit.save:hover{opacity:1}
.edit.mine:active,.edit.save:active{transform:scale(.9)}
.rcard.paper .edit.mine{background:rgba(43,36,23,.12);color:var(--ink)}

/* ── 피드 카드 — Work 스토리와 같은 문법 ── */
.fcard{margin-bottom:16px;position:relative}
/* ── Home — 한 화면에 한 섹션, 좌우 스와이프/칩으로 전환 ── */
.htabs{display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none;margin:0 0 14px;padding:2px 0}
.htabs::-webkit-scrollbar{display:none}
.htab{flex-shrink:0;background:var(--card2);border:1px solid var(--line);color:var(--muted);border-radius:99px;
  padding:8px 14px;font-size:12.5px;font-weight:800;font-family:inherit;cursor:pointer;min-height:36px}
.htab.on{background:var(--mint);border-color:var(--mint);color:#04231d}
.htab:active{transform:scale(.95)}
.hswhint{margin-left:auto;flex-shrink:0;font-size:10px;color:var(--muted);padding-right:2px}
.relgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.relgrid .reltile{flex:none;width:100%;height:auto;min-height:118px}
.votetile.vfull{flex:none;width:100%;height:auto;min-height:106px;margin-bottom:10px}
/* Releases 타일 */
.reltile{flex:0 0 128px;scroll-snap-align:start;display:flex;flex-direction:column;align-items:flex-start;gap:3px;
  background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:12px;height:118px;
  color:var(--txt);font-family:inherit;cursor:pointer;text-align:left;overflow:hidden}
.reltile .relwv{display:flex;align-items:center;gap:2px;height:26px;margin-bottom:5px}
.reltile .relwv i{width:3px;border-radius:1.5px;background:var(--mint);opacity:.75;height:calc(var(--h)*.26px);min-height:3px}
.reltile b{font-size:12.5px;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.reltile small{font-size:10.5px;color:var(--muted)}
.reltile:active{transform:scale(.97)}
/* Vote 타일 */
.votetile{flex:0 0 178px;scroll-snap-align:start;display:flex;flex-direction:column;align-items:flex-start;gap:4px;
  background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:13px;height:118px;
  color:var(--txt);font-family:inherit;cursor:pointer;text-align:left;overflow:hidden}
.votetile em{font-style:normal;font-size:10px;color:var(--lemon);font-weight:800}
.votetile b{font-size:13.5px;font-weight:800;line-height:1.3}
.votetile small{font-size:10.5px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.votetile .voten{margin-top:auto;font-size:10.5px;color:var(--mint);font-weight:700}
.votetile:active{transform:scale(.97)}
.fcard .rcard{margin-bottom:0}
.fcard .pop{left:13px;bottom:44px}

/* ── 같은 시각 카드 — 룸이 피드 안으로 ── */
.roomfeed{cursor:pointer}
.rmrow{display:flex;gap:6px;overflow-x:auto;padding:10px 13px 0;scrollbar-width:none}
.rmrow::-webkit-scrollbar{display:none}
.rm{position:relative;flex-shrink:0;width:104px;height:126px;border-radius:14px;overflow:hidden;
  background-size:cover;background-position:center;background-color:#141418;
  display:flex;align-items:center;justify-content:center}
.rm.empty{background:#141418;background-image:radial-gradient(rgba(255,255,255,.045) 1px,transparent 1px);background-size:3px 3px}
.rm.snd{background:linear-gradient(160deg,#17171d,#0e0e13)}
.rm.paper{background:var(--paper2)}
.rmw{position:absolute;top:7px;left:8px;font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.7);
  max-width:84px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rm.empty .rmw{color:var(--muted);text-shadow:none}
.rmts{font-family:'Black Han Sans';font-size:17px;color:rgba(255,255,255,.09);letter-spacing:.5px}
.rmts.on{color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.8)}
.rmwv{position:absolute;left:9px;right:9px;top:34px;bottom:34px;display:flex;align-items:center;gap:1.5px}
.rmwv i{flex:1;background:#3a3a44;border-radius:1px;height:calc(var(--h)*1%);min-height:1px}
.rmnote{font-family:'Gaegu';font-weight:700;font-size:12.5px;color:var(--ink);padding:0 9px;text-align:center;line-height:1.35}

/* ── 아바타 열 — 인스타 스토리 문법. 원 = 아티스트, 탭하면 전체화면 스토리 ── */
.avrow{display:flex;gap:11px;overflow-x:auto;padding:2px 2px 14px;scrollbar-width:none}
.avrow::-webkit-scrollbar{display:none}
.av{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;
  background:none;border:none;font-family:inherit;padding:2px 0 0}
.av:focus-visible{outline:2px solid var(--mint);border-radius:14px}
.av-ring{width:56px;height:56px;border-radius:50%;padding:2.5px;display:flex;align-items:center;justify-content:center}
.av-ring.new{background:conic-gradient(from 210deg,var(--mint),var(--pink),var(--lemon),var(--mint))}
.av-ring.seen{background:var(--line)}
.av-ring.discover{background:transparent;border:2px dashed #3a3a42}
.av-in{width:100%;height:100%;border-radius:50%;border:2.5px solid var(--bg);display:flex;align-items:center;justify-content:center;
  font-family:'Black Han Sans';font-size:18px;color:#141105;position:relative}
.av-plus{position:absolute;bottom:-1px;right:-1px;width:17px;height:17px;border-radius:50%;background:var(--mint);
  border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;color:#04231d;font-weight:900}
.av small{font-size:9.5px;color:var(--muted);max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.av.discover small{color:#63636b}

/* ── 스토리 뷰어 — 전체화면 오버레이 ── */
.svwrap{position:absolute;inset:0;z-index:60;background:#000;display:flex;flex-direction:column}
.svbars{display:flex;gap:4px;padding:10px 12px 0;position:relative;z-index:6}
.svbar{flex:1;height:2.5px;border-radius:99px;background:rgba(255,255,255,.32);overflow:hidden}
.svbar i{display:block;height:100%;width:0%;background:#fff}
.svbar.done i{width:100%!important;animation:none!important}
.svbar.active i{animation:svfill linear forwards}
@keyframes svfill{from{width:0%}to{width:100%}}
.svwrap.paused .svbar.active i{animation-play-state:paused}
.svhd{display:flex;align-items:center;gap:8px;padding:11px 13px 7px;position:relative;z-index:6}
.svhd b{font-size:12.5px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.svhd .tm{font-size:11px;color:rgba(255,255,255,.55);flex-shrink:0}
.svfol{background:var(--mint);color:#04231d;border:none;border-radius:99px;padding:5px 12px;font-size:11px;
  font-weight:700;cursor:pointer;font-family:inherit;margin-left:4px;flex-shrink:0}
.svfol:focus-visible{outline:2px solid #fff}
.svclose{margin-left:auto;background:none;border:none;color:#fff;font-size:19px;cursor:pointer;padding:4px;opacity:.85;flex-shrink:0}
.svclose:focus-visible{outline:2px solid #fff;border-radius:6px}
.svmore{margin-left:auto;background:none;border:none;color:#fff;font-size:19px;line-height:1;cursor:pointer;padding:4px 6px;opacity:.85;flex-shrink:0}
.svmore:active{transform:scale(.9)}
.svbody{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.svbg{position:absolute;inset:0;background-size:cover;background-position:center}
.svtap{position:absolute;top:0;bottom:0;width:32%;z-index:5;background:none;border:none;padding:0}
.svtap.l{left:0}
.svtap.r{right:0}
.svmid{position:relative;z-index:2;text-align:center;padding:0 30px;width:100%}
.svts{font-family:'Black Han Sans';font-size:24px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-bottom:10px}
.svcap{font-size:17px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.7);line-height:1.42}
.svwave{display:flex;align-items:center;gap:3px;height:64px;margin:0 auto 18px;max-width:270px}
.svwave i{flex:1;background:rgba(255,255,255,.88);border-radius:2px;height:calc(var(--h)*1%);transform-origin:center}
.svpill{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.14);border-radius:99px;
  padding:6px 15px;font-size:12px;color:#fff;margin-top:5px}
.svnote{background:var(--paper);color:var(--ink);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:0 32px}
.svnote.b{background:var(--paper2)}
.svnote p{font-family:'Gaegu';font-weight:700;font-size:25px;line-height:1.5;white-space:pre-line}
.svrx{position:relative;z-index:6;display:flex;align-items:center;gap:11px;padding:14px 16px 20px}

/* ── 피드 카드 ── */
.log{position:relative;border-radius:22px;background:var(--card);border:1px solid var(--line);overflow:hidden;margin-bottom:8px}
.log-hd{display:flex;align-items:center;gap:7px;padding:11px 13px 0;font-size:12.5px;font-weight:700}
.log-hd .dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.log-media{position:relative;margin:9px 0 0;height:186px;display:flex;align-items:center;justify-content:center}
.log-media .bgimg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:1}
.grain{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.055) 1px,transparent 1px);
  background-size:3px 3px;pointer-events:none;z-index:2}
.log-center{position:relative;z-index:3;text-align:center}
.ts{font-family:'Black Han Sans';font-size:36px;letter-spacing:1px;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.75)}
.cap{font-size:12.5px;color:rgba(255,255,255,.92);text-shadow:0 1px 8px rgba(0,0,0,.8);margin-top:1px}
.shape{border:none;background:transparent;padding:0;cursor:pointer;display:flex;transition:transform .15s;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.45))}
.shape.hit{transform:scale(1.2)}
.shape:focus-visible{outline:2px solid #fff;border-radius:6px}
.rxn{font-family:'Black Han Sans';font-size:13px;color:var(--muted);margin-left:2px}
/* 반응 도형 = 카드 위 하단 오버레이 · 팔로우 = 카드 우측 상단 오버레이 (v30) */
.frx{position:absolute;left:11px;right:11px;bottom:11px;z-index:6;display:flex;align-items:center;gap:6px}
.rcard.paper .rxn{color:var(--ink)}
.ffol{position:absolute;top:11px;right:11px;z-index:6;background:rgba(0,0,0,.42);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.28);color:#fff;border-radius:99px;
  padding:4px 12px;font-size:10.5px;font-weight:700;cursor:pointer;font-family:inherit}
.ffol:hover{border-color:var(--mint);color:var(--mint)}
.ffol:focus-visible{outline:2px solid #fff}
.ffol.on{background:var(--mint);border-color:var(--mint);color:#04231d}
.rcard.paper .ffol{background:rgba(43,36,23,.1);border-color:rgba(43,36,23,.25);color:var(--ink)}
.log-meta{display:flex;align-items:center;gap:13px;padding:9px 13px 12px;font-size:11.5px;color:var(--muted)}
.log-meta b{font-family:'Black Han Sans';color:var(--txt);font-weight:400;margin-left:3px}
.log-meta .go{margin-left:auto;color:var(--muted);font-weight:700}
.pop{position:absolute;left:13px;bottom:56px;z-index:9;font-family:'Gaegu';font-size:15px;font-weight:700;color:#fff;
  background:rgba(0,0,0,.75);border-radius:99px;padding:2px 11px;pointer-events:none;animation:pp .9s ease-out forwards;white-space:nowrap}
@keyframes pp{0%{opacity:0;transform:translateY(4px)}20%{opacity:1}100%{opacity:0;transform:translateY(-24px)}}
.cmt{display:flex;align-items:center;gap:7px;padding:0 6px;margin-bottom:16px;font-size:11.5px;color:var(--muted)}
.cmt .dot{width:18px;height:18px;border-radius:50%;flex-shrink:0}
.cmt b{color:var(--txt);font-weight:700;margin-right:4px}
.cmt .anchor{font-family:'Black Han Sans';color:var(--mint);font-size:10.5px;margin-right:5px;letter-spacing:.5px}
.cmt.artist b{color:var(--mint)}
.cmt .re{color:var(--mint);font-size:9.5px;margin-right:4px}
.cmt .all{margin-left:auto;color:var(--muted);font-size:10.5px;flex-shrink:0}

/* ── Following — 시간대 로그룸 (셋로그 문법: 미디어가 카드를 가득 채운다) ── */
.roomhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.slots{display:flex;gap:7px;align-items:center}
.slot{width:7px;height:7px;border-radius:50%;background:var(--line);border:none;cursor:pointer;padding:0;transition:all .25s}
.slot.on{background:var(--txt);transform:scale(1.3)}
.slot.on.filled{background:var(--pink);box-shadow:0 0 8px rgba(255,95,224,.8)}
.slot:focus-visible{outline:2px solid var(--mint)}
.mkvid{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:99px;padding:6px 13px;
  font-size:10.5px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.mkvid i{font-style:normal;color:var(--mint)}
.mkvid:focus-visible{outline:2px solid var(--mint)}
.slotlab{text-align:center;font-family:'Black Han Sans';font-size:13px;color:var(--muted);letter-spacing:1.5px;margin-bottom:14px}
.slotlab b{color:var(--txt)}

.rcard{position:relative;border-radius:22px;overflow:hidden;margin-bottom:10px;height:200px;background:#141418}
.rcard.snd{cursor:pointer;background:linear-gradient(160deg,#17171d,#0e0e13)}
.rcard.paper{background:var(--paper)}
.rcard.paper.b{background:var(--paper2)}
.rcard.empty{height:150px}
.rcard .bgimg{position:absolute;inset:0;background-size:cover;background-position:center}
.grainy{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);
  background-size:3px 3px;pointer-events:none;z-index:3}
.rcard.paper .grainy{display:none}

.rwho{position:absolute;top:11px;left:11px;z-index:6;display:flex;align-items:center;gap:7px;
  font-size:13px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.7)}
.rcard.paper .rwho{color:var(--ink);text-shadow:none}
.rcard.empty .rwho{color:var(--muted);text-shadow:none}
.smile{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.smile svg{width:19px;height:19px}

.rmid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:4;text-align:center;padding:0 44px;pointer-events:none}
.rts{font-family:'Black Han Sans';font-size:32px;letter-spacing:1px;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.8)}
.rcap{font-size:13px;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.85);margin-top:1px}
.rcard.empty .rts{color:rgba(255,255,255,.075);text-shadow:none}
.rcard.paper .rts{color:rgba(43,36,23,.35);text-shadow:none;font-size:15px;margin-bottom:7px}
.rnote{font-family:'Gaegu';font-weight:700;font-size:19.5px;line-height:1.42;color:var(--ink);white-space:pre-line}

/* 소리 카드 — 웨이브폼이 곧 사진이다 */
.bigwv{position:absolute;left:14px;right:14px;top:46px;bottom:42px;display:flex;align-items:center;gap:2px;z-index:2}
.bigwv i{flex:1;border-radius:1.5px;background:#3a3a44;height:calc(var(--h)*1%);transform-origin:center;min-height:2px}
.rcard.playing .bigwv i{background:var(--mint);animation:wv 1s ease-in-out infinite;animation-delay:calc(var(--d)*-.09s)}
.sndpill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.16);border-radius:99px;padding:5px 13px;font-size:11px;color:#fff}
.sndpill b{font-family:'Black Han Sans';font-weight:400;letter-spacing:.5px}
.sndpill em{font-style:normal;color:var(--mint);font-size:10px}

.uphint2{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:6;background:rgba(0,0,0,.55);
  border:1px dashed rgba(255,255,255,.35);color:#ddd;font-size:10px;border-radius:99px;padding:3px 10px;white-space:nowrap}
.has-img .uphint2{display:none}
.has-img .grainy{display:none}

.rbub{position:absolute;bottom:11px;left:11px;z-index:6;display:flex;align-items:center;gap:6px}
.rbub .bb{background:#fff;color:#141414;border-radius:99px;padding:4px 11px;font-size:11.5px;font-weight:500;
  box-shadow:0 3px 10px rgba(0,0,0,.4)}
.rheart{position:absolute;bottom:10px;right:12px;z-index:6;font-size:19px;cursor:pointer;background:none;border:none;
  padding:0;opacity:.35;transition:opacity .2s,transform .2s}
.rheart.on{opacity:1;transform:scale(1.12)}
.rheart:focus-visible{outline:2px solid #fff;border-radius:6px}
.rreply{position:absolute;top:40%;right:12px;z-index:6;font-size:17px;color:#fff;background:none;border:none;
  cursor:pointer;opacity:.75;padding:0;text-shadow:0 1px 6px rgba(0,0,0,.6)}
.rcard.paper .rreply{color:var(--ink);text-shadow:none;opacity:.5}
.rcard.empty .rreply{display:none}
.rreply:focus-visible{outline:2px solid #fff;border-radius:6px}
.keep{position:absolute;top:11px;right:12px;z-index:6;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:99px;padding:3px 9px;font-size:9.5px;font-weight:700;
  cursor:pointer;font-family:inherit}
.keep.on{background:var(--mint);color:#04231d;border-color:var(--mint)}
.keep:focus-visible{outline:2px solid #fff}
.rcard.paper .keep{background:rgba(43,36,23,.1);color:var(--ink);border-color:rgba(43,36,23,.25)}
.rcard.paper .keep.on{background:var(--mint);color:#04231d;border-color:var(--mint)}
.expire{text-align:center;font-size:10.5px;color:var(--muted);margin:14px 0 4px;line-height:1.6}
.expire b{color:var(--mint)}
.fy{position:relative;border-radius:22px;overflow:hidden;margin-bottom:12px;
  background:linear-gradient(165deg,#1b1b24,#0c0c11);border:1px solid var(--line);padding:16px}
.fy .fwho{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;margin-bottom:12px}
.fy .fwho .dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.fol{margin-left:auto;background:transparent;border:1px solid var(--mint);color:var(--mint);border-radius:99px;
  padding:4px 12px;font-size:10.5px;font-weight:700;cursor:pointer;font-family:inherit}
.fol:focus-visible{outline:2px solid var(--mint)}
.fol.on{background:var(--mint);color:#04231d}
.fy .fnm{font-family:'Black Han Sans';font-size:23px;letter-spacing:.5px}
.fy .fsub{font-size:11px;color:var(--muted);margin-top:1px}
.fybig{display:flex;align-items:center;gap:2.5px;height:62px;margin:15px 0 13px}
.fybig i{flex:1;border-radius:2px;background:var(--line);height:calc(var(--h)*1%);transform-origin:center;min-height:2px}
.fy.playing .fybig i{background:var(--mint);animation:wv 1s ease-in-out infinite;animation-delay:calc(var(--d)*-.09s)}
.fyctrl{display:flex;align-items:center;gap:7px}
.fytags{display:flex;gap:5px;margin-left:auto}
.fytags span{background:var(--card2);border:1px solid var(--line);border-radius:99px;padding:3px 9px;font-size:10px;color:var(--muted)}
.fyhint{text-align:center;font-size:10.5px;color:var(--muted);margin:2px 0 14px;font-family:'Gaegu';font-size:13px}

/* ── Trending — 지금 표를 받는 중 ── */
.trbar{display:flex;align-items:center;justify-content:space-between;background:var(--card2);border:1px solid var(--line);
  border-radius:14px;padding:10px 13px;margin-bottom:6px;font-size:11.5px;color:var(--muted)}
.trbar b{font-family:'Black Han Sans';color:var(--lemon);font-size:14px;letter-spacing:.5px}
.trow{display:flex;align-items:center;gap:10px;padding:13px 4px;border-bottom:1px solid var(--line);cursor:pointer;
  background:none;border-left:none;border-right:none;border-top:none;width:100%;font-family:inherit;color:var(--txt);text-align:left}
.trow:last-of-type{border-bottom:none}
.trow:focus-visible{outline:2px solid var(--mint);border-radius:8px}
.rank{font-family:'Black Han Sans';font-size:19px;width:22px;text-align:center;color:var(--muted);flex-shrink:0}
.trow.top .rank{color:var(--lemon)}
.trow .tnm{flex:1;min-width:0}
.trow .tnm b{font-size:13.5px;font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow .tnm small{font-size:10.5px;color:var(--muted)}
.mv{font-size:10px;font-family:'Black Han Sans';width:26px;text-align:right;flex-shrink:0}
.mv.up{color:var(--green)}.mv.dn{color:var(--coral)}.mv.eq{color:var(--muted)}
.vct{font-family:'Black Han Sans';font-size:15px;width:40px;text-align:right;flex-shrink:0}

/* ── 미니 플레이어 ── */
.mini{position:absolute;left:14px;right:14px;bottom:74px;z-index:19;background:rgba(28,28,32,.96);backdrop-filter:blur(10px);
  border:1px solid var(--line);border-radius:16px;padding:9px 13px}
.mini-top{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--mint);font-weight:700}
.mini-top button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px}
.mini-btm{display:flex;align-items:center;gap:10px;margin-top:4px}
.mini-btm .nm{font-size:14px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-btm .tm{font-family:'Black Han Sans';font-size:13px;color:var(--muted)}
.minilist{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:3px 2px;flex-shrink:0}
.minimore{background:none;border:none;color:var(--muted);font-size:20px;line-height:1;cursor:pointer;padding:0 3px;flex-shrink:0}
.minimore:hover{color:var(--mint)}
.minilist:hover{color:var(--mint)}
.minilist:focus-visible{outline:2px solid var(--mint);border-radius:5px}
.miniplay{width:32px;height:32px;border-radius:50%;background:var(--mint);border:none;color:#04231d;font-size:13px;cursor:pointer;flex-shrink:0}

/* ── 로그 — 자유 스트림 ── */
/* 남기는 도구: 폼이 아니라 손닿는 자리에 놓인 것들 */
.tools{display:flex;gap:7px;justify-content:center;margin-bottom:20px}
.tool{width:38px;height:38px;border-radius:50%;background:transparent;border:1px solid var(--line);color:var(--txt);
  font-size:15px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;
  transition:border-color .25s,transform .25s;position:relative;flex-shrink:0}
.tool:hover{transform:translateY(-2px)}
.tool.on{border-color:var(--mint);box-shadow:0 0 12px rgba(83,224,200,.25)}
.tool:focus-visible{outline:2px solid var(--mint)}
.tool::after{content:attr(data-l);position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);
  font-size:9px;color:var(--muted);white-space:nowrap;opacity:0;transition:opacity .25s}
.tool.on::after{opacity:1;color:var(--mint)}

/* 소리가 울리면 종이 전체가 반응한다 */
.stream{position:relative;padding-bottom:12px}
.ambient{position:absolute;inset:-40px -20px;pointer-events:none;z-index:0;opacity:0;transition:opacity .8s;
  background:radial-gradient(circle at 50% 40%,rgba(83,224,200,.10),transparent 62%)}
.stream.sounding .ambient{opacity:1}
.marks{position:relative;z-index:1}

.mark{position:relative;margin-bottom:20px;width:84%}
.mark.r{margin-left:auto}
.mark .t{font-family:'Black Han Sans';font-size:11px;color:var(--muted);letter-spacing:.6px;margin-bottom:6px;padding:0 3px}
.mark.r .t{text-align:right}

/* 생각글 */
.m-note{background:var(--paper);color:var(--ink);border-radius:3px;padding:15px 15px 12px;font-family:'Gaegu';
  box-shadow:0 9px 24px rgba(0,0,0,.5)}
.m-note.b{background:var(--paper2)}
.m-note p{font-size:18px;line-height:1.42;font-weight:700;white-space:pre-line}

/* 소리 — 카드가 아니라 종이 위에 그은 선 */
.m-snd{display:flex;align-items:center;gap:10px;padding:2px 3px}
.dotplay{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--mint);background:transparent;color:var(--mint);
  font-size:9px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .2s}
.dotplay:focus-visible{outline:2px solid var(--mint)}
.mark.playing .dotplay{background:var(--mint);color:#04231d}
.sline{flex:1;display:flex;align-items:center;gap:2px;height:28px}
.sline i{flex:1;border-radius:1px;background:var(--muted);opacity:.38;height:calc(var(--h)*1%);transform-origin:center;min-height:1px;
  transition:opacity .3s}
.mark.playing .sline i{opacity:1;background:var(--mint);animation:wv 1s ease-in-out infinite;animation-delay:calc(var(--d)*-.09s)}
.m-snd .lab{font-size:12px;color:var(--muted);font-family:'Black Han Sans';letter-spacing:.5px;flex-shrink:0}
.m-snd .nm{font-size:13.5px;font-weight:700;flex-shrink:0}

/* 사진 */
.m-ph{background:#fbfbf7;border-radius:2px;padding:7px 7px 22px;box-shadow:0 9px 24px rgba(0,0,0,.5)}
.m-ph .img{height:132px;border-radius:1px;position:relative;overflow:hidden}
.m-ph .img .grain{z-index:1}
.m-ph .cc{position:absolute;bottom:5px;left:0;right:0;text-align:center;font-family:'Gaegu';font-size:14.5px;color:#3a3a3a}

/* 이 소리를 Demo로 */
.promote{background:none;border:none;color:var(--muted);font-size:11px;font-family:inherit;cursor:pointer;
  padding:3px 0 0 39px;opacity:.7}
.promote:hover{color:var(--mint);opacity:1}
.promote:focus-visible{outline:2px solid var(--mint);border-radius:4px}

.fab{display:block;margin:8px auto 0;width:54px;height:54px;border-radius:50%;background:transparent;border:1.5px solid var(--line);
  color:var(--muted);font-size:24px;cursor:pointer;font-family:inherit;transition:border-color .25s,color .25s}
.fab:hover{border-color:var(--mint);color:var(--mint)}
.fab:focus-visible{outline:2px solid var(--mint)}

/* 웨이브 */
.play{width:36px;height:36px;border-radius:50%;border:none;font-size:13px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;background:var(--mint);color:#04231d}
.play:focus-visible{outline:2px solid #fff}
.wave{flex:1;display:flex;align-items:center;gap:2.5px;height:32px}
.wave i{flex:1;border-radius:2px;transform-origin:center;background:var(--muted);opacity:.55;height:calc(var(--h)*1%)}
.playing .wave i{opacity:1;background:var(--mint);animation:wv 1s ease-in-out infinite;animation-delay:calc(var(--d)*-.09s)}
@keyframes wv{0%,100%{transform:scaleY(.55)}50%{transform:scaleY(1.15)}}
.dur{font-size:11px;color:var(--muted);font-family:'Black Han Sans'}

/* ── Demo 플레이어 ── */
.dplayer{background:linear-gradient(170deg,#1a1a22,#0d0d12);border:1px solid var(--line);border-radius:22px;padding:22px 16px 18px;
  text-align:center;margin-bottom:14px}
.dplayer .big{font-family:'Black Han Sans';font-size:46px;letter-spacing:1px}
.bigwave{display:flex;align-items:center;gap:2.5px;height:52px;margin:16px 0 18px}
.bigwave i{flex:1;border-radius:2px;background:var(--line);height:calc(var(--h)*1%);transform-origin:center}
.dplayer.playing .bigwave i{background:var(--mint);animation:wv 1s ease-in-out infinite;animation-delay:calc(var(--d)*-.09s)}
.dctrl{display:flex;align-items:center;justify-content:center;gap:9px}
.dctrl .play{width:42px;height:42px;font-size:15px}
.sec{font-size:12px;font-weight:700;color:var(--muted);margin:0 4px 8px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tags span{background:var(--card2);border:1px solid var(--line);border-radius:99px;padding:5px 12px;font-size:11.5px;color:var(--txt)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:15px;margin-bottom:14px}
.ph{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700}
.ph em{font-family:'Black Han Sans';font-style:normal;color:var(--mint);font-size:16px}
.strip{display:flex;gap:4px;margin:11px 0 9px}
.cell{flex:1;height:22px;border-radius:5px;background:var(--card2);border:1px dashed var(--line)}
.cell.f{background:repeating-linear-gradient(135deg,var(--mint),var(--mint) 5px,#3fbfa9 5px,#3fbfa9 10px);border:none}
.note{font-size:11.5px;color:var(--muted);line-height:1.55;display:block}
.cta{width:100%;background:var(--mint);border:none;border-radius:13px;padding:14px;font-family:inherit;
  font-size:14px;font-weight:700;color:#04231d;cursor:pointer}
.cta:focus-visible{outline:2px solid #fff}

/* ── 발매 / 메이킹 필름 ── */
.album{border-radius:22px;overflow:hidden;border:1px solid var(--line);margin-bottom:14px}
.acover{height:190px;position:relative;background:
  radial-gradient(circle at 50% 30%,rgba(255,233,74,.25),transparent 55%),
  radial-gradient(circle at 20% 80%,#5c2040,transparent 60%),
  radial-gradient(circle at 85% 75%,#1c2a5c,transparent 55%),#0d0a14;
  display:flex;align-items:flex-end;padding:14px}
.acover::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.07) 1px,transparent 1px);background-size:4px 4px}
.acover .film{position:relative;z-index:1}
.acover .film b{font-family:'Fredoka';font-size:19px;font-weight:600;display:block}
.acover .film small{font-size:11px;color:rgba(255,255,255,.75)}
.tracks{background:var(--card);padding:6px 14px 14px}
.trhd{font-size:12px;font-weight:700;color:var(--muted);margin:10px 0 6px}
.tr{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.tr:last-child{border:none}
.tr .no{font-family:'Black Han Sans';font-size:11px;color:var(--muted);width:16px}
.tr .nm{flex:1;font-weight:500}
.tr .tm{font-family:'Black Han Sans';font-size:11.5px;color:var(--muted)}

/* ── 마이 ── */
.mine{text-align:center;padding:14px 0 18px}
.mine .av-ring{width:74px;height:74px;margin:0 auto 9px}
.mine .av-in{font-size:26px}
.mine h3{font-size:17px;font-weight:700}
.mine p{font-size:11.5px;color:var(--muted);margin-top:2px}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.icard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px}
.icard b{font-family:'Black Han Sans';font-size:20px;display:block;margin-top:5px}
.icard small{font-size:10.5px;color:var(--muted)}
.chart{display:flex;align-items:flex-end;gap:2px;height:56px;margin:11px 0 4px}
.chart i{flex:1;border-radius:2px 2px 0 0;background:var(--mint);min-height:2px;opacity:.8}
.season{display:flex;justify-content:space-between;align-items:center;margin:14px 2px 0;position:relative}
.season::before{content:'';position:absolute;left:6px;right:6px;top:5px;height:1.5px;background:var(--line)}
.st{position:relative;display:flex;flex-direction:column;align-items:center;gap:5px}
.st i{width:11px;height:11px;border-radius:50%;background:var(--line);border:2px solid var(--bg)}
.st.done i{background:var(--mint)}
.st.now i{background:var(--lemon);box-shadow:0 0 9px var(--lemon)}
.st small{font-size:9.5px;color:var(--muted)}
.st.now small{color:var(--lemon);font-weight:700}

/* ── 하단 탭 (인스타식 아이콘 5개) ── */
.nav{position:absolute;left:0;right:0;bottom:0;z-index:20;display:flex;background:rgba(10,10,12,.96);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:10px 0 20px}
.nav button{flex:1;background:none;border:none;color:var(--muted);font-family:inherit;font-size:11px;font-weight:700;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:2px 0;-webkit-tap-highlight-color:transparent}
.nav button i{font-style:normal;font-size:24px;line-height:1;opacity:.7;display:flex;align-items:center;justify-content:center;height:27px}
/* 아이콘 = 전부 27px SVG로 통일 (유니코드 글리프는 글자마다 크기가 달라 들쭉날쭉했음) */
.nav button i svg{width:27px;height:27px;display:block}
.nav button.on{color:var(--mint)}
.nav button.on i{opacity:1}
.nav button:active{transform:scale(.92);transition:transform .08s ease-out}
.nav button:focus-visible{outline:2px solid var(--mint);border-radius:8px}
/* 마이 탭 = 프로필 아바타 (우측) */
.avimg{display:block;width:27px;height:27px;border-radius:50%;background:var(--card2) center/cover no-repeat;border:1.5px solid transparent}
.nav button.on i .avimg{border-color:var(--mint)}
/* 음악 = 하단 가운데 살짝 떠오른 원 */
.navctr{position:relative}
.navctr i{width:48px;height:48px!important;border-radius:50%;background:var(--card2);border:1.5px solid var(--mint);
  display:flex;align-items:center;justify-content:center;font-size:21px!important;color:var(--mint);
  margin-top:-16px;opacity:1!important;transition:all .25s;
  box-shadow:0 0 0 4px var(--bg),0 4px 14px rgba(0,0,0,.6)}
.navctr i svg{width:25px;height:25px}
.navctr:active i{transform:translateY(-2px)}
.navctr.on i{background:var(--mint);color:#04231d;
  box-shadow:0 0 0 4px var(--bg),0 0 20px rgba(83,224,200,.55)}
/* ── 하단 가운데: camera | logs 슬라이딩 토글 (＋ 자리) ── */
.navseg{flex:1.9;align-self:center;position:relative;display:flex;align-items:center;
  background:var(--card2);border:1px solid var(--line);border-radius:99px;padding:3px;margin:0 5px;height:36px}
.nsgpill{position:absolute;top:3px;left:3px;width:calc(50% - 3px);height:calc(100% - 6px);
  border-radius:99px;background:var(--mint);transition:transform .26s cubic-bezier(.22,.61,.36,1)}
.navseg.logs .nsgpill{transform:translateX(100%)}
/* .nav button 규칙(세로정렬·민트 on색)을 이겨야 해서 .nav 로 한 단계 더 좁힌다 */
.nav .nsg{position:relative;z-index:1;flex:1;background:none;border:0;color:var(--muted);
  display:flex;flex-direction:row;align-items:center;justify-content:center;gap:0;
  font-family:inherit;font-size:12px;font-weight:800;padding:0;height:100%;min-height:0;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:color .2s}
.nav .nsg.on{color:#04231d}
.nav .nsg:active{transform:scale(.94)}
/* ── 앱 안 촬영 화면 ── */
.camview{position:absolute;left:0;right:0;top:0;bottom:64px;z-index:70;background:#000;overflow:hidden}
.camvid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
.camvid.mirror{transform:scaleX(-1)}
/* .camx 는 위 .slx,.camx,.sldots 공통 규칙(42px)을 그대로 쓴다 */
.cambar{position:absolute;left:0;right:0;bottom:22px;z-index:6;display:flex;align-items:center;justify-content:center;gap:36px}
.camshot{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.18);border:5px solid #fff;cursor:pointer;transition:transform .12s}
.camshot:active{transform:scale(.92)}
.camshot.rec{background:#ff4d4d;border-color:#ffb3b3}
.camsub{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.25);color:#fff;font-size:19px;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:0;backdrop-filter:blur(6px)}
.camsub:active{transform:scale(.9)}
.camhint{position:absolute;left:0;right:0;bottom:106px;z-index:6;text-align:center;
  color:rgba(255,255,255,.72);font-size:11.5px;text-shadow:0 1px 6px rgba(0,0,0,.8)}
.camerr{position:absolute;inset:0;z-index:6;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;color:#fff;text-align:center;padding:0 34px;font-size:13.5px;line-height:1.6}
.camerr .cs-post{max-width:240px}
/* 마이 → 내 플레이리스트 진입 (음악 탭이 하단에서 빠져 여기로) */
.myplrow{display:flex;align-items:center;justify-content:space-between;width:100%;margin:0 0 12px;
  background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:13px 15px;
  color:var(--txt);font-size:13.5px;font-weight:800;font-family:inherit;cursor:pointer}
.myplrow span{color:var(--muted);font-weight:700}
.myplrow:active{transform:scale(.99)}
/* ── 마이: LOG | WORKS ── */
.mprof{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 0 16px;text-align:center}
.mprof .smile{width:64px;height:64px}
.mprof .smile svg{width:44px;height:44px}
.mprof h3{font-size:17px;font-weight:700}
.mprof p{font-size:11px;color:var(--muted)}
.mprof .smile{cursor:pointer}
.fcount{display:flex;align-items:center;gap:16px;margin-top:9px}
.fc{background:none;border:none;color:var(--txt);font-family:inherit;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:1px;padding:2px 4px}
.fc b{font-family:'Black Han Sans';font-size:15px;letter-spacing:.5px}
.fc small{font-size:9.5px;color:var(--muted)}
.fc:hover b{color:var(--mint)}
.fc:focus-visible{outline:2px solid var(--mint);border-radius:8px}
.fcdiv{width:1px;height:22px;background:var(--line)}
.people{position:relative}
.pdot{position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--mint);
  box-shadow:0 0 6px var(--mint)}
.srch{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
  border-radius:13px;padding:10px 12px;margin-bottom:14px}
.srchi{color:var(--muted);font-size:14px;flex-shrink:0}
.srch input{flex:1;background:none;border:none;color:var(--txt);font-family:inherit;font-size:13px;outline:none;min-width:0}
.srch input::placeholder{color:#55555d}
.srch:focus-within{border-color:var(--mint)}
.srchx{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;padding:2px 4px;flex-shrink:0}
.seg button b{font-family:'Black Han Sans';font-weight:400;font-size:11px;color:var(--muted);margin-left:3px}
.seg button.on b{color:var(--mint)}
.prow{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line)}
.pgo{display:flex;align-items:center;gap:11px;flex:1;min-width:0;cursor:pointer}
.pnm{min-width:0}
.pnm b{font-size:13.5px;font-weight:700;display:block}
.pnm small{font-size:10.5px;color:var(--muted)}
.plfol{flex-shrink:0}
.svgo{display:flex;align-items:center;gap:8px;cursor:pointer;min-width:0}
.svgo b{font-size:12.5px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.seg{display:flex;background:var(--card2);border:1px solid var(--line);border-radius:99px;padding:4px;margin-bottom:18px}
.seg button{flex:1;border:none;background:transparent;color:var(--muted);font-family:'Fredoka';font-size:12.5px;
  letter-spacing:.12em;font-weight:600;padding:9px 0;border-radius:99px;cursor:pointer}
.seg button.on{background:var(--card);color:var(--txt)}
.seg button:focus-visible{outline:2px solid var(--mint)}

.workrow{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:20px;padding:13px;margin-bottom:10px}
.wthumb{width:56px;height:56px;border-radius:12px;flex-shrink:0;position:relative;overflow:hidden}
.wplay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.28);
  border:none;color:#fff;font-size:15px;cursor:pointer}
.wplay:focus-visible{outline:2px solid #fff}
.winfo{flex:1;min-width:0}
.winfo b{font-size:15px;font-weight:700;display:block}
.winfo small{font-size:11px;color:var(--muted)}
.openst{background:transparent;border:1px solid var(--mint);color:var(--mint);border-radius:99px;
  padding:7px 13px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.openst:focus-visible{outline:2px solid var(--mint)}

/* ── Work: 참여 중인 이벤트 ── */
.evstat.one{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:11px 13px;margin:0 0 10px}
.evbadge{font-size:9px;font-weight:700;color:var(--mint);border:1px solid rgba(83,224,200,.35);
  border-radius:99px;padding:2px 7px;flex-shrink:0}
.evstat.one b{font-size:13px;font-weight:700;flex:1;min-width:0}
.evcd{font-family:'Black Han Sans';font-size:11px;color:var(--lemon);letter-spacing:.5px;flex-shrink:0}
.evstat.one.confirmed{border-color:var(--lemon);background:rgba(255,243,166,.06)}
.evbadge.confirmed{background:var(--lemon);color:#2b2417;border-color:var(--lemon)}

/* ── Work — 음악이 위, 그 아래 모든 로그 ── */
.whero{border-radius:24px;overflow:hidden;border:1px solid var(--line);margin-bottom:6px}
.wcover{height:210px;position:relative;cursor:pointer}
.wcover .bgimg{position:absolute;inset:0;background-size:cover;background-position:center}
.wmeta{position:absolute;left:0;right:0;bottom:0;z-index:4;padding:14px;background:linear-gradient(transparent,rgba(0,0,0,.82))}
.wmeta h2{font-family:'Black Han Sans';font-size:26px;letter-spacing:.5px;color:#fff}
.wmeta small{font-size:11px;color:rgba(255,255,255,.78)}
.wbtns{display:flex;gap:8px;padding:12px;background:var(--card)}
.wbtns .cta{flex:1;padding:12px}
.savebtn{flex:1;background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:13px;
  padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.savebtn.on{border-color:var(--mint);color:var(--mint)}
.savebtn:focus-visible{outline:2px solid var(--mint)}

.mchips{display:flex;gap:6px;overflow-x:auto;margin:2px 0 14px;scrollbar-width:none;padding-bottom:2px}
.mchips::-webkit-scrollbar{display:none}
.mchip{background:var(--card2);border:1px solid var(--line);color:var(--muted);border-radius:99px;
  padding:6px 13px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.mchip.on{background:var(--mint);border-color:var(--mint);color:#04231d}
.mchip:focus-visible{outline:2px solid var(--mint)}

.daytl{border-left:1.5px dashed var(--line);margin:4px 0 8px 9px;padding-left:17px}
.dayhd{position:relative;display:flex;align-items:baseline;gap:8px;margin:20px 0 10px}
.dayhd::before{content:'';position:absolute;left:-23px;top:3px;width:10px;height:10px;border-radius:50%;
  background:var(--mint);border:2px solid var(--bg)}
.dayhd b{font-family:'Black Han Sans';font-size:16px;letter-spacing:.5px}
.dayhd small{font-size:10.5px;color:var(--muted);font-family:'Black Han Sans'}
.dayhd.rel::before{background:var(--lemon);box-shadow:0 0 10px var(--lemon)}
.dayhd.rel b{color:var(--lemon)}
/* ── 새 로그 작성 시트 (마이 ＋) ── */
#composeview:empty{display:none}
.cs-bd{position:absolute;inset:0;z-index:60;background:rgba(0,0,0,.55);display:flex;align-items:flex-end}
.cs{width:100%;background:var(--card2);border-top-left-radius:22px;border-top-right-radius:22px;border-top:1px solid var(--line);
  padding:16px 16px calc(20px + env(safe-area-inset-bottom));animation:csup .22s ease}
@keyframes csup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.cs-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cs-hd b{font-family:'Black Han Sans';font-size:16px}
.cs-x{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--line);
  color:var(--muted);font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer}
.cs-x:active{transform:scale(.92)}
.cs-ta{width:100%;min-height:84px;background:var(--card);border:1px solid var(--line);border-radius:14px;
  color:var(--txt);padding:12px;font-size:16px;font-family:'Gaegu','Noto Sans KR',sans-serif;resize:none;line-height:1.5}
.cs-ta:focus{outline:2px solid var(--mint)}
.cs-prev{position:relative;margin-top:10px;border-radius:14px;overflow:hidden;max-height:230px;background:#000}
.cs-rm{position:absolute;top:8px;right:8px;width:30px;height:30px;border:0;border-radius:99px;background:rgba(0,0,0,.6);color:#fff;font-size:14px;backdrop-filter:blur(4px);z-index:2}
.cs-rm:active{transform:scale(.9)}
.cs-prev img,.cs-prev video{width:100%;display:block;max-height:230px;object-fit:contain}
.cs-row{display:flex;gap:8px;margin-top:12px}
.cs-add{flex:1;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:11px;font-size:13.5px;min-height:44px}
.cs-add:hover{border-color:var(--mint);color:var(--mint)}
.cs-post{margin-top:12px;width:100%;background:var(--mint);color:#04231d;border:0;border-radius:14px;padding:13px;font-weight:800;font-size:15px;min-height:48px}
.cs-post:disabled{opacity:.4}
/* 릴스에서 듣던 곡 담기 */
/* .sldots(릴스 담기 ⋯) 는 위 공통 원형 규칙(42px, ✕ 왼쪽)을 그대로 쓴다 */
.cs-trk{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:13px;color:var(--muted);margin-bottom:12px}
.cs-trk b{color:var(--txt)}
/* 한 박스에서 끼워넣기 — 사진·영상·데모 첨부 버튼 행 */
.cs-attach{display:flex;gap:8px;margin-top:12px}
.cs-att{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:10px 0;font-size:19px;min-height:56px}
.cs-att span{font-size:11.5px;color:var(--muted);font-weight:700}
.cs-att:active{transform:scale(.95)}
.cs-att.on{border-color:var(--mint);background:rgba(80,230,190,.1)}
.cs-att.on span{color:var(--mint)}
.cs-prev.aud{min-height:auto;background:var(--card);border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;padding:20px;color:var(--mint);font-weight:700}
.composebtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;width:100%;margin:0 0 14px;background:var(--card2);border:1px solid var(--line);border-radius:18px;padding:22px 14px;font-family:inherit;cursor:pointer}
.composebtn .cplus{display:flex;align-items:center;justify-content:center;width:50px;height:50px;border-radius:50%;border:1.5px solid var(--line);font-size:26px;color:var(--txt);line-height:1}
.composebtn .clabel{font-size:13.5px;font-weight:700;color:var(--muted)}
.composebtn:hover{border-color:var(--mint)}
.composebtn:hover .cplus{border-color:var(--mint);color:var(--mint)}
.composebtn:active{transform:scale(.99)}
/* 새 작품 이름 입력 / 플레이리스트 이름 */
.cs-name{width:100%;background:var(--card);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:13px;font-size:17px;font-family:'Black Han Sans';letter-spacing:-.01em}
.cs-name:focus{outline:2px solid var(--mint)}
.lhname{background:transparent;border:0;border-bottom:1px dashed var(--line);color:var(--txt);font-family:'Black Han Sans';font-size:22px;width:100%;padding:2px 0}
.lhname:focus{outline:0;border-bottom-color:var(--mint)}
/* 새 작품 만들기 버튼 (마이 WORKS) */
.newwork{display:block;width:100%;margin:0 0 12px;background:transparent;border:1.5px dashed var(--line);color:var(--txt);border-radius:16px;padding:15px;font-size:14px;font-weight:700;min-height:48px}
.newwork:hover{border-color:var(--mint);color:var(--mint)}
/* 앨범 정보 (Work 상세) */
.albuminfo{margin:14px 0 4px;display:flex;flex-direction:column;gap:12px}
.ai-sec{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px}
.ai-t{font-size:11px;font-weight:800;color:var(--mint);letter-spacing:.04em;margin-bottom:7px}
.ai-cr{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:12.5px;color:var(--muted)}
.ai-cr b{color:var(--txt);font-weight:700;margin-left:3px}
.ai-lyr{font-family:'Gaegu','Noto Sans KR',sans-serif;font-size:15px;line-height:1.7;color:var(--txt);white-space:pre-wrap}
.ai-dsp{display:flex;flex-wrap:wrap;gap:6px}
.ai-dsp span{font-size:11.5px;color:var(--txt);background:var(--card2);border:1px solid var(--line);border-radius:99px;padding:4px 11px}
/* 실사 아바타 */
.avimg{display:inline-block;border-radius:50%;background-size:cover;background-position:center;flex-shrink:0;vertical-align:middle}
.mprof .mpav .avimg{width:76px;height:76px}
.mprof .mpav .smile{width:76px;height:76px}
.circ .avimg{width:34px;height:34px}
/* 로그인 시트 */
.authbtn{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:13px;padding:13px;font-size:14.5px;font-weight:700;margin-bottom:8px;min-height:48px}
.authbtn b{display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;border-radius:50%;background:#fff;color:#000;font-size:12px;font-weight:900}
.authbtn.kakao b{background:#FEE500;color:#000}
.authbtn:hover{border-color:var(--mint)}
.authdiv{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:11.5px;margin:14px 0 10px}
.authdiv::before,.authdiv::after{content:'';flex:1;height:1px;background:var(--line)}
.authinput{width:100%;background:var(--card);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:12px 13px;font-size:16px;margin-bottom:8px;font-family:inherit}
.authinput:focus{outline:2px solid var(--mint)}
/* 곡 담기 검색창 + 미리듣기 행 */
.pksearch{width:100%;background:var(--card);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:11px 13px;font-size:16px;margin-bottom:8px;font-family:inherit}
.songrow{display:flex;align-items:center;gap:11px}
.songplay{width:38px;height:38px;flex-shrink:0;border-radius:50%;background:var(--card2);border:1px solid var(--line);color:var(--mint);font-size:13px;cursor:pointer}
.songplay.on{background:var(--mint);color:#04231d;border-color:var(--mint)}
.songrow .pknm{flex:1;min-width:0}
.songadd{flex-shrink:0;background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:99px;padding:7px 13px;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer;min-height:34px}
.songadd.on{background:var(--mint);border-color:var(--mint);color:#04231d}
.pksearch:focus{outline:2px solid var(--mint)}
/* 발매 로그 큐레이션 날짜 헤더 */
.pldate{font-family:'Black Han Sans';font-size:13px;color:var(--txt);margin:12px 2px 6px;padding-top:8px;border-top:1px solid var(--line)}
.pldate:first-of-type{border-top:0;padding-top:0}
/* ── Apple-style: 즉각 반응 + 반투명 유리 크롬 (간결·빠르게) ── */
button,[data-play],[data-slide],[data-story],[data-prof],[data-v],[data-room],
.av,.rcard,.tool,.fc,.shape,.fab,.cs-add,.cs-post,.fol,.slfol,.fc,.circ{ touch-action:manipulation }
/* 릴리즈가 아니라 '누르는 즉시' 반응 — 지연 없는 촉감 */
button,.rcard,.av,.tool,.circ,.fab,.fol,.slfol,.cs-add,.cs-post,.miniplay{ transition:transform .16s cubic-bezier(.22,.61,.36,1) }
button:active,.rcard:active,.av:active,.tool:active,.circ:active,.fab:active,
.fol:active,.slfol:active,.cs-add:active,.cs-post:active,.miniplay:active,
[data-story]:active,[data-prof]:active,.workrow:active{ transform:scale(.965); transition:transform .09s ease-out }
.shape{ transition:transform .12s cubic-bezier(.34,1.56,.64,1) }
.shape:active{ transform:scale(.82) }
/* 반투명 유리 크롬 — 콘텐츠가 아래로 흐른다 (불투명 막대 대신 재질) */
.nav{ background:rgba(13,13,16,.72)!important; backdrop-filter:blur(22px) saturate(155%); -webkit-backdrop-filter:blur(22px) saturate(155%); border-top:1px solid rgba(255,255,255,.06) }
.mini{ backdrop-filter:blur(18px) saturate(150%); -webkit-backdrop-filter:blur(18px) saturate(150%) }
@media (prefers-reduced-transparency: reduce){ .nav{ background:#0d0d10!important; backdrop-filter:none } .mini{ backdrop-filter:none } }

@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

  body{display:block;padding:0;position:fixed;inset:0;height:100dvh;overflow:hidden;overscroll-behavior:none;background:var(--bg)}
  /* 목업 프레임(핑크 베젤·라운드·그림자) 벗기고 화면을 꽉 채움 */
  .phone{max-width:none;width:100%;border:0;border-radius:0;box-shadow:none;height:100dvh}
  /* 뷰포트에 묶어 기기별 높이 대응 — 내부만 스크롤(스크롤 체이닝/바운스 차단) */
  .screen{height:100%;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding-bottom:calc(148px + env(safe-area-inset-bottom))}
  /* iOS 홈바(34px)와 겹치지 않게 하단 네비/미니 안전영역 확보 */
  .nav{padding-bottom:max(18px, env(safe-area-inset-bottom))}
  .mini{bottom:calc(74px + env(safe-area-inset-bottom))}
  /* iOS 포커스 시 자동 확대 방지 — 입력 계열만 16px 이상 */
  .fld input,.cin,.lyr,.rdate,.srch input,input,textarea{font-size:16px}
  /* 터치 타깃 최소 44px (핵심 컨트롤) */

  .circ{width:44px;height:44px}
}
