function submitCompose(){
  if(!S.compose) return;
  const txt=(S.compose.text||'').trim(), m=S.compose.media;
  if(!txt && !m) return;
  const d=new Date(), p=x=>String(x).padStart(2,'0'), now=p(d.getHours())+':'+p(d.getMinutes());
  let log;
  if(m && m.kind==='vid') log={id:'my_'+d.getTime(), t:'vid', at:now, cap:txt, src:m.url, side:'l', work:null};
  else if(m)              log={id:'my_'+d.getTime(), t:'ph',  at:now, cap:txt||'사진', bg:'center/cover no-repeat url('+m.url+')', side:'l', work:null};
  else                    log={id:'my_'+d.getTime(), t:'note',at:now, text:txt, tone:'y', side:'l', work:null};
  STREAM.unshift(log);
  S.compose=null;
  if(S.view!=='mine' || S.profile!=='me'){ S.view='mine'; S.profile='me'; }
  render();
  offToast('로그를 올렸어요');
}

/* ── 미니 플레이어 ── 곡·리스트명은 실제 데이터(NOWPLAY)에서 온다 */
let NOWPLAY={label:'발견', cnt:0, nm:'', tm:'', src:''};

/* ── 실제 오디오 재생 (전역 Audio 1개) ── 재생버튼에 진짜 mp3를 물린다 */
const AUDIO=new Audio(); AUDIO.preload='none';
let CURSRC='';
function _clearPlayingUI(){
  document.querySelectorAll('.rcard.playing').forEach(function(x){
    x.classList.remove('playing');
    var em=x.querySelector('.sndpill em'); if(em)em.textContent='▶';
  });
}
function playSrc(url,nm){
  if(!url) return false;
  if(CURSRC!==url){ AUDIO.src=url; CURSRC=url; }
  var p=AUDIO.play(); if(p&&p.catch)p.catch(function(e){console.warn('[audio] play blocked',e);});
  if(nm) NOWPLAY.nm=nm; NOWPLAY.src=url;
  S.mini.on=true; S.mini.playing=true;
  return true;
}
function toggleSrc(url,nm){
  if(CURSRC===url && !AUDIO.paused){ AUDIO.pause(); S.mini.playing=false; return false; }
  _clearPlayingUI();
  return playSrc(url,nm);
}
AUDIO.addEventListener('ended',function(){ S.mini.playing=false; CURSRC=''; _clearPlayingUI(); renderMini(); });

function renderMini(){
  const m=document.getElementById('mini');
  const _lab=NOWPLAY.label+(NOWPLAY.cnt?' · '+NOWPLAY.cnt+'곡':'');
  m.innerHTML = (S.mini.on && NOWPLAY.nm && !(S.view==='home'&&S.mode==='slide'))
    ? `<div class="mini ${S.mini.playing?'playing':''}">
        <div class="mini-top"><span>${_lab}</span><button id="mx" aria-label="닫기">✕</button></div>
        <div class="mini-btm"><button class="miniplay" id="mp" aria-label="재생">${S.mini.playing?'⏸':'▶'}</button>
          <span class="nm">${NOWPLAY.nm}</span><span class="tm">${NOWPLAY.tm||''}</span>
          <button class="minilist" id="mlist" aria-label="재생목록">☰</button></div></div>` : '';
  const mp=document.getElementById('mp'), mx=document.getElementById('mx'), ml=document.getElementById('mlist');
  if(mp)mp.onclick=()=>{
    if(!AUDIO.paused){ AUDIO.pause(); S.mini.playing=false; _clearPlayingUI(); }
    else { const url=NOWPLAY.src||CURSRC; if(url){ _clearPlayingUI(); playSrc(url, NOWPLAY.nm); } }
    renderMini();
  };
  if(mx)mx.onclick=()=>{ S.mini.on=false; AUDIO.pause(); S.mini.playing=false; _clearPlayingUI(); renderMini(); };
  if(ml)ml.onclick=()=>{S.list='p1'; S.share=false; S.view='list'; render()};
}

  document.querySelectorAll('[data-wf]').forEach(b=>b.onclick=()=>{S.wf=b.dataset.wf;render()});
  const wp=document.getElementById('wplaybig');
  if(wp)wp.onclick=()=>{wp.textContent=wp.textContent.startsWith('▶')?'⏸ Playing':'▶ Play'};
  const wsv=document.getElementById('wsave');
  if(wsv)wsv.onclick=()=>{S.addlist=true;render()};
  const lpx=document.getElementById('lpclose'); if(lpx)lpx.onclick=()=>{S.addlist=false;render()};
  const lpbd=document.getElementById('lpbd');   if(lpbd)lpbd.onclick=()=>{S.addlist=false;render()};
  document.querySelectorAll('[data-addto]').forEach(b=>b.onclick=()=>{
    const p=LISTS.find(x=>x.id===b.dataset.addto), w=WORKS.find(x=>x.id===S.work);
    if(p&&w){ p.tracks.push({nm:w.nm, by:w.by, dur:w.dur}); p.cnt++; if(p.cov.length<3)p.cov.push(w.id); }
    S.addlist=false; render();
  });
  const lpn=document.getElementById('lpnew');
  if(lpn)lpn.onclick=()=>{
    const w=WORKS.find(x=>x.id===S.work), id='p'+Date.now().toString(36);
    LISTS.unshift({id, nm:w.nm+' 리스트', cnt:1, pub:0, cov:[w.id], tracks:[{nm:w.nm, by:w.by, dur:w.dur}]});
    S.addlist=false; S.list=id; S.view='list'; render();
  };
  /* 도구줄: 사진→카메라, 생각/메모→글 작성 (음성/녹음/음원은 다음 단계) */
  document.querySelectorAll('[data-lt]').forEach(b=>b.onclick=()=>{
    S.ltype=+b.dataset.lt; const lab=b.dataset.l;
    if(lab==='사진'){ S.compose={text:'',media:null}; render(); setTimeout(()=>{const el=document.getElementById('cphoto'); if(el)el.click();},60); return; }
    if(lab==='생각'||lab==='메모'){ S.compose={text:'',media:null}; render(); return; }
    render();
  });
  /* 새 로그 ＋ (FAB) → 작성 시트 열기 */
  document.querySelectorAll('.fab').forEach(b=>b.onclick=()=>{ S.compose={text:'',media:null}; render(); });
  /* 작성 시트 컨트롤 (매 렌더 재바인딩) */
  if(S.compose){
    const bd=document.getElementById('csbd'), x=document.getElementById('csx');
    const ta=document.getElementById('csta'), post=document.getElementById('cspost');
    const cph=document.getElementById('csphoto'), cvd=document.getElementById('csvideo');
    const close=()=>{ S.compose=null; render(); };
    if(bd)bd.onclick=e=>{ if(e.target===bd) close(); };
    if(x)x.onclick=close;
    if(ta)ta.oninput=()=>{ S.compose.text=ta.value; if(post)post.disabled=!((ta.value||'').trim()||S.compose.media); };
    if(cph)cph.onclick=()=>{ const el=document.getElementById('cphoto'); if(el)el.click(); };
    if(cvd)cvd.onclick=()=>{ const el=document.getElementById('cvideo'); if(el)el.click(); };
    if(post)post.onclick=submitCompose;
  }
  /* 카메라/갤러리 파일 입력 (1회 바인딩) */
  const cpho=document.getElementById('cphoto');
  if(cpho && !cpho.__b){ cpho.__b=1; cpho.onchange=()=>{ const f=cpho.files&&cpho.files[0];
    if(f){ if(!S.compose)S.compose={text:'',media:null}; if(S.compose.media&&S.compose.media.url){try{URL.revokeObjectURL(S.compose.media.url)}catch(_){}}
      S.compose.media={kind:'ph',url:URL.createObjectURL(f)}; render(); } cpho.value=''; }; }
  const cvid=document.getElementById('cvideo');
  if(cvid && !cvid.__b){ cvid.__b=1; cvid.onchange=()=>{ const f=cvid.files&&cvid.files[0];
    if(f){ if(!S.compose)S.compose={text:'',media:null}; if(S.compose.media&&S.compose.media.url){try{URL.revokeObjectURL(S.compose.media.url)}catch(_){}}
      S.compose.media={kind:'vid',url:URL.createObjectURL(f)}; render(); } cvid.value=''; }; }
  document.querySelectorAll('.play').forEach(p=>p.onclick=e=>{
    e.stopPropagation();
    const box=p.closest('.dplayer')||p.closest('.fy');
    if(!box)return;
    const on=box.classList.toggle('playing');
    p.textContent=on?'⏸':'▶';
  });
  document.querySelectorAll('.fol').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const aid=b.dataset.aid;
    if(!ME){ needLogin(); return; }               // 비로그인 → UI 안 바꾸고 안내
    const on=b.classList.toggle('on');             // 낙관적 UI
    b.textContent=on?'팔로잉':'팔로우';
    (on?followArtist(aid):unfollowArtist(aid)).then(ok=>{
      if(!ok){ const back=b.classList.toggle('on'); b.textContent=back?'팔로잉':'팔로우'; } // 실패 시 롤백
    });
  });
  /* 스트림 안에서 소리가 울리면 종이 전체가 반응한다 */
  document.querySelectorAll('.dotplay').forEach(p=>p.onclick=e=>{
    e.stopPropagation();
    const m=p.closest('.mark'), st=document.getElementById('stream');
    const on=!m.classList.contains('playing');
    document.querySelectorAll('.mark.playing').forEach(x=>{
      x.classList.remove('playing'); x.querySelector('.dotplay').textContent='▶';
    });
    if(on){m.classList.add('playing'); p.textContent='❙❙'}
    if(st)st.classList.toggle('sounding', on);
  });
  document.querySelectorAll('.rbtn').forEach(r=>r.onclick=e=>{
    e.stopPropagation();
    const frx=r.closest('.frx,.slrx'); const tid=frx&&frx.dataset.tid;
    if(tid && !ME){ needLogin(); return; }           // 진짜 곡 반응인데 비로그인 → 안내(저장은 로그인 필요)
    const was=r.dataset.hit==='1';                    // 토글
    r.dataset.hit=was?'':'1'; r.classList.toggle('hit', !was);
    const n=(frx||r.parentElement).querySelector('.rxn');
    if(n){ n.dataset.n=Math.max(0,(+n.dataset.n)+(was?-1:1)); n.textContent=n.dataset.n; }
    if(!was){                                          // 추가할 때만 +1 팝
      const box=r.closest('.fcard')||r.closest('.log')||r.closest('.dplayer')||r.closest('.svbody')||r.closest('.sl');
      if(box){ const p=document.createElement('span'); p.className='pop'; p.textContent=r.dataset.emo+' +1';
        box.style.position='relative'; box.appendChild(p); setTimeout(()=>p.remove(),900); }
    }
    if(tid) toggleReact(tid, r.dataset.emo);          // 실제 곡이면 서버 저장
  });

  /* 스토리 열 + 전체화면 뷰어 */
  document.querySelectorAll('[data-story]').forEach(b=>b.onclick=()=>openStory(+b.dataset.story));
  const svclose=document.getElementById('svclose'); if(svclose)svclose.onclick=closeStory;
  const svtapl=document.getElementById('svtapl'); if(svtapl)svtapl.onclick=e=>{e.stopPropagation();prevItem()};
  const svtapr=document.getElementById('svtapr'); if(svtapr)svtapr.onclick=e=>{e.stopPropagation();nextItem()};
  const svfolbtn=document.getElementById('svfolbtn');
  if(svfolbtn)svfolbtn.onclick=e=>{e.stopPropagation();
    const st=STORIES[S.storyIdx]; if(!st)return;
    if(!ME){ needLogin(); return; }
    st.following=true; followArtist(st.aid); render();
  };
  const svwrap=document.getElementById('svwrap');
  if(svwrap){
    const activeI=svwrap.querySelector('.svbar.active i');
    if(activeI)activeI.addEventListener('animationend',nextItem,{once:true});
    const pause=()=>svwrap.classList.add('paused');
    const resume=()=>svwrap.classList.remove('paused');
    svwrap.addEventListener('pointerdown',pause);
    svwrap.addEventListener('pointerup',resume);
    svwrap.addEventListener('pointerleave',resume);
  }
}

setInterval(()=>{
  document.querySelectorAll('[data-cd]').forEach(el=>{
    const r=ROUNDS.find(x=>x.id===el.dataset.cd); if(!r)return;
    const t=Math.max(0,r.end-Date.now());
    el.textContent=`D-${Math.floor(t/864e5)} `+
      [Math.floor(t%864e5/36e5),Math.floor(t%36e5/6e4),Math.floor(t%6e4/1e3)]
        .map(x=>String(x).padStart(2,'0')).join(':');
  });
},1000);

/* ── 실제 데이터 주입 — 디자인/구성은 v34 그대로, 목업만 진짜 음악/아티스트로 교체 ── */
(async function loadReal(){
  try{
    var SB='https://vayzhmaggwpkbsrrsdqt.supabase.co';
    var KEY='sb_publishable_1PxNV0BGL7Wy_strTMqnbA_pCBCsOPG';
    var cols='id,title,tags,audio_url,cover_url,is_demo,project_id,created_at,likes_count,profiles(id,name,avatar_url)';
    var r=await fetch(SB+'/rest/v1/tracks?select='+encodeURIComponent(cols)+'&order=created_at.desc&limit=200',{headers:{apikey:KEY,Authorization:'Bearer '+KEY}});
    if(!r.ok) throw new Error('fetch '+r.status);
    var rows=await r.json();
    var COLS=['coral','blue','green','yellow','purple','shpink'];
    var colOf=function(n){ var h=0; n=String(n||''); for(var i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))|0; return COLS[Math.abs(h)%6]; };
    var tm=function(iso){ var d=new Date(iso||Date.now()); function p(x){return String(x).padStart(2,'0');} return p(d.getHours())+':'+p(d.getMinutes()); };
    var GRADS=[
      'radial-gradient(circle at 30% 25%,#2e5a7e,transparent 60%),radial-gradient(circle at 80% 80%,#173a4e,transparent 55%),#0c141c',
      'radial-gradient(circle at 65% 20%,#4a3a7e,transparent 55%),radial-gradient(circle at 20% 85%,#1c2a5c,transparent 60%),#0e0c18',
      'radial-gradient(circle at 25% 30%,#4a2f66,transparent 60%),radial-gradient(circle at 80% 75%,#173f38,transparent 55%),#101014',
      'radial-gradient(circle at 70% 25%,#5c3050,transparent 55%),radial-gradient(circle at 20% 80%,#20305c,transparent 60%),#12121a'
    ];
    var tracks=rows.map(function(x){ return {
      id:x.id, title:x.title||'무제', artist:(x.profiles&&x.profiles.name)||'익명',
      artistId:(x.profiles&&x.profiles.id)||null,
      tags:Array.isArray(x.tags)?x.tags:[], audio:x.audio_url||'',
      cover:(x.cover_url&&/^https?:\/\//.test(x.cover_url))?x.cover_url:'',
      demo:!!x.is_demo, pid:x.project_id||('p_'+x.id), ts:x.created_at, likes:(x.likes_count||0)
    }; });
    var byArtist={}; tracks.forEach(function(t){ (byArtist[t.artist]=byArtist[t.artist]||[]).push(t); });
    var artists=Object.keys(byArtist);
    var aidOf=function(name){ var ts=byArtist[name]; return (ts&&ts[0]&&ts[0].artistId)||null; }; // 아티스트명 → profile id
    var iFollow=function(name){ var id=aidOf(name); return !!(id&&MYFOLLOWS.has(id)); };            // 내가 팔로우 중?
    await loadMe(); // 로그인 유저 + 내 팔로우/반응 상태를 카드 빌드 전에 확보

    var cut=function(s,n){ s=String(s||''); return s.length>n ? s.slice(0,n-1)+'…' : s; };
    var _shuf=function(a){ var x=a.slice(); for(var i=x.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=x[i];x[i]=x[j];x[j]=t;} return x; };

    // ── 매 새로고침마다 전체 아티스트에서 다양하게 재샘플 → (1) 모든 아티스트 노출 (2) 트렌드 첫 화면 새 얼굴 ──
    function resampleFeed(){
      var reps=[], seenA={};
      _shuf(tracks).forEach(function(t){ if(seenA[t.artist])return; seenA[t.artist]=1; reps.push(t); }); // 아티스트당 대표 1곡(랜덤)
      var mk=function(t){ var o={who:cut(t.artist,18), c:colOf(t.artist), at:tm(t.ts), rx:(t.likes||0), aid:aidOf(t.artist), tid:t.id, t:'snd', audio:t.audio, nm:cut(t.title,20)};
        o.cap=o.nm; o.sub=cut((t.demo?'Demo':'Track')+(t.tags[0]?' · '+t.tags[0]:''),24); if(t.tags[0])o.tags=t.tags.slice(0,2).map(function(x){return '#'+String(x).replace(/^#/,'');}); return o; };
      var i=0, take=function(n){ var s=[]; for(var k=0;k<n && reps.length;k++){ s.push(reps[i%reps.length]); i++; } return s; };
      // 섹션마다 서로 다른 아티스트 (STORIES 8 · TREND 12 · FORYOU 8 · FOLLOW 8 = 최대 36명/뷰, 나머지는 다음 새로고침에)
      STORIES=take(8).map(function(t){ var a=t.artist, ts=(byArtist[a]||[t]).slice(0,2);
        return { who:a, c:colOf(a), aid:aidOf(a), following:iFollow(a), seen:false, items:ts.map(function(x){
          return x.cover ? {t:'ph', at:tm(x.ts), cap:x.title, bg:'#141418', img:x.cover} : {t:'snd', at:tm(x.ts), cap:x.title, dur:'', audio:x.audio}; }) }; });
      TREND     = take(12).map(mk);
      FORYOU    = take(8).map(mk);
      FOLLOWLOG = take(8).map(mk);
      PEOPLE = _shuf(reps).slice(0,24).map(function(t){ return {who:t.artist, c:colOf(t.artist), aid:aidOf(t.artist), sub:(t.tags[0]||'Artist'), fing:(iFollow(t.artist)?1:0)}; });
      var f=reps[0]; if(f){ NOWPLAY={label:'발견', cnt:tracks.length, nm:cut(f.title,20), tm:'', src:f.audio}; }
    }
    window.__resample=resampleFeed;
    if(tracks.length) resampleFeed();

    // WORKS = 프로젝트(project_id)별 대표 — 로그 수 = 그 프로젝트 곡 수
    var byPid={}; tracks.forEach(function(t){ (byPid[t.pid]=byPid[t.pid]||[]).push(t); });
    var wl=Object.keys(byPid).map(function(pid,i){
      var vs=byPid[pid]; var rep=vs[0];
      return { id:'w'+i, nm:(rep.title||'무제').replace(/\s*\(.*\)$/,''), by:rep.artist, dur:'', logs:vs.length, span:'', date:'', bg:GRADS[i%GRADS.length], _cover:rep.cover, _rep:rep };
    }).slice(0,12);
    if(wl.length) WORKS=wl;

    // STREAM = 로그 스트림(mine) — 곡 많은 아티스트를 'me'로 삼아 진짜 로그처럼
    var meA=artists.slice().sort(function(a,b){return byArtist[b].length-byArtist[a].length;})[0];
    if(meA){
      STREAM=byArtist[meA].slice(0,8).map(function(t,i){
        return t.audio ? {id:'l'+i, t:'snd', at:tm(t.ts), nm:t.title, dur:'', side:(i%2?'r':'l'), work:null, audio:t.audio}
                       : {id:'l'+i, t:'note', at:tm(t.ts), text:'#'+(t.tags[0]||t.title), tone:(i%2?'b':'y'), side:(i%2?'r':'l'), work:null};
      });
    }

    // (홈 피드 TREND/FORYOU/FOLLOWLOG/STORIES/PEOPLE 는 위 resampleFeed()가 매 새로고침마다 생성)

    // ── 합주실(ROOM) 시간대 카드도 실제 아티스트 4명으로 ── (PEEK/MINLEE/전아름 목업 제거)
    var roomA=artists.slice(0,4);
    if(roomA.length){
      var rslots=['12:00','15:00','18:00','21:00']; var NR={};
      rslots.forEach(function(sl,si){
        NR[sl]=roomA.map(function(a,ai){
          var ts=byArtist[a]||[]; var t=ts[(si+ai)%(ts.length||1)];
          var base={who:cut(a,14), c:colOf(a)}; var pick=(si+ai)%3;
          if(!t || pick===2){ base.t='empty'; }
          else if(t.cover && pick===0){ base.t='ph'; base.cap=cut(t.title,16); base.bg=GRADS[(ai+si)%GRADS.length]; }
          else if(t.audio){ base.t='snd'; base.cap=cut(t.title,16); base.dur=''; base.audio=t.audio; }
          else if(pick===0){ base.t='ph'; base.cap=cut(t.title,16); base.bg=GRADS[(ai+si)%GRADS.length]; }
          else { base.t='note'; base.text=cut(t.title,18); }
          return base;
        });
      });
      ROOM=NR;
    }

    // ── 라운드(ROUNDS) 후보 도형도 실제 곡/아티스트로 ── (한 라운드 안에서 아티스트 중복 방지)
    var pool=tracks.slice(0);
    if(pool.length){
      var SHP=['hex','star','circle']; var pi=0;
      ROUNDS.forEach(function(rd){
        var used={};
        rd.cands=rd.cands.map(function(cd,ci){
          var t=null, tries=0;
          while(tries++<pool.length){ var cand=pool[(pi++)%pool.length]; if(!used[cand.artist]){ t=cand; used[cand.artist]=1; break; } }
          if(!t) t=pool[(pi++)%pool.length];
          var nc={t:[cut(t.title,16), cut(t.artist,14)], s:SHP[ci%3], c:colOf(t.artist),
                  v:(t.likes||cd.v||0), x:cd.x, y:cd.y, bd:cd.bd};
          if(cd.me) nc.me=1;
          return nc;
        });
      });
    }
  }catch(e){ console.warn('[offlog] real data load failed', e); }
  try{ renewHome(); }catch(e){}
  render();
})();

</script>
