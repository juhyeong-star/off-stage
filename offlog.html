<!-- 메인앱과 동일 Supabase SDK — 같은 도메인이라 로그인 세션이 자동 공유된다 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const V=getComputedStyle(document.documentElement), c=n=>V.getPropertyValue('--'+n).trim();

/* ── 로그인 세션 (메인앱 회원 그대로) + 실제 쓰기 클라이언트 ── */
const SB_URL='https://vayzhmaggwpkbsrrsdqt.supabase.co';
const SB_KEY='sb_publishable_1PxNV0BGL7Wy_strTMqnbA_pCBCsOPG';
let SBC=null;               // 인증 클라이언트 (RLS용 JWT 자동 첨부)
let ME=null;                // 현재 로그인 유저 {id,name}
const MYFOLLOWS=new Set();  // 내가 팔로우한 artist profile id
const MYREACT={};           // track_id -> Set(kind)
try{
  if(window.supabase && window.supabase.createClient){
    SBC=window.supabase.createClient(SB_URL, SB_KEY, {auth:{persistSession:true, autoRefreshToken:true}});
  }
}catch(e){ console.warn('[offlog] supabase client init 실패', e); }

/* 로그인 유저 로드 + 내 팔로우/반응 상태 미리 받아두기 */
async function loadMe(){
  if(!SBC){ ME=null; return null; }
  try{
    const {data:{user}}=await SBC.auth.getUser();
    if(user){
      const meta=user.user_metadata||{};
      let nm=(meta.name||meta.full_name||(user.email?user.email.split('@')[0]:'나'));
      let av=(meta.avatar_url||meta.picture||''), role='listener';
      // 내 profiles 행 (이름/아바타/role 정본)
      try{ const p=await SBC.from('profiles').select('name,avatar_url,role').eq('id',user.id).maybeSingle();
        if(p&&p.data){ if(p.data.name&&p.data.name!=='익명')nm=p.data.name; if(p.data.avatar_url)av=p.data.avatar_url; if(p.data.role)role=p.data.role; } }catch(_){}
      if(!av) av='https://i.pravatar.cc/150?u='+user.id;
      ME={ id:user.id, name:nm, avatar:av, role:role };
      MYFOLLOWS.clear();
      /* 실제 DB 컬럼은 followed_id (following_id 아님) */
      const f=await SBC.from('follows').select('followed_id').eq('follower_id', user.id);
      if(f.data) f.data.forEach(r=>MYFOLLOWS.add(r.followed_id));
      try{ const mc=await followCounts(user.id); ME.followers=mc.followers; }catch(_){}   /* 내 팔로워 실제 수 */
      /* track_reactions 테이블은 아직 없음 → 없으면 조용히 통과(세션 내 반응만) */
      try{ const r=await SBC.from('track_reactions').select('track_id,kind').eq('user_id', user.id);
        if(r&&r.data) r.data.forEach(x=>{ (MYREACT[x.track_id]=MYREACT[x.track_id]||new Set()).add(x.kind); }); }catch(_){}
    } else { ME=null; }
  }catch(e){ console.warn('[offlog] loadMe 실패', e); }
  return ME;
}

/* 내 페이지 LOG = 내 곡이어야 한다.
   (로더는 '곡이 제일 많은 아티스트'를 me로 삼아 STREAM을 만들기 때문에, 로그인하면 여기서 내 것으로 교체) */
async function loadMyStream(){
  if(!ME||!ME.id||!SBC) return false;
  try{
    const mt=await SBC.from('tracks').select('id,title,audio_url,created_at')
      .eq('artist_id',ME.id).order('created_at',{ascending:false}).limit(60);
    const rows=(mt&&mt.data)?mt.data:[];
    const mine=rows.map(function(x,i){
      const ts=x.created_at||'', dt=ts.slice(0,10), at=ts.slice(11,16);
      return x.audio_url
        ? {id:'sb_'+x.id, t:'snd', at:at, dt:dt, nm:x.title||'무제', dur:'', side:(i%2?'r':'l'), work:null, audio:x.audio_url}
        : {id:'sb_'+x.id, t:'note', at:at, dt:dt, text:x.title||'', tone:(i%2?'b':'y'), side:(i%2?'r':'l'), work:null};
    });
    /* 기기에 저장한 내 로그(my_)는 남기고, 데모 시드는 내 실제 곡으로 교체 */
    const myLocal=STREAM.filter(function(l){ return String(l.id).indexOf('my_')===0; });
    STREAM=_dedupById(myLocal.concat(mine));
    return true;
  }catch(e){ console.warn('[offlog] 내 로그 로드 실패', e); return false; }
}

/* ── 로그인/로그아웃 (기존 회원 계정, 메인앱과 동일 방식) ── */
let _authWired=false;
function wireAuth(){
  if(_authWired||!SBC)return; _authWired=true;
  try{ SBC.auth.onAuthStateChange(function(ev){
    loadMe().then(function(){ return loadMyStream(); }).then(function(){ try{render();}catch(_){}});
  }); }catch(e){}
}
async function loginGoogle(){ if(!SBC)return; try{ await SBC.auth.signInWithOAuth({provider:'google', options:{redirectTo:location.href}}); }catch(e){ offToast('로그인 실패 — 잠시 후 다시'); } }
async function loginKakao(){ if(!SBC)return; try{ await SBC.auth.signInWithOAuth({provider:'kakao', options:{redirectTo:location.href}}); }catch(e){ offToast('로그인 실패 — 잠시 후 다시'); } }
async function loginEmail(email,pw){
  if(!SBC)return; const btn=document.getElementById('authsubmit'); if(btn){btn.disabled=true;btn.textContent='로그인 중…';}
  try{ const {error}=await SBC.auth.signInWithPassword({email:email, password:pw}); if(error)throw error;
    await loadMe(); S.auth=false; render(); offToast('로그인됐어요'); }
  catch(e){ offToast('이메일 또는 비밀번호를 확인하세요'); if(btn){btn.disabled=false;btn.textContent='로그인';} }
}
async function logout(){ if(!SBC)return; try{ await SBC.auth.signOut(); }catch(e){} ME=null; MYFOLLOWS.clear(); for(var k in MYREACT)delete MYREACT[k]; render(); offToast('로그아웃됐어요'); }

/* ── 실제 프로필 로드 + 캐시 (공개 읽기) ── */
let PROFCACHE={};
/* 실제 팔로워/팔로잉 수 — follows(follower_id, followed_id) 에서 집계. 못 세면 null(가짜 숫자 금지) */
async function followCounts(id){
  const out={followers:null, following:null};
  if(!id||!SBC) return out;
  try{
    const a=await SBC.from('follows').select('follower_id',{count:'exact',head:true}).eq('followed_id',id);
    if(a && typeof a.count==='number') out.followers=a.count;
    const b=await SBC.from('follows').select('followed_id',{count:'exact',head:true}).eq('follower_id',id);
    if(b && typeof b.count==='number') out.following=b.count;
  }catch(e){ console.warn('[offlog] followCounts 실패', e); }
  return out;
}
/* 실제 팔로워/팔로잉 목록 — follows + profiles 로 진짜 사람을 가져온다 (목업 PEOPLE 대체) */
const FLCACHE={};   /* key: id|kind → [{id,who,sub,avatar,aid}] */
/* 팔로우/언팔로우하면 목록·수치가 바뀌므로 캐시를 비운다(다음 진입 때 실제 값 재조회) */
function flcacheClear(){ for(var k in FLCACHE) delete FLCACHE[k]; }
async function loadFollowList(id, kind){
  const key=id+'|'+kind;
  if(FLCACHE[key]) return FLCACHE[key];
  if(!id||!SBC) return [];
  try{
    /* follower = 나를 팔로우한 사람 / following = 내가 팔로우한 사람 */
    const whereCol = kind==='follower' ? 'followed_id' : 'follower_id';
    const pickCol  = kind==='follower' ? 'follower_id' : 'followed_id';
    const f=await SBC.from('follows').select(pickCol).eq(whereCol, id).limit(300);
    const ids=[...new Set((f&&f.data?f.data:[]).map(r=>r[pickCol]).filter(Boolean))];
    if(!ids.length){ FLCACHE[key]=[]; return []; }
    const p=await SBC.from('profiles').select('id,name,avatar_url,role').in('id', ids);
    const rows=(p&&p.data?p.data:[]).map(function(x){
      return { id:x.id, aid:x.id, who:x.name||'익명', avatar:x.avatar_url||'', sub:roleKo(x.role)||'', c:'blue' };
    });
    FLCACHE[key]=rows; return rows;
  }catch(e){ console.warn('[offlog] loadFollowList 실패', e); return []; }
}
async function loadProfile(id){
  if(!id||!SBC) return null;
  if(PROFCACHE[id]) return PROFCACHE[id];
  try{
    const pr=await SBC.from('profiles').select('id,name,avatar_url,role,sns_instagram,sns_youtube,sns_tiktok').eq('id',id).maybeSingle();
    const tr=await SBC.from('tracks').select('id,title,audio_url,cover_url,is_demo,created_at,likes_count,project_id').eq('artist_id',id).order('created_at',{ascending:false});
    const p=pr&&pr.data?pr.data:null;
    const fc=await followCounts(id);   /* 실제 팔로워/팔로잉 수 */
    const prof={ id:id, name:(p&&p.name)||'아티스트', avatar:(p&&p.avatar_url)||('https://i.pravatar.cc/150?u='+id),
      role:(p&&p.role)||'artist', sns:{ig:(p&&p.sns_instagram)||'',yt:(p&&p.sns_youtube)||'',tt:(p&&p.sns_tiktok)||''},
      followers:fc.followers, following:fc.following,
      tracks:(tr&&tr.data?tr.data:[]).map(function(t){ return {id:t.id, nm:t.title||'무제', audio:t.audio_url||'', cover:(t.cover_url&&/^https?:\/\//.test(t.cover_url))?t.cover_url:'', demo:!!t.is_demo, dt:(t.created_at||'').slice(0,10), likes:t.likes_count||0}; }) };
    PROFCACHE[id]=prof; return prof;
  }catch(e){ console.warn('[offlog] loadProfile 실패', e); return null; }
}
/* 아바타: 실사 이미지 있으면 이미지, 없으면 기존 색 스마일 */
function avatarEl(av, color, size){
  var s=size||44;
  if(av) return `<span class="avimg" style="width:${s}px;height:${s}px;background-image:url(${av})"></span>`;
  return smileEl(color||'blue');
}
let AIDBYNAME={};   // 아티스트 표시명 → profile id (로더가 채움)
/* 로그인 시트 (기존 회원 계정) */
function authSheet(){

  return `<div class="cs-bd" id="authbd"><div class="cs">

    <button class="authbtn" id="authgoogle"><b>G</b> Google로 계속</button>
    <button class="authbtn kakao" id="authkakao"><b>K</b> 카카오로 계속</button>
    <div class="authdiv"><span>또는 이메일</span></div>
    <input class="authinput" id="authemail" type="email" autocomplete="username" placeholder="이메일">
    <input class="authinput" id="authpw" type="password" autocomplete="current-password" placeholder="비밀번호">
    <button class="cs-post" id="authsubmit" style="margin-top:10px">로그인</button>
  </div></div>`;
}
/* 듣던 곡을 플레이리스트에 담기 (릴스/피드에서 바로) */
function saveSheet(){
  if(!S.saveTrack) return '';
  const t=S.saveTrack, mine=LISTS.filter(p=>p.mine);
  return `<div class="cs-bd" id="svbd"><div class="cs">
    <div class="cs-hd"><b>담을 플레이리스트</b><button class="cs-x" id="svx" aria-label="닫기">✕</button></div>
    <div class="cs-trk">🎵 <b>${t.nm}</b> · ${t.by}</div>
    ${mine.length?mine.map(p=>{const has=(p.tracks||[]).some(x=>x.tid===t.tid);
      return `<button class="pkrow" data-savein="${p.id}"><span class="pknm"><b>${p.nm}</b><small>${(p.tracks||[]).length}곡</small></span>
        <span style="margin-left:auto;color:${has?'var(--mint)':'var(--muted)'};font-weight:800">${has?'✓ 담김':'＋'}</span></button>`}).join(''):`<div class="pknote" style="padding:10px 0">아직 만든 플레이리스트가 없어요</div>`}
    <button class="newlist" id="svnew" style="margin-top:8px">＋ 새 플레이리스트에 담기</button>

/* 로그 ⋯ 액션 메뉴 — 내 글=사진/데모 넣기, 남의 음악=공유/담기 */
let _attachTo=null;
function logMenuSheet(){
  if(!S.logMenu) return '';
  const M=S.logMenu;
  const rows = M.kind==='addmedia'
    ? `<button class="pkrow" data-addkind="ph"><span class="pknm"><b>📷 사진 넣기</b><small>이 글이 사진 위 캡션이 돼요</small></span><span style="margin-left:auto;color:var(--muted);font-weight:800">＋</span></button>
       <button class="pkrow" data-addkind="snd"><span class="pknm"><b>♪ 데모 넣기</b><small>이 글에 데모(오디오)를 붙여요</small></span><span style="margin-left:auto;color:var(--muted);font-weight:800">＋</span></button>`
    : `${M.aid?`<button class="pkrow" data-omenu="follow"><span class="pknm"><b>${(typeof MYFOLLOWS!=='undefined'&&MYFOLLOWS.has(M.aid))?'✓ 팔로잉':'＋ 팔로우'}</b><small>${(typeof MYFOLLOWS!=='undefined'&&MYFOLLOWS.has(M.aid))?'탭하면 팔로우 해제':(M.by||'이 아티스트')+' 팔로우하기'}</small></span></button>`:''}
       <button class="pkrow" data-omenu="save"><span class="pknm"><b>＋ 내 플레이리스트에 담기</b></span><span style="margin-left:auto;color:var(--mint);font-weight:800">담기</span></button>
       <button class="pkrow" data-omenu="share"><span class="pknm"><b>⤴ 공유</b><small>링크로 공유하거나 복사</small></span></button>`;
  return `<div class="cs-bd" id="lmbd"><div class="cs">
    <div class="cs-hd"><b>${M.kind==='addmedia'?'로그에 넣기':(M.nm||'음악')}</b><button class="cs-x" id="lmx" aria-label="닫기">✕</button></div>
    ${M.kind==='addmedia'?'':`<div class="cs-trk">🎵 <b>${M.nm||'음악'}</b>${M.by?' · '+M.by:''}</div>`}
    ${rows}
  </div></div>`;
}
/* 비로그인 안내 — 조용히 실패시키지 않고 알려준다 */
let _toastT=null;
function offToast(msg){
  let el=document.getElementById('offtoast');
  if(!el){ el=document.createElement('div'); el.id='offtoast';
    el.style.cssText='position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:9999;background:#1F1F23;color:#F5F5F2;border:1px solid #53E0C8;padding:11px 16px;border-radius:14px;font-size:13px;font-family:\'Noto Sans KR\',sans-serif;box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:80vw;text-align:center';
    document.body.appendChild(el); }
  el.textContent=msg; el.style.opacity='1';
  clearTimeout(_toastT); _toastT=setTimeout(()=>{el.style.opacity='0';}, 2600);
}
function needLogin(){ offToast('로그인하면 저장돼요 — 메인에서 로그인 후 이용하세요'); }

/* ── 창작 스튜디오 로컬 저장 (내가 만든 작품/플레이리스트/로그, 새로고침에도 유지) ── */
const STUDIO_KEY='offlog:studio:v1';
function studioLoad(){
  try{ var s=JSON.parse(localStorage.getItem(STUDIO_KEY)||'{}'); return {works:s.works||[], lists:s.lists||[], logs:s.logs||[]}; }
  catch(e){ return {works:[], lists:[], logs:[]}; }
}
function studioSave(){
  try{
    var mineWorks=WORKS.filter(function(w){return w.mine;});
    var myLogs=STREAM.filter(function(l){return l && String(l.id).indexOf('my_')===0 && l.t!=='vid' && !(l.audio&&/^blob:/.test(l.audio));}); /* 영상·미로그인 데모는 blob이라 저장 불가(세션 전용) */
    var myLists=LISTS.filter(function(p){return p.mine;});
    localStorage.setItem(STUDIO_KEY, JSON.stringify({works:mineWorks, lists:myLists, logs:myLogs}));
  }catch(e){ console.warn('[studio] save 실패(용량?)', e); offToast('저장 실패 — 이미지가 너무 클 수 있어요'); }
}
function _dedupById(arr){ var seen={}, out=[]; arr.forEach(function(x){ if(!x)return; var k=x.id; if(k!=null&&seen[k])return; if(k!=null)seen[k]=1; out.push(x); }); return out; }
/* 로더가 만든 샘플 위에 내 저장분을 얹는다 */
function studioMerge(){
  var st=studioLoad();
  if(st.works.length) WORKS=_dedupById(st.works.concat(WORKS));
  if(st.logs.length)  STREAM=_dedupById(st.logs.concat(STREAM));
  if(st.lists.length) LISTS=_dedupById(st.lists.concat(LISTS.filter(function(p){return !p.mine;})));
}

/* ── 실제 쓰기 (RLS: 로그인 유저의 JWT로 통과, 익명은 차단) ── */
async function followArtist(aid){
  if(!aid){ return false; }
  if(!ME){ needLogin(); return false; }
  try{
    const {error}=await SBC.from('follows').insert({follower_id:ME.id, followed_id:aid});
    if(error && error.code!=='23505'){ throw error; }   // 23505=이미 있음 → 무시
    MYFOLLOWS.add(aid); flcacheClear(); return true;
  }catch(e){ console.warn('[offlog] follow 실패', e); offToast('저장 실패 — 잠시 후 다시'); return false; }
}
async function unfollowArtist(aid){
  if(!aid){ return false; }
  if(!ME){ needLogin(); return false; }
  try{
    const {error}=await SBC.from('follows').delete().eq('follower_id',ME.id).eq('followed_id',aid);
    if(error) throw error;
    MYFOLLOWS.delete(aid); flcacheClear(); return true;
  }catch(e){ console.warn('[offlog] unfollow 실패', e); offToast('저장 실패 — 잠시 후 다시'); return false; }
}
async function toggleReact(tid, kind){
  if(!tid){ return; }
  if(!ME){ needLogin(); return; }
  const set=MYREACT[tid]=MYREACT[tid]||new Set();
  const had=set.has(kind);
  if(had) set.delete(kind); else set.add(kind);   /* 화면은 즉시 반영 */
  try{
    if(had){
      const {error}=await SBC.from('track_reactions').delete().eq('user_id',ME.id).eq('track_id',tid).eq('kind',kind);
      if(error) throw error;
    }else{
      const {error}=await SBC.from('track_reactions').insert({user_id:ME.id, track_id:tid, kind:kind});
      if(error && error.code!=='23505') throw error;
    }
  }catch(e){
    /* track_reactions 테이블이 아직 없으면(PGRST205/404) 저장만 못 할 뿐, 세션 반응은 유지 */
    if(e && (e.code==='PGRST205' || e.code==='42P01')) { console.info('[offlog] 반응 저장 보류 — track_reactions 테이블 없음'); return; }
    console.warn('[offlog] react 실패', e); offToast('반응 저장 실패 — 잠시 후 다시');
  }
}

/* 로그 정렬 키 — 시각(ms). 내가 올린 로그(my_)는 생성시각, 시드는 날짜+시각. */
function logTs(l){
  if(!l) return 0;
  var id=String(l.id||'');
  if(id.indexOf('my_')===0){ var n=parseInt(id.slice(3),10); if(n) return n; }
  var t=Date.parse(((l.dt||'2000-01-01')+'T'+(l.at||'00:00')));
  return isNaN(t)?0:t;
}
/* 이번 세션에 내가 방금 올린 로그 id — 하루 루틴은 이른 시간부터(위→아래) 보되,
   방금 올린 건 즉시 확인되도록 맨 위로 핀한다. */
const SESSION_NEW=new Set();
/* 내 페이지 로그 순서: (1) 방금 올린 것 = 맨 위(최신부터) → (2) 나머지 = 이른 시간부터(데일리 루틴) */
function streamOrder(arr){
  return arr.slice().sort(function(a,b){
    var pa=SESSION_NEW.has(a.id), pb=SESSION_NEW.has(b.id);
    if(pa&&!pb) return -1;
    if(pb&&!pa) return 1;
    if(pa&&pb)  return logTs(b)-logTs(a);   /* 방금 올린 것끼리는 최신이 위 */
    return logTs(a)-logTs(b);               /* 나머지는 이른 시간부터(루틴) */
  });
}

function openStory(i){ S.storyIdx=i; S.itemIdx=0; STORIES[i].seen=true; render(); }
function closeStory(){ S.storyIdx=null; try{AUDIO.pause();}catch(e){} render(); }
function nextItem(){
  const s=STORIES[S.storyIdx];
  if(S.itemIdx<s.items.length-1){ S.itemIdx++; render(); } else { nextStory(); }
}
function prevItem(){
  if(S.itemIdx>0){ S.itemIdx--; render(); } else { prevStory(); }
}
function nextStory(){
  if(S.storyIdx<STORIES.length-1){ openStory(S.storyIdx+1); } else { closeStory(); }
}
function prevStory(){
  if(S.storyIdx>0){ S.storyIdx--; S.itemIdx=0; STORIES[S.storyIdx].seen=true; render(); } else { closeStory(); }
}

/* 알고리즘 — 처음은 Trending, 나머지는 3종 섞어서 무작위 */
function shuffle(a){
  const x=[...a];
  for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]]}
  return x;
}
function buildFeed(){
  const trend  = TREND.map(t=>({src:'trend', ...t}));
  const foryou = FORYOU.map(f=>({src:'foryou', ...f}));
  const rooms  = SLOTS.map(s=>({src:'room', slot:s}));
  const follow = FOLLOWLOG.map(f=>({src:'follow', ...f}));
  const head   = shuffle(trend).slice(0,1);                  /* 처음 = Trending */
  const rest   = shuffle([...trend.filter(t=>t!==head[0]), ...foryou, ...rooms, ...follow]);
  return [...head, ...rest];
}

function eventStatus(w){
  const r = ROUNDS.find(x=>x.applied===w.nm);
  if(!r) return '';
  const mine=r.cands.find(x=>x.me);
  const v=(mine&&mine.v)||0;
  const confirmed = r.need && v>=r.need;
  if(confirmed) return `<div class="evstat one confirmed">
    <span class="evbadge confirmed">🎉 공연 확정</span><b>${r.nm}</b>
    <span class="evcd">득표 ${v}/${r.need}</span></div>`;
  return `<div class="evstat one">
    <span class="evbadge">◆ 참여 중</span><b>${r.nm}</b>
    <span class="evcd" data-cd="${r.id}">${r.need?v+'/'+r.need+'표':''}</span></div>`;
}

    <div class="bigwv">${waveBars(34)}</div>

  '박하람':[{t:'note',at:'20:15',tx:'링크크 브릿지 다시 써야겠다',tone:'b'}],
  '조예만':[{t:'note',at:'16:40',tx:'도자기 굽듯 천천히 가자',tone:''}],

const artOf=d=>(d.t[1]||d.t[0]).replace(/^#/,'');

function lists(){
  return `<div class="hd"><span style="width:34px"></span>
    <div class="brand" style="flex:1;text-align:center;letter-spacing:.18em;font-size:14px">${S.lseg==='vote'?'VOTE':'MY LIST'}</div>
    <span style="width:34px"></span></div>
  <div class="lseg">
    <button class="${S.lseg!=='vote'?'on':''}" data-lseg="list">LIST</button>
    <button class="${S.lseg==='vote'?'on':''}" data-lseg="vote">투표</button></div>
  ${S.lseg==='vote'?voteHub():`
  ${LISTS.map(p=>`<div class="lrow" data-list="${p.id}">
    <span class="lcov">${p.cov.slice(0,3).map((id,i)=>
      `<i style="background:${covOf(id)};z-index:${3-i};left:${i*9}px"></i>`).join('')}</span>

/* 투표 — 목록으로. 노래도 듣고, 펼치면 그 사람의 로그(생각)도 보인다 */
function voteHub(){
  const cat=S.vcat||'music';
  const cats=[['music','diamond','음원 투표'],['stage','circle','공연 투표'],['reco','hex','추천']];
  const bar=`<div class="vcats">${cats.map(([k,sym,lb])=>`
    <button class="vcat ${cat===k?'on':''}" data-vcat="${k}">
      <span class="vcsh">${shape(sym, cat===k?c('lemon'):'#4a4a52', 26)}</span>
      <small>${lb}</small></button>`).join('')}</div>`;
  if(cat==='reco') return bar+recoView();
  const rounds=ROUNDS.filter(r=>r.cat===cat);
  return bar + rounds.map(r=>{
    const max=Math.max(...r.cands.map(x=>x.v))||1;
    const shown=[...r.cands].map((d,i)=>({...d,_i:i})).sort((a,b)=>b.v-a.v).slice(0,20);
    return `<div class="rhead">
      <div class="rtitle">${r.type==='curated'?'<i>✦</i>':''}${r.nm}
        <span class="rcd" data-cd="${r.id}">—</span></div>
      <div class="rwhat">${r.what}</div>
      <div class="rprize">${r.prize} · 참가 ${r.cands.length}명</div></div>
    ${shown.map((d,rank)=>{
      const who=artOf(d), top=rank===0;
      const logs=ARTLOGS[who]||[];
      const preview = logs[0]
        ? (logs[0].t==='note' ? `<span class="cprev note">✎ ${logs[0].tx}</span>`
                               : `<span class="cprev snd">♪ ${logs[0].tx}</span>`)
        : `<span class="cprev empty">아직 공개된 로그가 없습니다</span>`;
      return `<div class="crow2 ${d.voted?'voted':''} ${top?'top':''}" data-goart="${who}">
        <div class="chd">
          <span class="cshape">${shape(d.s,c(d.c),26)}</span>
          <button class="cplay" data-cp aria-label="재생">▶</button>
          <span class="cinfo">
            <span class="cttl"><b>${d.t[0]}</b>${top?'<i class="toptag">⬡ 추천</i>':''}${d.me?'<i class="mytag">내 곡</i>':''}</span>
            <small>${who} · log 보기 ›</small>
            ${preview}
          </span>
          <span class="cv">${d.v}</span>
          <button class="votebtn ${d.voted?'on':''}" data-vote="${r.id}|${d._i}">${d.voted?'✓':'투표'}</button></div>
        <div class="cbar"><i style="width:${d.v/max*100}%"></i></div>
      </div>`;
    }).join('')}
    ${r.cands.length>20?`<div class="showhint">상위 20명까지만 · 예선은 각자 Work에서</div>`:''}`;
  }).join('<div style="height:10px"></div>')
  + `<div class="showhint">카드를 누르면 그 아티스트의 log로 들어갑니다 · 신청은 내 작품 안 [VOTE 신청하기]</div>`;
}

/* ⬡ 추천 — 전 라운드 합산, 지금 가장 사랑받는 아티스트 */
function recoView(){
  const totals={};
  ROUNDS.forEach(r=>r.cands.forEach(d=>{const w=artOf(d); totals[w]=(totals[w]||0)+d.v}));
  const top=Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const st=w=>STORIES.find(x=>x.who===w);
  return `<div class="rhead">
    <div class="rtitle"><i style="color:var(--lemon)">⬡</i>이번 주 추천 아티스트</div>
    <div class="rwhat">모든 라운드의 응원을 합쳐 가장 사랑받는 사람들입니다</div></div>
  ${top.map(([who,v],i)=>{
    const logs=ARTLOGS[who]||[];
    const preview = logs[0]
      ? (logs[0].t==='note' ? `<span class="cprev note">✎ ${logs[0].tx}</span>`
                             : `<span class="cprev snd">♪ ${logs[0].tx}</span>`)
      : `<span class="cprev empty">아직 공개된 로그가 없습니다</span>`;
    return `<div class="crow2 ${i===0?'top':''}" data-goart="${who}">
      <div class="chd">
        <span class="cshape">${shape('hex', i===0?c('lemon'):c((st(who)||{}).c||'blue'), 28)}</span>
        <span class="cinfo">
          <span class="cttl"><b>${who}</b>${i===0?'<i class="toptag">⬡ 1위</i>':''}</span>
          <small>log 보기 ›</small>
          ${preview}
        </span>
        <span class="cv">${v}</span></div>
    </div>`;
  }).join('')}
  <div class="showhint">카드를 누르면 그 아티스트의 log로 들어갑니다</div>`;
}

/* 플레이리스트에 담을 곡 고르기 — 발견의 실제 곡 목록에서 */
function songPicker(p){
  const q=(S.sq||'').trim().toLowerCase();
  const have={}; (p.tracks||[]).forEach(t=>{ if(t.tid)have[t.tid]=1; });
  const list=ALLTRACKS.filter(t=> !q || (t.nm+' '+t.by).toLowerCase().indexOf(q)>-1 );
  return `<div class="sheet-bd" id="asbd"></div>
  <div class="pksheet tall">
    <div class="pkhd"><b>${p.nm}에 곡 담기</b>
      <button class="pkx" id="asclose" aria-label="닫기">✕</button></div>
    <input class="pksearch" id="assearch" placeholder="곡·아티스트 검색" value="${(S.sq||'').replace(/"/g,'&quot;')}">
    <div class="pknote" style="text-align:left;margin:0 2px 8px;color:var(--muted)">▶ 들어보고 · ＋로 담기</div>
    ${list.length?list.slice(0,60).map(t=>`<div class="pkrow songrow ${have[t.tid]?'cur':''}" data-tid="${t.tid}">
      <button class="songplay" data-preview="${t.audio||''}" aria-label="미리듣기">▶</button>
      <span class="pknm"><b>${t.nm}</b><small>${t.by}</small></span>
      <button class="songadd ${have[t.tid]?'on':''}" data-addsong="${t.tid}">${have[t.tid]?'✓ 담김':'＋ 담기'}</button></div>`).join('')
      : `<div class="pknote" style="padding:20px 0">검색 결과 없음</div>`}
    <button class="cta" id="asdone">완료 (${(p.tracks||[]).length}곡)</button>

}

/* ── Work — 음악이 위에 있고, 그 아래에 그 음악의 모든 로그가 펼쳐진다 ── */
function work(){
  const w=WORKS.find(x=>x.id===S.work)||WORKS[0];
  const story=w.id==='sr'?STORY:STORY.slice(0,3);
  const chips=[['all','전체'],['demo','Demo'],['pic','사진'],['vid','영상'],['idea','아이디어'],['voice','보이스'],['note','노트']];
  const scard=r=>{
    /* 작품 스토리 안 = 이미 담긴 것들. 뱃지 불필요 */
    const chrome=`<div class="rwho" data-prof="${r.who}" style="cursor:pointer">${smileEl(r.c)}${r.who}</div>`;
    if(r.t==='ph')return `<div class="rcard upcard" style="height:180px">
      <div class="bgimg" style="background:${r.bg}"></div><div class="grainy"></div>
      <div class="rmid"><div class="rts">${r.at}</div><div class="rcap">${r.cap}</div></div>
      <div class="uphint2">📷 탭해서 사진 넣기</div>${chrome}</div>`;
    if(r.t==='snd')return `<div class="rcard snd" data-play${r.audio?` data-audio="${r.audio}"`:''} style="height:170px">
      <div class="bigwv">${waveBars(30)}</div>
      <div class="rmid"><div class="rts">${r.at}</div><div class="rcap">${r.cap}</div>
        <span class="sndpill"><em>▶</em><b>${r.dur}</b></span></div>${chrome}</div>`;
    return `<div class="rcard paper ${r.tone==='b'?'b':''}" style="height:170px">
      <div class="rmid"><div class="rts">${r.at}</div><div class="rnote">${r.text.replace(/\n/g,'<br>')}</div></div>${chrome}</div>`;
  };
  const groups=story.map(g=>{
    const items=g.items.filter(i=>S.wf==='all'||i.tag===S.wf);
    if(!items.length)return '';
    return `<div class="dayhd ${g.rel?'rel':''}"><b>${g.day}</b><small>${g.date}</small></div>${items.map(scard).join('')}`;
  }).join('');
  /* 내가 만든 작품 = 큐레이션한 발매 로그를 날짜별 타임라인으로 */
  const logCard=l=>{
    if(l.t==='snd')return `<div class="rcard snd" data-play${l.audio?` data-audio="${l.audio}"`:''} style="height:150px"><div class="bigwv">${waveBars(28)}</div><div class="rmid"><div class="rts">${l.at||''}</div><div class="rcap">${l.nm||l.cap||''}</div><span class="sndpill"><em>▶</em><b>${l.dur||''}</b></span></div></div>`;
    if(l.t==='vid')return `<div class="rcard" style="height:180px;overflow:hidden"><video src="${l.src}" controls playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"></video><div class="rmid" style="pointer-events:none"><div class="rts">${l.at||''}</div>${l.cap?`<div class="rcap">${l.cap}</div>`:''}</div></div>`;
    if(l.t==='ph')return `<div class="rcard" style="height:180px"><div class="bgimg" style="background:${l.bg||'#141418'}"></div><div class="grainy"></div><div class="rmid"><div class="rts">${l.at||''}</div><div class="rcap">${l.cap||''}</div></div></div>`;
    return `<div class="rcard paper ${l.tone==='b'?'b':''}" style="height:150px"><div class="rmid"><div class="rts">${l.at||''}</div><div class="rnote">${(l.text||'').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div></div></div>`;
  };
  const mineTimeline=()=>{
    const logs=(w.releaseLogs||[]).map(id=>STREAM.find(l=>l.id===id)).filter(Boolean);
    if(!logs.length) return `<div class="expire">아직 담은 발매 로그가 없어요 · 아래 <b>발매 로그 고르기</b>로 추가하세요</div>`;
    const byDt={}; logs.forEach(l=>{ const d=l.dt||'zzz'; (byDt[d]=byDt[d]||[]).push(l); });
    return Object.keys(byDt).sort().reverse().map(d=>{
      const label=(d==='zzz')?'날짜 미상':d.replace(/-/g,'.');
      return `<div class="dayhd"><b>${label}</b><small>${byDt[d].length}개</small></div>${byDt[d].map(logCard).join('')}`;
    }).join('');
  };
  return `<div class="hd"><button class="circ" data-v="mine" aria-label="뒤로">‹</button>
    <div class="htitle">${w.nm}<small>${w.by||'나'}</small></div>
    <div class="r"><button class="circ" aria-label="공유">⤴</button></div></div>
  <div class="whero">
    <div class="wcover upcard"><div class="bgimg" style="background:${w.cover?`center/cover no-repeat url(${w.cover})`:w.bg}"></div><div class="grainy"></div>
      ${w.cover?'':`<div class="uphint2" style="bottom:auto;top:12px">🖼 ${w.mine?'발매하기에서 커버 넣기':'앨범 커버'}</div>`}
      <div class="wmeta"><h2>${w.nm}</h2>
        <small>${w.date==='작업 중'?'작업 중':(w.pending?'발매 예약 '+w.date:'발매 '+w.date)} · ${w.logs} Logs · ${w.span}</small></div></div>
    <div class="wbtns">
      <button class="cta" id="wplaybig">▶ Play</button>
      <button class="savebtn" id="wsave">＋ 플레이리스트</button></div>
    ${w.mine ? ((!w.date || w.date==='작업 중')
      ? `<button class="relbtn" id="relbtn">음원 발매하기 <b>▸</b></button>`
      : `<div class="reldone"><span class="ap-dot" style="background:var(--lemon);box-shadow:0 0 8px var(--lemon)"></span>
          <b style="color:var(--lemon)">${w.date}</b> 발매 예약
          <button class="ap-ch" id="relbtn">수정</button></div>`) : ''}
  </div>
  ${w.mine && (w.cover||w.lyr||(w.credits&&(w.credits.comp||w.credits.lyri||w.credits.arr||w.credits.prod))) ? `<div class="albuminfo">
    ${w.credits&&(w.credits.comp||w.credits.lyri||w.credits.arr||w.credits.prod)?`<div class="ai-sec"><div class="ai-t">크레딧</div><div class="ai-cr">
      ${w.credits.comp?`<span>작곡 <b>${w.credits.comp}</b></span>`:''}${w.credits.lyri?`<span>작사 <b>${w.credits.lyri}</b></span>`:''}${w.credits.arr?`<span>편곡 <b>${w.credits.arr}</b></span>`:''}${w.credits.prod?`<span>프로듀서 <b>${w.credits.prod}</b></span>`:''}
    </div></div>`:''}
    ${w.inst?`<div class="ai-sec"><div class="ai-t">가사</div><div class="ai-lyr" style="color:var(--muted)">연주곡 (가사 없음)</div></div>`:(w.lyr?`<div class="ai-sec"><div class="ai-t">가사</div><div class="ai-lyr">${w.lyr.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div></div>`:'')}
  </div>`:''}
  ${eventStatus(w)}
  <div class="sechd">
    <div class="sec" style="margin:0">${w.mine?'발매 로그':'The Story'}</div>
    ${w.mine?`<button class="pullbtn" id="relpickbtn">＋ 발매 로그 고르기</button>`:''}</div>

function submitCompose(){
  if(!S.compose) return;
  const C=S.compose, txt=(C.text||'').trim(), m=C.media;
  if(!txt && !m) return;
  if(m && m.kind==='aud' && ME && SBC && m.file){ uploadDemoLog(m.file, txt); return; } /* 로그인 → 실제 업로드(영구·어디서나 재생) */
  pushLog(txt, m);
}
function pushLog(txt, m, audioUrl){
  const d=new Date(), p=x=>String(x).padStart(2,'0'), now=p(d.getHours())+':'+p(d.getMinutes());
  const dt=d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()), id='my_'+d.getTime();
  let log;
  if(m && m.kind==='vid')      log={id, t:'vid', at:now, dt, cap:txt, src:m.url, side:'l', work:null};
  else if(m && m.kind==='aud') log={id, t:'snd', at:now, dt, nm:txt||'데모', dur:'', audio:audioUrl||m.url, side:'l', work:null};
  else if(m && m.kind==='ph')  log={id, t:'ph',  at:now, dt, cap:txt||'사진', bg:'center/cover no-repeat url('+m.url+')', side:'l', work:null};
  else                         log={id, t:'note',at:now, dt, text:txt, tone:'y', side:'l', work:null};
  STREAM.unshift(log);
  SESSION_NEW.add(id);          /* 방금 올린 것 → 맨 위 핀(루틴 피드 위에) */
  studioSave();
  S.compose=null;
  if(S.view!=='mine' || S.profile!=='me'){ S.view='mine'; S.profile='me'; }
  render();
  offToast('로그를 올렸어요');
}
/* 데모(오디오) 로그 — 로그인 아티스트면 Storage에 실제 업로드 후 재생되는 소리 로그로 */
async function uploadDemoLog(file, txt){
  const btn=document.getElementById('cspost'); if(btn){btn.disabled=true;btn.textContent='올리는 중…';}
  try{
    const ext=((file.name||'').split('.').pop()||'mp3').toLowerCase().replace(/[^a-z0-9]/g,'')||'mp3';
    const path=ME.id+'/logs/'+Date.now()+'_'+Math.random().toString(36).slice(2,8)+'.'+ext;
    const up=await SBC.storage.from('audio').upload(path, file, {contentType:file.type||'audio/mpeg', upsert:false});
    if(up.error) throw up.error;
    const pub=SBC.storage.from('audio').getPublicUrl(path);
    pushLog(txt, {kind:'aud'}, (pub&&pub.data&&pub.data.publicUrl)||'');
  }catch(e){ console.warn('[offlog] 데모 업로드 실패', e); offToast('데모 업로드 실패 — '+((e&&e.message)||'다시 시도')); const b=document.getElementById('cspost'); if(b){b.disabled=false;b.textContent='올리기';} }
}
/* 내 로그 ⋯ — 그 로그의 음악·데모·사진을 다시 받기(다운로드). 글은 복사 */
function downloadLog(id){
  const l=STREAM.find(x=>String(x.id)===String(id)); if(!l){ offToast('로그를 못 찾았어요'); return; }
  let url='', name='';
  if(l.t==='snd'){ url=l.audio||''; name=(l.nm||'데모')+'.mp3'; }
  else if(l.t==='vid'){ url=l.src||''; name=(l.cap||'영상')+'.mp4'; }
  else if(l.t==='ph'){ url=(String(l.bg||'').match(/url\(["']?(.*?)["']?\)/)||[])[1]||''; name=(l.cap||'사진')+'.jpg'; }
  else { if(navigator.clipboard){ navigator.clipboard.writeText(l.text||'').then(()=>offToast('글을 복사했어요')).catch(()=>offToast('복사 실패')); } else offToast('복사할 수 없어요'); return; }
  if(!url){ offToast('받을 파일이 없어요 (샘플 로그예요)'); return; }
  _saveFile(url, name);
}
/* 글 로그에 사진/데모 붙이기 → 미디어 카드로 (사진=캡션, 데모=데모카드) */
function attachMedia(id, kind, file){
  const l=STREAM.find(x=>String(x.id)===String(id)); if(!l){ offToast('로그를 못 찾았어요'); return; }
  const txt=(l.text||'').trim();
  if(kind==='ph'){
    const rd=new FileReader();
    rd.onload=()=>{ l.t='ph'; l.cap=txt||'사진'; l.bg='center/cover no-repeat url('+rd.result+')'; delete l.text; delete l.tone; studioSave(); render(); offToast('사진을 넣었어요'); };
    rd.readAsDataURL(file); return;
  }
  const apply=au=>{ l.t='snd'; l.nm=txt||'데모'; l.dur=''; l.audio=au; delete l.text; delete l.tone; studioSave(); render(); offToast('데모를 넣었어요'); };
  if(ME && SBC){
    (async()=>{ try{
      const ext=((file.name||'').split('.').pop()||'mp3').toLowerCase().replace(/[^a-z0-9]/g,'')||'mp3';
      const path=ME.id+'/logs/'+Date.now()+'_'+Math.random().toString(36).slice(2,8)+'.'+ext;
      const up=await SBC.storage.from('audio').upload(path, file, {contentType:file.type||'audio/mpeg', upsert:false});
      if(up.error) throw up.error;
      const pub=SBC.storage.from('audio').getPublicUrl(path);
      apply((pub&&pub.data&&pub.data.publicUrl)||'');
    }catch(e){ console.warn('[offlog] 데모 첨부 업로드 실패', e); apply(URL.createObjectURL(file)); } })();
  } else { apply(URL.createObjectURL(file)); }
}
/* 남의 음악 공유 — 네이티브 공유 or 링크 복사 */
async function offShareTrack(M){
  const url=location.origin+'/offlog';
  const title=((M&&M.nm)?M.nm:'음악')+((M&&M.by)?' · '+M.by:'');
  try{ if(navigator.share){ await navigator.share({title:title, url:url}); } else { await navigator.clipboard.writeText(url); offToast('링크가 복사됐어요'); } }
  catch(e){ try{ await navigator.clipboard.writeText(url); offToast('링크가 복사됐어요'); }catch(_){ offToast('링크: '+url); } }
}
function _anchorDL(href, name){ const a=document.createElement('a'); a.href=href; a.download=name; a.rel='noopener'; document.body.appendChild(a); a.click(); a.remove(); }
/* data:/blob: 는 바로 저장. http(s)(Storage)는 blob으로 받아 실제 저장 — download 속성은 cross-origin이면 무시되므로 */
function _saveFile(url, name){
  if(/^(data:|blob:)/.test(url)){ _anchorDL(url, name); offToast('저장했어요'); return; }
  offToast('받는 중…');
  fetch(url).then(function(r){ if(!r.ok) throw 0; return r.blob(); })
    .then(function(b){ const u=URL.createObjectURL(b); _anchorDL(u, name); setTimeout(function(){URL.revokeObjectURL(u)},5000); offToast('저장했어요'); })
    .catch(function(){ try{ window.open(url,'_blank','noopener'); }catch(_){}; offToast('새 탭에서 열었어요 — 길게 눌러 저장'); });  /* CORS 막히면 새 탭 폴백 */
}
/* 실제 음악 업로드 — Storage(audio) + tracks (로그인 아티스트) */
async function submitMusic(file, title){
  if(!ME||!SBC){ needLogin(); return; }
  const btn=document.getElementById('cspost'); if(btn){btn.disabled=true;btn.textContent='올리는 중…';}
  try{
    const ext=((file.name||'').split('.').pop()||'mp3').toLowerCase().replace(/[^a-z0-9]/g,'')||'mp3';
    const path=ME.id+'/'+Date.now()+'_'+Math.random().toString(36).slice(2,8)+'.'+ext;
    const up=await SBC.storage.from('audio').upload(path, file, {contentType:file.type||'audio/mpeg', upsert:false});
    if(up.error) throw up.error;
    const pub=SBC.storage.from('audio').getPublicUrl(path);
    const url=(pub&&pub.data&&pub.data.publicUrl)||'';
    const ins=await SBC.from('tracks').insert({artist_id:ME.id, title:title||'무제', audio_url:url, is_demo:false}).select('id').maybeSingle();
    if(ins.error) throw ins.error;
    const tid=(ins.data&&ins.data.id)||('t_'+Date.now());

  }catch(e){ console.warn('[offlog] 음악 업로드 실패', e); offToast('업로드 실패 — '+((e&&e.message)||'다시 시도')); const b=document.getElementById('cspost'); if(b){b.disabled=false;b.textContent='음악 올리기';} }
}

let NOWPLAY={label:'발견', cnt:0, nm:'', tm:'', src:'', who:'', aid:'', tid:''};

/* ── 실제 오디오 재생 (전역 Audio 1개) ── 재생버튼에 진짜 mp3를 물린다 */
const AUDIO=new Audio(); AUDIO.preload='none';
let CURSRC='';
function _clearPlayingUI(){
  document.querySelectorAll('.rcard.playing').forEach(function(x){
    x.classList.remove('playing');
    var em=x.querySelector('.sndpill em'); if(em)em.textContent='▶';
  });
}
function playSrc(url,nm){
  if(!url) return false;
  if(CURSRC!==url){ AUDIO.src=url; CURSRC=url; }
  var p=AUDIO.play(); if(p&&p.catch)p.catch(function(e){console.warn('[audio] play blocked',e);});
  if(nm) NOWPLAY.nm=nm; NOWPLAY.src=url; NOWPLAY.who=''; NOWPLAY.aid=''; NOWPLAY.tid='';
  S.mini.on=true; S.mini.playing=true;
  return true;
}
function toggleSrc(url,nm){
  if(CURSRC===url && !AUDIO.paused){ AUDIO.pause(); S.mini.playing=false; return false; }
  _clearPlayingUI();
  return playSrc(url,nm);
}
AUDIO.addEventListener('ended',function(){ S.mini.playing=false; CURSRC=''; _clearPlayingUI(); renderMini(); });

function renderMini(){
  const m=document.getElementById('mini');
  const _lab=NOWPLAY.label+(NOWPLAY.cnt?' · '+NOWPLAY.cnt+'곡':'');
  m.innerHTML = (S.mini.on && NOWPLAY.nm && !(S.view==='home'&&S.mode==='slide'))
    ? `<div class="mini ${S.mini.playing?'playing':''}">
        <div class="mini-top"><span>${_lab}</span><button id="mx" aria-label="닫기">✕</button></div>
        <div class="mini-btm"><button class="miniplay" id="mp" aria-label="재생">${S.mini.playing?'⏸':'▶'}</button>
          <span class="nm"${(NOWPLAY.aid||NOWPLAY.who)?' id="mnm" style="cursor:pointer"':''}>${NOWPLAY.nm}</span><span class="tm">${NOWPLAY.tm||''}</span>
          ${(NOWPLAY.aid||NOWPLAY.tid)?`<button class="minimore" id="mmore" aria-label="공유·담기·팔로우">⋯</button>`:''}</div></div>` : '';
  const mp=document.getElementById('mp'), mx=document.getElementById('mx');
  if(mp)mp.onclick=()=>{
    if(!AUDIO.paused){ AUDIO.pause(); S.mini.playing=false; _clearPlayingUI(); }
    else { const url=NOWPLAY.src||CURSRC; if(url){ _clearPlayingUI(); playSrc(url, NOWPLAY.nm); } }
    renderMini();
  };

  const mnm=document.getElementById('mnm'), mmore=document.getElementById('mmore');

/* ── 앱 안 촬영 화면 (getUserMedia) — 하단 camera 탭 ──
   탭 = 사진, 길게 = 영상. 권한 거부/미지원이면 폰 기본 카메라로 폴백. */
let CAMSTREAM=null, CAMFACING='user', CAMREC=null, CAMCHUNKS=[], CAMHOLD=null, CAMERR='';
function camView(){
  if(!S.cam) return '';
  if(CAMERR) return `<div class="camview">
    <button class="camx" id="camx" aria-label="닫기">✕</button>
    <div class="camerr"><div>${CAMERR}</div>
      <button class="cs-post" id="camfallback">폰 카메라로 찍기</button></div></div>`;
  return `<div class="camview">
    <video class="camvid${CAMFACING==='user'?' mirror':''}" id="camvid" autoplay playsinline muted></video>
    <button class="camx" id="camx" aria-label="닫기">✕</button>
    <div class="camhint">탭 = 사진 · 길게 누르면 영상</div>
    <div class="cambar">
      <button class="camsub" id="camdemo" aria-label="데모 올리기">♪</button>
      <button class="camshot" id="camshot" aria-label="촬영"></button>
      <button class="camsub" id="camflip" aria-label="앞뒤 전환">⟳</button>
    </div></div>`;
}
function stopCam(){
  try{ if(CAMSTREAM) CAMSTREAM.getTracks().forEach(function(t){ try{t.stop()}catch(_){} }); }catch(_){}
  CAMSTREAM=null;
}
async function startCam(){
  CAMERR='';
  try{
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw {name:'NotSupported'};
    stopCam();
    CAMSTREAM=await navigator.mediaDevices.getUserMedia({video:{facingMode:CAMFACING}, audio:true});
    if(!S.cam){ stopCam(); return; }           /* 그 사이 닫혔으면 정리 */
    const v=document.getElementById('camvid');
    if(v){ v.srcObject=CAMSTREAM; const p=v.play(); if(p&&p.catch)p.catch(function(){}); }
  }catch(e){
    CAMERR = (e&&e.name==='NotAllowedError')
      ? '카메라 권한이 거부됐어요. 브라우저 설정에서 허용하거나, 아래로 폰 카메라를 열 수 있어요.'
      : '이 브라우저에서는 앱 안 촬영을 쓸 수 없어요. 아래로 폰 카메라를 열 수 있어요.';
    try{ render(); }catch(_){}
  }
}
function closeCam(){
  if(CAMREC){ try{CAMREC.stop()}catch(_){} CAMREC=null; }
  stopCam(); S.cam=false; render();
}
/* 사진 — 현재 프레임을 캔버스로 (셀피는 거울 보정) */
function camShot(){
  const v=document.getElementById('camvid');
  if(!v || !v.videoWidth){ offToast('아직 카메라가 준비 안 됐어요'); return; }
  try{
    const c=document.createElement('canvas'); c.width=v.videoWidth; c.height=v.videoHeight;
    const g=c.getContext('2d');
    if(CAMFACING==='user'){ g.translate(c.width,0); g.scale(-1,1); }
    g.drawImage(v,0,0,c.width,c.height);
    const url=c.toDataURL('image/jpeg',0.86);
    stopCam(); S.cam=false;
    S.compose={text:(S.compose&&S.compose.text)||'', media:{kind:'ph', url:url}};   /* 쓰던 글은 유지하고 사진만 끼움 */
    render();
  }catch(e){ console.warn('[offlog] 촬영 실패', e); offToast('촬영 실패 — 다시 시도해 주세요'); }
}
/* 영상 — 길게 누르는 동안 녹화 */
function camRecStart(){
  if(!CAMSTREAM || CAMREC || typeof MediaRecorder==='undefined') return;
  try{
    CAMCHUNKS=[];
    CAMREC=new MediaRecorder(CAMSTREAM);
    CAMREC.ondataavailable=function(e){ if(e.data && e.data.size) CAMCHUNKS.push(e.data); };
    CAMREC.onstop=function(){
      const blob=new Blob(CAMCHUNKS, {type:(CAMCHUNKS[0]&&CAMCHUNKS[0].type)||'video/mp4'});
      CAMREC=null; CAMCHUNKS=[];
      stopCam(); S.cam=false;
      S.compose={text:(S.compose&&S.compose.text)||'', media:{kind:'vid', url:URL.createObjectURL(blob)}};
      render();
    };
    CAMREC.start();
    const b=document.getElementById('camshot'); if(b)b.classList.add('rec');
  }catch(e){ console.warn('[offlog] 녹화 불가', e); CAMREC=null; offToast('이 기기에서 영상 녹화를 쓸 수 없어요'); }
}
function camRecStop(){
  const b=document.getElementById('camshot'); if(b)b.classList.remove('rec');
  if(CAMREC){ try{ CAMREC.stop(); }catch(_){ CAMREC=null; } }
}
async function camFlip(){ CAMFACING=(CAMFACING==='user')?'environment':'user'; render(); await startCam(); }

    const ta=document.getElementById('csta'), post=document.getElementById('cspost'), rm=document.getElementById('csrm');
    const cam=document.getElementById('cscam'), cau=document.getElementById('csaudio');
    const close=()=>{ S.compose=null; render(); };
    if(bd)bd.onclick=e=>{ if(e.target===bd) close(); };
    if(x)x.onclick=close;
    if(ta)ta.oninput=()=>{ S.compose.text=ta.value; if(post) post.disabled = !((ta.value||'').trim()||S.compose.media); };
    if(cam)cam.onclick=()=>{ S.cam=true; render(); startCam(); };   /* 앱 안 촬영 화면 (글은 유지, 권한 없으면 폰 카메라 폴백) */
    if(cau)cau.onclick=()=>{ const el=document.getElementById('caudio'); if(el)el.click(); };
    if(rm)rm.onclick=()=>{ const md=S.compose.media; if(md&&md.url&&/^blob:/.test(md.url)){try{URL.revokeObjectURL(md.url)}catch(_){}} S.compose.media=null; render(); };
    if(post)post.onclick=submitCompose;
  }
  /* 카메라 입력(1회 바인딩) — 찍은 게 영상이면 영상 로그, 사진이면 사진 로그로 자동 판별 */
  const ccam=document.getElementById('ccam');
  if(ccam && !ccam.__b){ ccam.__b=1; ccam.onchange=()=>{ const f=ccam.files&&ccam.files[0];
    if(f){ if(!S.compose)S.compose={text:'',media:null};
      const md=S.compose.media; if(md&&md.url&&/^blob:/.test(md.url||'')){try{URL.revokeObjectURL(md.url)}catch(_){}}
      if(/^video\//.test(f.type||'')){ S.compose.media={kind:'vid',url:URL.createObjectURL(f)}; render(); }
      else { const rd=new FileReader(); rd.onload=()=>{ S.compose.media={kind:'ph',url:rd.result}; render(); }; rd.readAsDataURL(f); } }
    ccam.value=''; }; }
  const caud=document.getElementById('caudio');
  if(caud && !caud.__b){ caud.__b=1; caud.onchange=()=>{ const f=caud.files&&caud.files[0];
    if(f){ if(!S.compose)S.compose={text:'',media:null}; S.compose.media={kind:'aud',file:f,name:f.name}; render(); } caud.value=''; }; }
  document.querySelectorAll('.play').forEach(p=>p.onclick=e=>{
    e.stopPropagation();
    const box=p.closest('.dplayer')||p.closest('.fy');
    if(!box)return;
    const on=box.classList.toggle('playing');
    p.textContent=on?'⏸':'▶';
  });
  document.querySelectorAll('.fol').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const aid=b.dataset.aid;
    if(!ME){ needLogin(); return; }               // 비로그인 → UI 안 바꾸고 안내
    const on=b.classList.toggle('on');             // 낙관적 UI
    b.textContent=on?'팔로잉':'팔로우';
    (on?followArtist(aid):unfollowArtist(aid)).then(ok=>{
      if(!ok){ const back=b.classList.toggle('on'); b.textContent=back?'팔로잉':'팔로우'; } // 실패 시 롤백
    });
  });
  /* 스트림 안에서 소리가 울리면 종이 전체가 반응한다 */
  document.querySelectorAll('.dotplay').forEach(p=>p.onclick=e=>{
    e.stopPropagation();
    const m=p.closest('.mark'), st=document.getElementById('stream');
    const on=!m.classList.contains('playing');
    document.querySelectorAll('.mark.playing').forEach(x=>{
      x.classList.remove('playing'); x.querySelector('.dotplay').textContent='▶';
    });
    if(on){m.classList.add('playing'); p.textContent='❙❙'}
    if(st)st.classList.toggle('sounding', on);
  });
  document.querySelectorAll('.rbtn').forEach(r=>r.onclick=e=>{
    e.stopPropagation();
    const frx=r.closest('.frx,.slrx'); const tid=frx&&frx.dataset.tid;
    if(tid && !ME){ needLogin(); return; }           // 진짜 곡 반응인데 비로그인 → 안내(저장은 로그인 필요)
    const was=r.dataset.hit==='1';                    // 토글
    r.dataset.hit=was?'':'1'; r.classList.toggle('hit', !was);
    const n=(frx||r.parentElement).querySelector('.rxn');
    if(n){ n.dataset.n=Math.max(0,(+n.dataset.n)+(was?-1:1)); n.textContent=n.dataset.n; }
    if(!was){                                          // 추가할 때만 +1 팝
      const box=r.closest('.fcard')||r.closest('.log')||r.closest('.dplayer')||r.closest('.svbody')||r.closest('.sl');
      if(box){ const p=document.createElement('span'); p.className='pop'; p.textContent=r.dataset.emo+' +1';
        box.style.position='relative'; box.appendChild(p); setTimeout(()=>p.remove(),900); }
    }
    if(tid) toggleReact(tid, r.dataset.emo);          // 실제 곡이면 서버 저장
  });

  /* 스토리 열 + 전체화면 뷰어 */
  document.querySelectorAll('[data-story]').forEach(b=>b.onclick=()=>openStory(+b.dataset.story));
  const svclose=document.getElementById('svclose'); if(svclose)svclose.onclick=closeStory;
  const svtapl=document.getElementById('svtapl'); if(svtapl)svtapl.onclick=e=>{e.stopPropagation();prevItem()};
  const svtapr=document.getElementById('svtapr'); if(svtapr)svtapr.onclick=e=>{e.stopPropagation();nextItem()};
  const svfolbtn=document.getElementById('svfolbtn');
  if(svfolbtn)svfolbtn.onclick=e=>{e.stopPropagation();
    const st=STORIES[S.storyIdx]; if(!st)return;
    if(!ME){ needLogin(); return; }
    st.following=true; followArtist(st.aid); render();
  };
  const svwrap=document.getElementById('svwrap');
  if(svwrap){
    const activeI=svwrap.querySelector('.svbar.active i');
    if(activeI)activeI.addEventListener('animationend',nextItem,{once:true});
    const pause=()=>svwrap.classList.add('paused');
    const resume=()=>svwrap.classList.remove('paused');
    svwrap.addEventListener('pointerdown',pause);
    svwrap.addEventListener('pointerup',resume);
    svwrap.addEventListener('pointerleave',resume);
  }
}

setInterval(()=>{
  document.querySelectorAll('[data-cd]').forEach(el=>{
    const r=ROUNDS.find(x=>x.id===el.dataset.cd); if(!r)return;
    const t=Math.max(0,r.end-Date.now());
    el.textContent=`D-${Math.floor(t/864e5)} `+
      [Math.floor(t%864e5/36e5),Math.floor(t%36e5/6e4),Math.floor(t%6e4/1e3)]
        .map(x=>String(x).padStart(2,'0')).join(':');
  });
},1000);

/* ── 실제 데이터 주입 — 디자인/구성은 v34 그대로, 목업만 진짜 음악/아티스트로 교체 ── */
(async function loadReal(){
  try{
    var SB='https://vayzhmaggwpkbsrrsdqt.supabase.co';
    var KEY='sb_publishable_1PxNV0BGL7Wy_strTMqnbA_pCBCsOPG';
    var cols='id,title,tags,audio_url,cover_url,is_demo,project_id,created_at,likes_count,profiles(id,name,avatar_url)';
    var r=await fetch(SB+'/rest/v1/tracks?select='+encodeURIComponent(cols)+'&order=created_at.desc&limit=200',{headers:{apikey:KEY,Authorization:'Bearer '+KEY}});
    if(!r.ok) throw new Error('fetch '+r.status);
    var rows=await r.json();
    var COLS=['coral','blue','green','yellow','purple','shpink'];
    var colOf=function(n){ var h=0; n=String(n||''); for(var i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))|0; return COLS[Math.abs(h)%6]; };
    var tm=function(iso){ var d=new Date(iso||Date.now()); function p(x){return String(x).padStart(2,'0');} return p(d.getHours())+':'+p(d.getMinutes()); };
    var GRADS=[
      'radial-gradient(circle at 30% 25%,#2e5a7e,transparent 60%),radial-gradient(circle at 80% 80%,#173a4e,transparent 55%),#0c141c',
      'radial-gradient(circle at 65% 20%,#4a3a7e,transparent 55%),radial-gradient(circle at 20% 85%,#1c2a5c,transparent 60%),#0e0c18',
      'radial-gradient(circle at 25% 30%,#4a2f66,transparent 60%),radial-gradient(circle at 80% 75%,#173f38,transparent 55%),#101014',
      'radial-gradient(circle at 70% 25%,#5c3050,transparent 55%),radial-gradient(circle at 20% 80%,#20305c,transparent 60%),#12121a'
    ];
    var tracks=rows.map(function(x){ return {
      id:x.id, title:x.title||'무제', artist:(x.profiles&&x.profiles.name)||'익명',
      artistId:(x.profiles&&x.profiles.id)||null,
      tags:Array.isArray(x.tags)?x.tags:[], audio:x.audio_url||'',
      cover:(x.cover_url&&/^https?:\/\//.test(x.cover_url))?x.cover_url:'',
      demo:!!x.is_demo, pid:x.project_id||('p_'+x.id), ts:x.created_at, likes:(x.likes_count||0)
    }; });
    var byArtist={}; tracks.forEach(function(t){ (byArtist[t.artist]=byArtist[t.artist]||[]).push(t); });
    var artists=Object.keys(byArtist);
    var aidOf=function(name){ var ts=byArtist[name]; return (ts&&ts[0]&&ts[0].artistId)||null; }; // 아티스트명 → profile id
    var iFollow=function(name){ var id=aidOf(name); return !!(id&&MYFOLLOWS.has(id)); };            // 내가 팔로우 중?
    await loadMe(); // 로그인 유저 + 내 팔로우/반응 상태를 카드 빌드 전에 확보

    var cut=function(s,n){ s=String(s||''); return s.length>n ? s.slice(0,n-1)+'…' : s; };
    var _shuf=function(a){ var x=a.slice(); for(var i=x.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=x[i];x[i]=x[j];x[j]=t;} return x; };

    // 플레이리스트에 담을 수 있는 실제 곡 목록
    ALLTRACKS=tracks.map(function(t){ return {nm:t.title, by:t.artist, dur:'', tid:t.id, audio:t.audio, c:colOf(t.artist)}; });

    // ── 매 새로고침마다 전체 아티스트에서 다양하게 재샘플 → (1) 모든 아티스트 노출 (2) 트렌드 첫 화면 새 얼굴 ──
    function resampleFeed(){
      var reps=[], seenA={};
      _shuf(tracks).forEach(function(t){ if(seenA[t.artist])return; seenA[t.artist]=1; reps.push(t); }); // 아티스트당 대표 1곡(랜덤)
      var mk=function(t){ var o={who:cut(t.artist,18), c:colOf(t.artist), at:tm(t.ts), rx:(t.likes||0), aid:aidOf(t.artist), tid:t.id, t:'snd', audio:t.audio, nm:cut(t.title,20)};
        o.cap=o.nm; o.sub=cut((t.demo?'Demo':'Track')+(t.tags[0]?' · '+t.tags[0]:''),24); if(t.tags[0])o.tags=t.tags.slice(0,2).map(function(x){return '#'+String(x).replace(/^#/,'');}); return o; };
      var i=0, take=function(n){ var s=[]; for(var k=0;k<n && reps.length;k++){ s.push(reps[i%reps.length]); i++; } return s; };
      // 섹션마다 서로 다른 아티스트 (STORIES 8 · TREND 12 · FORYOU 8 · FOLLOW 8 = 최대 36명/뷰, 나머지는 다음 새로고침에)
      STORIES=take(8).map(function(t){ var a=t.artist, ts=(byArtist[a]||[t]).slice(0,2);
        return { who:a, c:colOf(a), aid:aidOf(a), following:iFollow(a), seen:false, items:ts.map(function(x){
          return x.cover ? {t:'ph', at:tm(x.ts), cap:x.title, bg:'#141418', img:x.cover} : {t:'snd', at:tm(x.ts), cap:x.title, dur:'', audio:x.audio}; }) }; });
      TREND     = take(12).map(mk);
      FORYOU    = take(8).map(mk);
      FOLLOWLOG = take(8).map(mk);
      PEOPLE = _shuf(reps).slice(0,24).map(function(t){ return {who:t.artist, c:colOf(t.artist), aid:aidOf(t.artist), sub:(t.tags[0]||'Artist'), fing:(iFollow(t.artist)?1:0)}; });
      var f=reps[0]; if(f){ NOWPLAY={label:'발견', cnt:tracks.length, nm:cut(f.title,20), tm:'', src:f.audio}; }
    }
    window.__resample=resampleFeed;
    if(tracks.length) resampleFeed();

    // WORKS = 프로젝트(project_id)별 대표 — 로그 수 = 그 프로젝트 곡 수
    var byPid={}; tracks.forEach(function(t){ (byPid[t.pid]=byPid[t.pid]||[]).push(t); });
    var wl=Object.keys(byPid).map(function(pid,i){
      var vs=byPid[pid]; var rep=vs[0];
      return { id:'w'+i, nm:(rep.title||'무제').replace(/\s*\(.*\)$/,''), by:rep.artist, dur:'', logs:vs.length, span:'', date:'', bg:GRADS[i%GRADS.length], _cover:rep.cover, _rep:rep };
    }).slice(0,12);
    if(wl.length) WORKS=wl;

    // STREAM = 로그 스트림(mine) — 비로그인일 때만 '곡 많은 아티스트'로 데모를 채운다
    var meA=artists.slice().sort(function(a,b){return byArtist[b].length-byArtist[a].length;})[0];
    if(meA){
      STREAM=byArtist[meA].slice(0,8).map(function(t,i){
        var dt=(t.ts||'').slice(0,10);   /* 날짜 유지 (발매 로그 날짜별 큐레이션용) */
        return t.audio ? {id:'l'+i, t:'snd', at:tm(t.ts), dt:dt, nm:t.title, dur:'', side:(i%2?'r':'l'), work:null, audio:t.audio}
                       : {id:'l'+i, t:'note', at:tm(t.ts), dt:dt, text:'#'+(t.tags[0]||t.title), tone:(i%2?'b':'y'), side:(i%2?'r':'l'), work:null};
      });
    }
    // 로그인했다면 내 페이지 LOG 는 반드시 '내 곡'으로 (남의 곡이 내 페이지에 뜨던 문제)
    await loadMyStream();

    // (홈 피드 TREND/FORYOU/FOLLOWLOG/STORIES/PEOPLE 는 위 resampleFeed()가 매 새로고침마다 생성)

    // ── 합주실(ROOM) 시간대 카드도 실제 아티스트 4명으로 ── (PEEK/MINLEE/전아름 목업 제거)
    var roomA=artists.slice(0,4);
    if(roomA.length){
      var rslots=['12:00','15:00','18:00','21:00']; var NR={};
      rslots.forEach(function(sl,si){
        NR[sl]=roomA.map(function(a,ai){
          var ts=byArtist[a]||[]; var t=ts[(si+ai)%(ts.length||1)];
          var base={who:cut(a,14), c:colOf(a)}; var pick=(si+ai)%3;
          if(!t || pick===2){ base.t='empty'; }
          else if(t.cover && pick===0){ base.t='ph'; base.cap=cut(t.title,16); base.bg=GRADS[(ai+si)%GRADS.length]; }
          else if(t.audio){ base.t='snd'; base.cap=cut(t.title,16); base.dur=''; base.audio=t.audio; }
          else if(pick===0){ base.t='ph'; base.cap=cut(t.title,16); base.bg=GRADS[(ai+si)%GRADS.length]; }
          else { base.t='note'; base.text=cut(t.title,18); }
          return base;
        });
      });
      ROOM=NR;
    }

    // ── 라운드(ROUNDS) 후보 도형도 실제 곡/아티스트로 ── (한 라운드 안에서 아티스트 중복 방지)
    var pool=tracks.slice(0);
    if(pool.length){
      var SHP=['hex','star','circle']; var pi=0;
      ROUNDS.forEach(function(rd){
        var used={};
        rd.cands=rd.cands.map(function(cd,ci){
          var t=null, tries=0;
          while(tries++<pool.length){ var cand=pool[(pi++)%pool.length]; if(!used[cand.artist]){ t=cand; used[cand.artist]=1; break; } }
          if(!t) t=pool[(pi++)%pool.length];
          var nc={t:[cut(t.title,16), cut(t.artist,14)], s:SHP[ci%3], c:colOf(t.artist),
                  v:(t.likes||cd.v||0), x:cd.x, y:cd.y, bd:cd.bd};
          if(cd.me) nc.me=1;
          return nc;
        });
      });
    }
    try{ artists.forEach(function(a){ AIDBYNAME[a]=aidOf(a); }); }catch(e){}   /* 이름→profile id (프로필 페이지 연동) */
  }catch(e){ console.warn('[offlog] real data load failed', e); }
  try{ studioMerge(); }catch(e){}     /* 내가 만든 작품/플레이리스트/로그 복원 */
  try{ wireAuth(); }catch(e){}        /* 로그인 상태 변화 구독 (OAuth 복귀·로그아웃) */
  try{ renewHome(); }catch(e){}
  render();
})();

</script>
