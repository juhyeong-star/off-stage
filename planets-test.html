<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>음악의 우주 · 장르 행성 (TEST)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#0a0a14; --y:#FFE800; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;}
  body{
    background:radial-gradient(120% 90% at 50% -10%, #1a1442 0%, #0d0b24 45%, #050510 100%);
    color:#fff; font-family:'Space Grotesk','Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
    padding:12px 12px 96px; min-height:100vh; overflow-x:hidden; position:relative;
  }
  /* 별 배경 */
  .stars{position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;}
  .stars i{position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; opacity:.7;
    animation:tw 3s ease-in-out infinite;}
  @keyframes tw{0%,100%{opacity:.25;}50%{opacity:.9;}}
  header,#app{position:relative; z-index:2;}

  h1{font-family:'Black Han Sans',sans-serif; font-size:26px; margin:4px 0 2px; letter-spacing:.5px;
    background:linear-gradient(92deg,#fff,#9fb4ff 60%,#c9a4ff); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .sub{font-size:12.5px; color:rgba(255,255,255,.6); margin:0 0 18px; font-weight:500;}
  .sub b{color:#ffe800;}

  /* ── 장르 행성 (섹션) ── */
  .planet{margin:0 0 30px; position:relative;}
  .planet-head{display:flex; align-items:baseline; gap:9px; margin:0 2px 8px;}
  .planet-name{font-family:'Black Han Sans',sans-serif; font-size:21px; line-height:1;}
  .planet-en{font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.4);}
  .planet-cnt{margin-left:auto; font-size:11px; font-weight:700; color:rgba(255,255,255,.55);
    background:rgba(255,255,255,.08); padding:3px 10px; border-radius:999px;}
  .orbit{
    position:relative; overflow:hidden; border-radius:26px;
    aspect-ratio:1/.7; height:auto; max-height:min(46vh,340px);
    border:1px solid rgba(255,255,255,.1);
    box-shadow:inset 0 0 60px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03);
  }
  /* 행성 코어(중앙 발광 구) — 그 장르의 색 */
  .core{position:absolute; left:50%; top:50%; width:120px; height:120px; transform:translate(-50%,-50%);
    border-radius:50%; z-index:1; pointer-events:none;
    background:radial-gradient(circle at 38% 32%, rgba(255,255,255,.5), var(--pc) 46%, rgba(0,0,0,.35) 100%);
    box-shadow:0 0 50px 6px var(--pc), inset -10px -12px 26px rgba(0,0,0,.5);
    opacity:.55; animation:corePulse 5s ease-in-out infinite;}
  .core-ring{position:absolute; left:50%; top:50%; width:210px; height:210px; transform:translate(-50%,-50%) rotate(-16deg);
    border:1px solid rgba(255,255,255,.14); border-radius:50%; z-index:1; pointer-events:none;
    box-shadow:0 0 20px rgba(255,255,255,.06);}
  @keyframes corePulse{0%,100%{opacity:.45;}50%{opacity:.68;}}

  /* ── 곡 도형(위성) ── */
  .sat{position:absolute; left:0; top:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; cursor:pointer; user-select:none; will-change:transform; z-index:3;}
  .sat .bg{position:absolute; inset:0; z-index:1; background:var(--sc); border-radius:50%;
    box-shadow:0 4px 16px rgba(0,0,0,.5), inset -4px -5px 12px rgba(0,0,0,.35), inset 3px 3px 10px rgba(255,255,255,.22);
    transition:box-shadow .2s;}
  .sat.sq .bg{border-radius:26%;}
  .sat.hex .bg{border-radius:14%; clip-path:polygon(25% 3%,75% 3%,100% 50%,75% 97%,25% 97%,0 50%);}
  .sat .tx{position:relative; z-index:2; padding:4px; pointer-events:none; line-height:1.18;}
  .sat .t-title{font-weight:700; font-size:12px; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.6);
    max-width:92%; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;}
  .sat .t-art{font-size:9.5px; font-weight:500; color:rgba(255,255,255,.72); margin-top:1px;
    text-shadow:0 1px 2px rgba(0,0,0,.6);}
  .sat .plays{position:absolute; bottom:-2px; left:50%; transform:translateX(-50%); z-index:3;
    font-size:9px; font-weight:700; color:#fff; opacity:.85; white-space:nowrap;
    display:flex; align-items:center; gap:2px; text-shadow:0 1px 2px rgba(0,0,0,.7);}
  .sat .plays svg{width:8px; height:8px; fill:currentColor;}
  /* 재생 중 */
  .sat.playing .bg{box-shadow:0 0 0 2px #fff, 0 4px 18px var(--sc), 0 0 26px var(--sc);}
  .sat.playing .ring2{position:absolute; inset:-6px; border:1.5px solid rgba(255,255,255,.55); border-radius:50%; z-index:0;
    animation:rip 1.1s ease-out infinite;}
  @keyframes rip{0%{transform:scale(.9);opacity:.8;}100%{transform:scale(1.35);opacity:0;}}

  .flag{position:fixed; top:calc(env(safe-area-inset-top) + 8px); right:10px; z-index:60;
    background:rgba(255,255,255,.1); backdrop-filter:blur(8px); color:#fff; font-size:10px; font-weight:700;
    padding:4px 10px; border-radius:20px; border:1px solid rgba(255,255,255,.15);}

  /* ── 하단 플레이바 ── */
  .playbar{position:fixed; left:10px; right:10px; bottom:calc(env(safe-area-inset-bottom) + 10px); z-index:55;
    background:rgba(20,18,40,.92); backdrop-filter:blur(16px); color:#fff; border-radius:18px; padding:9px 12px;
    display:flex; align-items:center; gap:11px; box-shadow:0 10px 30px rgba(0,0,0,.5);
    border:1px solid rgba(255,255,255,.12);}
  .pb-disc{width:42px; height:42px; flex:0 0 auto; border-radius:50%; position:relative;
    background:radial-gradient(circle at 38% 32%, rgba(255,255,255,.5), var(--pbc,#666) 46%, rgba(0,0,0,.4) 100%);
    box-shadow:0 0 16px var(--pbc,#666);}
  .pb-disc.spin{animation:spin 3s linear infinite;} @keyframes spin{to{transform:rotate(360deg);}}
  .pb-disc::after{content:''; position:absolute; left:50%; top:50%; width:9px; height:9px; transform:translate(-50%,-50%);
    background:#0a0a14; border-radius:50%; box-shadow:0 0 0 2px rgba(255,255,255,.25);}
  .pb-info{flex:1; min-width:0;}
  .pb-title{font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pb-title small{font-weight:500; opacity:.6; font-size:11px;}
  .pb-prog{height:14px; display:flex; align-items:center; margin-top:3px; cursor:pointer; touch-action:none;}
  .pb-prog .track{position:relative; height:4px; width:100%; background:rgba(255,255,255,.16); border-radius:3px;}
  .pb-prog .fill{position:absolute; left:0; top:0; height:100%; width:0%; background:linear-gradient(90deg,#9fb4ff,#c9a4ff); border-radius:3px;}
  .pb-prog .knob{position:absolute; top:50%; left:0%; width:12px; height:12px; border-radius:50%; background:#fff;
    transform:translate(-50%,-50%); box-shadow:0 1px 5px rgba(0,0,0,.6);}
  .pb-btn{flex:0 0 auto; background:none; border:none; color:#fff; font-size:20px; cursor:pointer; padding:2px 3px; line-height:1;}
  .pb-btn:active{transform:scale(.86);}
  .pb-play{width:36px; height:36px; border-radius:50%; background:#fff; color:#111; font-size:16px; display:flex; align-items:center; justify-content:center;}
  .toast{position:fixed; left:50%; bottom:82px; transform:translateX(-50%) translateY(10px); z-index:70;
    background:rgba(0,0,0,.9); color:#fff; font-size:12px; font-weight:600; padding:8px 16px; border-radius:20px;
    opacity:0; transition:opacity .2s, transform .2s; pointer-events:none;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* PC — 행성 나란히 */
  @media (min-width:769px){
    body{padding:20px 20px 100px;}
    .wrap{max-width:1200px; margin:0 auto;}
    .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:26px;}
    .orbit{aspect-ratio:auto; height:400px; max-height:none;}
  }
  @media (min-width:1200px){ .grid{grid-template-columns:repeat(3,1fr);} }
</style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="wrap">
    <header>
      <h1>음악의 우주</h1>
      <p class="sub">장르 <b>행성</b>을 돌며 새 음악을 발견하세요 🪐 <span style="opacity:.6">· 도형을 탭하면 바로 재생</span></p>
    </header>
    <div id="app" class="grid"><p style="color:rgba(255,255,255,.6);font-size:13px;padding:26px 4px;grid-column:1/-1;">🌌 음악 불러오는 중…</p></div>
  </div>

  <audio id="audioEl" preload="none"></audio>
  <div class="flag">🧪 장르 행성 TEST</div>
  <div class="playbar" id="playbar">
    <div class="pb-disc" id="pbDisc"></div>
    <div class="pb-info">
      <div class="pb-title" id="pbTitle">— <small>도형을 눌러 재생</small></div>
      <div class="pb-prog" id="pbProg"><div class="track"><div class="fill" id="pbFill"></div><div class="knob" id="pbKnob"></div></div></div>
    </div>
    <button class="pb-btn" id="pbPrev">⏮</button>
    <button class="pb-btn pb-play" id="pbPlay">▶</button>
    <button class="pb-btn" id="pbNext">⏭</button>
  </div>
  <div class="toast" id="toast"></div>

<script>
// ── 실제 사이트와 동일한 장르 정의(색 포함) ──
const GENRES=[
  {key:'발라드',en:'Ballad',color:'#7C9CFF'},
  {key:'댄스',en:'Dance',color:'#36E0C8'},
  {key:'힙합',en:'Hip-hop',color:'#FF6B6B'},
  {key:'R&B',en:'R&B',color:'#B06BFF'},
  {key:'록',en:'Rock',color:'#FF4D6D'},
  {key:'인디',en:'Indie',color:'#9DE05A'},
  {key:'시티팝',en:'City Pop',color:'#FF9F45'},
  {key:'재즈',en:'Jazz',color:'#FFC94D'},
  {key:'EDM',en:'EDM',color:'#00E5FF'},
  {key:'트로트',en:'Trot',color:'#FF7AC6'},
  {key:'포크',en:'Folk',color:'#8BD17C'},
  {key:'K-팝',en:'K-Pop',color:'#5AA9FF'},
];
function findGenre(s){ if(!s) return null; const v=String(s).trim().toLowerCase();
  return GENRES.find(g=>g.key.toLowerCase()===v||g.en.toLowerCase()===v)||null; }
function genreOf(t){ for(const tag of (t.tags||[])){ const g=findGenre(tag); if(g) return g; } return null; }

const SUPABASE_URL='https://vayzhmaggwpkbsrrsdqt.supabase.co';
const SUPABASE_KEY='sb_publishable_1PxNV0BGL7Wy_strTMqnbA_pCBCsOPG';
async function fetchTracks(){
  const cols='id,title,tags,shape,audio_url,plays_count,is_demo,profiles(name)';
  const url=`${SUPABASE_URL}/rest/v1/tracks?select=${encodeURIComponent(cols)}&order=created_at.desc&limit=200`;
  const r=await fetch(url,{headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY}});
  if(!r.ok) throw new Error('fetch '+r.status);
  return (await r.json()).map(row=>({
    id:row.id, title:row.title||'제목 없음',
    artist:(row.profiles&&row.profiles.name)||'익명',
    tags:Array.isArray(row.tags)?row.tags:[],
    audioUrl:row.audio_url||'', plays:row.plays_count||0
  }));
}
// 해시(장르 없는 곡 임의 배치용) — 곡 id로 결정적
function hash(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; } return Math.abs(h); }

let PLANETS=[];
async function loadData(){
  try{
    const tracks=await fetchTracks();
    // 1) 장르 있는 곡 → 실제 장르 행성. 없으면 임의(해시) 배정 표시.
    const byGenre={};
    tracks.forEach(t=>{
      let g=genreOf(t), assigned=true;
      if(!g){ assigned=false; g=GENRES[hash(t.id)%6]; }  // 미분류 → 앞쪽 6개 장르에 임의 분산(시안)
      t.assigned=assigned;
      (byGenre[g.key]=byGenre[g.key]||{g,items:[]}).items.push(t);
    });
    // 2) 곡 2개 이상인 행성만, 곡 많은 순. 행성당 최대 7곡(물리 안 붐비게)
    PLANETS=Object.values(byGenre).filter(p=>p.items.length>=2)
      .sort((a,b)=>b.items.length-a.items.length)
      .map(p=>({g:p.g, items:p.items.slice(0,7), total:p.items.length}));
    if(!PLANETS.length) throw new Error('no data');
  }catch(e){ document.getElementById('app').innerHTML='<p style="color:rgba(255,255,255,.6);padding:26px 4px;grid-column:1/-1;">⚠️ 음악을 불러오지 못했어요.</p>'; return false; }
  return true;
}

// 크기 = 재생수 기반(인기 곡이 큼). 로그 스케일.
function sizeOf(plays){ const b=54+Math.min(40, Math.log10((plays||0)+1)*16); return Math.round(b); }
const SHAPES=['','sq','hex']; // 원/둥근네모/육각
const worlds=[];
function build(){
  const app=document.getElementById('app');
  app.innerHTML=PLANETS.map((p,pi)=>{
    const extra=p.total>p.items.length?` <span style="opacity:.6">(+${p.total-p.items.length})</span>`:'';
    return `<section class="planet">
      <div class="planet-head">
        <span class="planet-name" style="color:${p.g.color}">${p.g.key}</span>
        <span class="planet-en">${p.g.en}</span>
        <span class="planet-cnt">${p.total}곡${extra}</span>
      </div>
      <div class="orbit" id="orbit${pi}" style="background:radial-gradient(80% 70% at 50% 50%, ${hexA(p.g.color,0.18)}, rgba(8,6,20,0) 70%);">
        <div class="core-ring"></div>
        <div class="core" style="--pc:${p.g.color}"></div>
      </div>
    </section>`;
  }).join('');
  PLANETS.forEach((p,pi)=>{
    const box=document.getElementById('orbit'+pi), W=box.clientWidth||320, H=box.clientHeight||300, bodies=[];
    p.items.forEach((t,i)=>{
      const el=document.createElement('div');
      el.className='sat '+SHAPES[(pi+i)%SHAPES.length];
      const c=shade(p.g.color, i);  // 같은 장르 안에서 살짝 다른 명도
      el.style.setProperty('--sc', c);
      el.innerHTML=`<span class="ring2"></span><span class="bg"></span><span class="tx"><span class="t-title">${esc(t.title)}</span><span class="t-art">${esc(t.artist)}</span></span>`+
        `<span class="plays"><svg viewBox="0 0 8 8"><path d="M1 0l6 4-6 4z"/></svg>${fmt(t.plays)}</span>`;
      box.appendChild(el);
      const r=sizeOf(t.plays)/2;
      const b={el,t,pi,r,x:r+10+Math.random()*(W-2*r-20),y:r+10+Math.random()*(H-2*r-20),
        vx:(Math.random()*13+6)*(Math.random()<.5?-1:1),vy:(Math.random()*13+6)*(Math.random()<.5?-1:1)};
      bodies.push(b); applySize(b);
      el.addEventListener('click',()=>play(b));
    });
    worlds.push({box,bodies,W,H});
  });
}
function applySize(b){const d=b.r*2; b.el.style.width=d+'px'; b.el.style.height=d+'px';}
function fmt(n){ return n>=1000?(n/1000).toFixed(n>=10000?0:1).replace(/\.0$/,'')+'K':(''+n); }
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; }
function shade(hex,i){ const f=[0,1,-1,2,-2,3,-3][i%7]*0.06; const n=parseInt(hex.slice(1),16);
  let r=n>>16&255,g=n>>8&255,b=n&255; const adj=x=>Math.max(0,Math.min(255,Math.round(x+(f<0?x*f:(255-x)*f))));
  return `rgb(${adj(r)},${adj(g)},${adj(b)})`; }

// ── 재생 ──
let curBody=null, dragging=false, seekFrac=0;
const audioEl=document.getElementById('audioEl');
function flat(){ const a=[]; worlds.forEach(w=>w.bodies.forEach(b=>a.push(b))); return a; }
function play(b, fromFrac){
  if(!b.t.audioUrl){ toast('⚠️ 이 곡엔 음원이 없어요'); return; }
  curBody=b;
  document.querySelectorAll('.sat.playing').forEach(e=>e.classList.remove('playing'));
  b.el.classList.add('playing');
  const c=getComputedStyle(b.el).getPropertyValue('--sc').trim();
  const disc=document.getElementById('pbDisc'); disc.classList.add('spin'); disc.style.setProperty('--pbc',c);
  document.getElementById('pbTitle').innerHTML=esc(b.t.title)+' <small>· '+esc(b.t.artist)+'</small>';
  document.getElementById('pbPlay').textContent='⏸';
  if(audioEl.src!==b.t.audioUrl) audioEl.src=b.t.audioUrl;
  audioEl.currentTime=(fromFrac||0)*(audioEl.duration||0);
  audioEl.play().catch(()=>toast('⚠️ 재생할 수 없는 곡'));
}
function endPlay(){ if(curBody) curBody.el.classList.remove('playing'); document.getElementById('pbDisc').classList.remove('spin'); document.getElementById('pbPlay').textContent='▶'; }
audioEl.addEventListener('ended',()=>{ endPlay(); const l=flat(); if(curBody&&l.length){ const i=l.indexOf(curBody); const n=l[(i+1)%l.length]; if(n) play(n); } });
audioEl.addEventListener('pause',()=>{ if(!audioEl.ended) document.getElementById('pbPlay').textContent='▶'; });
audioEl.addEventListener('play',()=>{ document.getElementById('pbPlay').textContent='⏸'; document.getElementById('pbDisc').classList.add('spin'); });
function setProg(f){ document.getElementById('pbFill').style.width=(f*100)+'%'; document.getElementById('pbKnob').style.left=(f*100)+'%'; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1500); }
function wire(){
  document.getElementById('pbPlay').addEventListener('click',()=>{ if(!curBody){ const l=flat(); if(l.length) play(l[0]); return; } audioEl.paused?audioEl.play().catch(()=>{}):audioEl.pause(); });
  document.getElementById('pbPrev').addEventListener('click',()=>{ const l=flat(); if(!l.length)return; let i=curBody?l.indexOf(curBody):0; play(l[(i-1+l.length)%l.length]); });
  document.getElementById('pbNext').addEventListener('click',()=>{ const l=flat(); if(!l.length)return; let i=curBody?l.indexOf(curBody):-1; play(l[(i+1)%l.length]); });
  const prog=document.getElementById('pbProg');
  const frac=e=>{ const r=prog.getBoundingClientRect(); const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left; return Math.max(0,Math.min(1,x/r.width)); };
  const start=e=>{ if(!curBody)return; dragging=true; seekFrac=frac(e); setProg(seekFrac); };
  const move=e=>{ if(!dragging)return; seekFrac=frac(e); setProg(seekFrac); e.preventDefault&&e.preventDefault(); };
  const end=()=>{ if(!dragging)return; dragging=false; if(curBody) play(curBody,seekFrac); };
  prog.addEventListener('mousedown',start); window.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
  prog.addEventListener('touchstart',start,{passive:false}); window.addEventListener('touchmove',move,{passive:false}); window.addEventListener('touchend',end);
  setInterval(()=>{ if(!dragging&&audioEl.duration) setProg(audioEl.currentTime/audioEl.duration); },80);
}

// ── 물리(둥둥 + 벽/서로 튕김) ──
let last=performance.now();
function step(now){
  const dt=Math.min((now-last)/1000,.05); last=now;
  worlds.forEach(w=>{ w.W=w.box.clientWidth; w.H=w.box.clientHeight; const bs=w.bodies;
    bs.forEach(b=>{ b.x+=b.vx*dt; b.y+=b.vy*dt;
      if(b.x<b.r){b.x=b.r;b.vx=Math.abs(b.vx);} if(b.x>w.W-b.r){b.x=w.W-b.r;b.vx=-Math.abs(b.vx);}
      if(b.y<b.r){b.y=b.r;b.vy=Math.abs(b.vy);} if(b.y>w.H-b.r){b.y=w.H-b.r;b.vy=-Math.abs(b.vy);} });
    for(let a=0;a<bs.length;a++)for(let c=a+1;c<bs.length;c++){ const A=bs[a],B=bs[c];
      const dx=B.x-A.x,dy=B.y-A.y,d=Math.hypot(dx,dy)||.01,m=A.r+B.r-4;
      if(d<m){ const nx=dx/d,ny=dy/d,o=(m-d)/2; A.x-=nx*o;A.y-=ny*o;B.x+=nx*o;B.y+=ny*o;
        const an=A.vx*nx+A.vy*ny,bn=B.vx*nx+B.vy*ny,p=(bn-an)*.9; A.vx+=nx*p;A.vy+=ny*p;B.vx-=nx*p;B.vy-=ny*p; } }
    bs.forEach(b=>{ const sp=Math.hypot(b.vx,b.vy); if(sp>24){b.vx*=24/sp;b.vy*=24/sp;} if(sp<5){b.vx*=5/(sp||1);b.vy*=5/(sp||1);}
      b.el.style.transform=`translate(${(b.x-b.r).toFixed(1)}px,${(b.y-b.r).toFixed(1)}px)`; });
  });
  requestAnimationFrame(step);
}
(function stars(){ let h=''; for(let i=0;i<70;i++){ h+=`<i style="left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${(-Math.random()*3).toFixed(1)}s;"></i>`; } document.getElementById('stars').innerHTML=h; })();

(async function init(){ if(!(await loadData())) return; build(); wire(); requestAnimationFrame(step); })();
</script>
