<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>장르별 투표 (TEST)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#111; --y:#FFE800; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;}
  body{
    background:linear-gradient(170deg,#57D6F0 0%, #45CEEB 42%, #7BE0C4 100%);
    color:var(--ink);
    font-family:'Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
    padding:12px 12px 96px; min-height:100vh; overflow-x:hidden; position:relative;
  }
  /* 은은한 배경 도형 */
  .bg{position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0;}
  .bg span{position:absolute; opacity:.16;}
  .bg i{display:block; width:100%; height:100%; background:var(--c,#fff);}
  .bg .c-c i{border-radius:50%;} .bg .c-s i{border-radius:10px;}
  .bg .c-t i{clip-path:polygon(50% 0,100% 100%,0 100%);}
  header,#app{position:relative; z-index:2;}

  h1{font-family:'Black Han Sans',sans-serif; font-size:30px; margin:2px 0 0;
    color:var(--y); text-shadow:2px 3px 0 rgba(0,0,0,.22); letter-spacing:1px;}
  .sub{font-size:12.5px; color:rgba(0,0,0,.55); margin:3px 0 16px; font-weight:700;}
  .sub b{color:#0a5;}

  /* ── 장르 투표 박스 ── */
  .cat{margin:0 0 26px; position:relative;}
  .cat-head{display:flex; align-items:center; gap:8px; margin:0 0 8px 6px;}
  .cat-pill{display:inline-flex; align-items:center; gap:6px; background:#fff; color:#111; font-weight:900; font-size:15px;
    padding:7px 15px; border-radius:11px; border:2px solid #111; box-shadow:3px 3px 0 #111; position:relative; z-index:10;}
  .cat-dot{width:12px; height:12px; border-radius:50%;}
  .cat-en{font-size:10px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:rgba(0,0,0,.4);}
  .cat-cnt{margin-left:auto; margin-right:6px; font-size:11px; font-weight:800; color:rgba(0,0,0,.5);}
  .cat-box{
    border:3px dashed rgba(255,255,255,.95); border-radius:20px; margin-top:-14px;
    position:relative; overflow:hidden; aspect-ratio:1/.82; height:auto; max-height:min(50vh,360px);
    background:rgba(255,255,255,.1);
  }
  .cd-strip{position:absolute; left:0; right:0; bottom:0; z-index:9; display:flex; align-items:center; justify-content:center; gap:7px;
    padding:6px 10px 8px; background:linear-gradient(0deg, rgba(0,0,0,.28), rgba(0,0,0,0)); pointer-events:none;}
  .cd-strip .lab{font-size:10.5px; font-weight:800; color:rgba(255,255,255,.92); text-shadow:0 1px 3px rgba(0,0,0,.5);}
  .cd-strip .tm{font-family:'Black Han Sans',sans-serif; color:#fff; font-size:19px; line-height:1; text-shadow:0 2px 6px rgba(0,0,0,.55);}
  .cd-strip .tm small{font-family:'Pretendard',sans-serif; font-size:11px; font-weight:800; opacity:.9; margin-right:3px;}
  .cd-strip .colon{opacity:.55; padding:0 1px;}

  /* ── 곡 도형 ── */
  .shape{position:absolute; left:0; top:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; cursor:pointer; font-weight:800; line-height:1.2; color:#111; user-select:none; will-change:transform;}
  .shape .bg2{position:absolute; inset:0; z-index:1; background:var(--sc,#E24A9C);
    filter:drop-shadow(2px 3px 0 rgba(0,0,0,.2)); transition:filter .2s;}
  .shape .tx{position:relative; z-index:2; padding:4px; pointer-events:none;}
  .shape .t-art{font-weight:900; font-size:12px;}
  .shape .t-tag{font-weight:700; font-size:11px; opacity:.9;}
  .s-circle .bg2{border-radius:50%;}
  .s-square .bg2{border-radius:18px;}
  .s-hex .bg2{clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%);}
  .s-star .bg2{clip-path:polygon(50% 0%,71% 21%,98% 35%,84% 61%,79% 91%,50% 86%,21% 91%,16% 61%,2% 35%,29% 21%);}
  .s-star .tx{padding-top:8%;}
  .s-blob .bg2{border-radius:58% 42% 55% 45% / 48% 55% 45% 52%;}

  /* 투표수 — 흰 숫자만(배경 없음) */
  .cnt{position:absolute; top:-13px; left:50%; transform:translateX(-50%); z-index:5; display:none;
    font-family:'Black Han Sans',sans-serif; color:#fff; font-size:16px; line-height:1;
    text-shadow:0 1px 4px rgba(0,0,0,.55); white-space:nowrap; pointer-events:none;}
  .shape.show-cnt .cnt{display:block;}
  /* 1위 네온 반짝임 */
  @keyframes neon{
    0%,100%{filter:drop-shadow(2px 3px 0 rgba(0,0,0,.2)) drop-shadow(0 0 4px rgba(255,255,255,.7)) drop-shadow(0 0 9px var(--sc));}
    50%{filter:drop-shadow(2px 3px 0 rgba(0,0,0,.2)) drop-shadow(0 0 9px rgba(255,255,255,.85)) drop-shadow(0 0 18px var(--sc));}
  }
  .shape.top .bg2{animation:neon 2.2s ease-in-out infinite;}
  /* 재생중 ♪ */
  .shape .ico{position:absolute; top:-8px; left:-2px; z-index:6; font-size:17px; display:none;
    animation:bob 1s ease-in-out infinite alternate; filter:drop-shadow(1px 1px 0 rgba(0,0,0,.4));}
  .shape.playing .ico{display:block;}
  @keyframes bob{from{transform:translateY(0);}to{transform:translateY(-5px);}}
  @keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.14);}100%{transform:scale(1);}}
  .shape.pop{animation:pop .4s ease-out;}
  .plus1{position:absolute; z-index:20; font-family:'Black Han Sans',sans-serif; font-size:22px; color:var(--y);
    text-shadow:1px 2px 0 rgba(0,0,0,.5); pointer-events:none; animation:rise .8s ease-out forwards;}
  @keyframes rise{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-40px);}}

  .flag{position:fixed; top:calc(env(safe-area-inset-top) + 6px); right:8px; z-index:60;
    background:rgba(15,15,20,.72); color:#fff; font-size:10px; font-weight:800; padding:3px 8px; border-radius:20px;}

  /* ── 하단 플레이바 ── */
  .playbar{position:fixed; left:10px; right:10px; bottom:calc(env(safe-area-inset-bottom) + 10px); z-index:55;
    background:var(--ink); color:#fff; border-radius:16px; padding:9px 12px;
    display:flex; align-items:center; gap:10px; box-shadow:0 8px 24px rgba(0,0,0,.35); border:2px solid rgba(255,255,255,.12);}
  .pb-disc{width:40px; height:40px; flex:0 0 auto; border-radius:50%; position:relative; background:var(--pbc,#666);}
  .pb-disc.spin{animation:spin 2.6s linear infinite;} @keyframes spin{to{transform:rotate(360deg);}}
  .pb-disc::after{content:''; position:absolute; left:50%; top:50%; width:8px; height:8px; transform:translate(-50%,-50%); background:#111; border-radius:50%; box-shadow:0 0 0 2px rgba(255,255,255,.3);}
  .pb-info{flex:1; min-width:0;}
  .pb-title{font-weight:900; font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pb-title small{font-weight:700; opacity:.6; font-size:11px;}
  .pb-prog{height:14px; display:flex; align-items:center; margin-top:3px; cursor:pointer; touch-action:none;}
  .pb-prog .track{position:relative; height:5px; width:100%; background:rgba(255,255,255,.18); border-radius:3px;}
  .pb-prog .fill{position:absolute; left:0; top:0; height:100%; width:0%; background:var(--y); border-radius:3px;}
  .pb-prog .knob{position:absolute; top:50%; left:0%; width:13px; height:13px; border-radius:50%; background:#fff; transform:translate(-50%,-50%); box-shadow:0 1px 4px rgba(0,0,0,.5); border:2px solid var(--y);}
  .pb-btn{flex:0 0 auto; background:none; border:none; color:#fff; font-size:17px; cursor:pointer; padding:2px 3px; line-height:1;}
  .pb-btn:active{transform:scale(.88);}
  .pb-play{width:34px; height:34px; border-radius:50%; background:var(--y); color:#111; font-size:15px; display:flex; align-items:center; justify-content:center;}
  .toast{position:fixed; left:50%; bottom:82px; transform:translateX(-50%) translateY(10px); z-index:70;
    background:rgba(0,0,0,.9); color:#fff; font-size:12px; font-weight:700; padding:8px 16px; border-radius:20px;
    opacity:0; transition:opacity .2s, transform .2s; pointer-events:none;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* PC — 장르 나란히 */
  @media (min-width:769px){
    body{padding:20px 20px 100px;}
    .wrap{max-width:1200px; margin:0 auto;}
    .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:22px; align-items:start;}
    .cat{margin:0;}
    .cat-box{aspect-ratio:auto; height:420px; max-height:none;}
  }
  @media (min-width:769px) and (max-width:1099px){ .grid{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>
  <div class="bg" id="bgLayer"></div>
  <div class="wrap">
    <header>
      <h1>장르별 투표</h1>
      <p class="sub">장르 안에서 실제 곡으로 투표! <b>1위(반짝이는 도형)</b>가 눈에 띄어요 🗳 <span style="opacity:.7">· 한 번=듣기 · 두 번=투표(도형이 커져요)</span></p>
    </header>
    <div id="app" class="grid"><p style="color:rgba(0,0,0,.55);font-weight:700;font-size:13px;padding:26px 4px;grid-column:1/-1;">🎧 음악 불러오는 중…</p></div>
  </div>

  <audio id="audioEl" preload="none"></audio>
  <div class="flag">🧪 장르 투표 TEST</div>
  <div class="playbar" id="playbar">
    <div class="pb-disc" id="pbDisc"></div>
    <div class="pb-info">
      <div class="pb-title" id="pbTitle">— <small>도형을 눌러 재생 · 두 번 눌러 투표</small></div>
      <div class="pb-prog" id="pbProg"><div class="track"><div class="fill" id="pbFill"></div><div class="knob" id="pbKnob"></div></div></div>
    </div>
    <button class="pb-btn" id="pbPrev">⏮</button>
    <button class="pb-btn pb-play" id="pbPlay">▶</button>
    <button class="pb-btn" id="pbNext">⏭</button>
  </div>
  <div class="toast" id="toast"></div>

<script>
// ── 실제 사이트와 동일한 장르 정의(색 포함) ──
const GENRES=[
  {key:'발라드',en:'Ballad',color:'#7C9CFF'},{key:'댄스',en:'Dance',color:'#36E0C8'},
  {key:'힙합',en:'Hip-hop',color:'#FF6B6B'},{key:'R&B',en:'R&B',color:'#B06BFF'},
  {key:'록',en:'Rock',color:'#FF4D6D'},{key:'인디',en:'Indie',color:'#9DE05A'},
  {key:'시티팝',en:'City Pop',color:'#FF9F45'},{key:'재즈',en:'Jazz',color:'#FFC94D'},
  {key:'EDM',en:'EDM',color:'#22C3E6'},{key:'트로트',en:'Trot',color:'#FF7AC6'},
  {key:'포크',en:'Folk',color:'#8BD17C'},{key:'K-팝',en:'K-Pop',color:'#5AA9FF'},
];
function findGenre(s){ if(!s) return null; const v=String(s).trim().toLowerCase();
  return GENRES.find(g=>g.key.toLowerCase()===v||g.en.toLowerCase()===v)||null; }
function genreOf(t){ for(const tag of (t.tags||[])){ const g=findGenre(tag); if(g) return g; } return null; }
function hash(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; } return Math.abs(h); }

const SUPABASE_URL='https://vayzhmaggwpkbsrrsdqt.supabase.co';
const SUPABASE_KEY='sb_publishable_1PxNV0BGL7Wy_strTMqnbA_pCBCsOPG';
async function fetchTracks(){
  const cols='id,title,tags,audio_url,likes_count,profiles(name)';
  const url=`${SUPABASE_URL}/rest/v1/tracks?select=${encodeURIComponent(cols)}&order=created_at.desc&limit=200`;
  const r=await fetch(url,{headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY}});
  if(!r.ok) throw new Error('fetch '+r.status);
  return (await r.json()).map(row=>({
    id:row.id, title:row.title||'제목 없음', artist:(row.profiles&&row.profiles.name)||'익명',
    tags:Array.isArray(row.tags)?row.tags:[], audioUrl:row.audio_url||'', v:row.likes_count||0
  }));
}

let CATS=[];
async function loadData(){
  try{
    const tracks=await fetchTracks();
    const byGenre={};
    tracks.forEach(t=>{
      let g=genreOf(t);
      if(!g) g=GENRES[hash(t.id)%6];   // 장르 태그 없는 곡 → 시안용 임의 배정
      (byGenre[g.key]=byGenre[g.key]||{g,items:[]}).items.push(t);
    });
    CATS=Object.values(byGenre).filter(p=>p.items.length>=2)
      .sort((a,b)=>b.items.length-a.items.length)
      .map(p=>({g:p.g, items:p.items.slice(0,6), total:p.items.length}));
    if(!CATS.length) throw new Error('no data');
  }catch(e){ document.getElementById('app').innerHTML='<p style="color:rgba(0,0,0,.6);padding:26px 4px;grid-column:1/-1;font-weight:700;">⚠️ 음악을 불러오지 못했어요.</p>'; return false; }
  return true;
}

// 크기 = 순위 기본 + 투표수 보너스 (현재 투표 방식 유지: 투표하면 커짐)
const SIZE_STEPS=[124,106,94,84,76,70];
function sizeOf(v,idx){ return Math.min(SIZE_STEPS[Math.min(idx||0,SIZE_STEPS.length-1)]+v*4, 150); }
function fontOf(d){ return Math.max(10, Math.min(d*0.135,17)); }
const SHAPES=['s-circle','s-star','s-hex','s-square','s-blob'];
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function shade(hex,i){ const f=[0,1,-1,2,-2,3][i%6]*0.08; const n=parseInt(hex.slice(1),16);
  let r=n>>16&255,g=n>>8&255,b=n&255; const adj=x=>Math.max(0,Math.min(255,Math.round(x+(f<0?x*f:(255-x)*f))));
  return `rgb(${adj(r)},${adj(g)},${adj(b)})`; }

const worlds=[];
function build(){
  const app=document.getElementById('app');
  app.innerHTML=CATS.map((c,ci)=>{
    const extra=c.total>c.items.length?` <span style="opacity:.6">(+${c.total-c.items.length})</span>`:'';
    return `<section class="cat">
      <div class="cat-head">
        <span class="cat-pill"><span class="cat-dot" style="background:${c.g.color}"></span>${c.g.key} 투표</span>
        <span class="cat-en">${c.g.en}</span>
        <span class="cat-cnt">${c.total}곡${extra}</span>
      </div>
      <div class="cat-box" id="box${ci}"><div class="cd-strip"><span class="lab">투표 마감까지</span><span class="tm" id="cd${ci}">—</span></div></div>
    </section>`;
  }).join('');
  CATS.forEach((c,ci)=>{
    const box=document.getElementById('box'+ci), W=box.clientWidth||320, H=box.clientHeight||300, bodies=[];
    c.items.forEach((t,i)=>{
      const el=document.createElement('div');
      el.className='shape '+SHAPES[(ci+i)%SHAPES.length];
      el.style.setProperty('--sc', shade(c.g.color,i));
      const tag=(t.tags||[]).find(x=>!findGenre(x))||'';
      el.innerHTML=`<span class="bg2"></span><span class="ico">🎵</span><span class="tx"><span class="t-art">${esc(t.artist)}</span>${tag?'<br><span class="t-tag">#'+esc(tag)+'</span>':''}</span><span class="cnt">${t.v}</span>`;
      box.appendChild(el);
      const r=sizeOf(t.v,i)/2;
      const b={el,t,ci,idx:i,r,tr:r,x:r+8+Math.random()*(W-2*r-16),y:r+8+Math.random()*(H-2*r-16),
        vx:(Math.random()*14+6)*(Math.random()<.5?-1:1),vy:(Math.random()*14+6)*(Math.random()<.5?-1:1)};
      bodies.push(b); applySize(b);
      let ct=null;
      el.addEventListener('click',()=>{ if(ct){clearTimeout(ct);ct=null;vote(b);} else {ct=setTimeout(()=>{ct=null;play(b);},260);} });
    });
    worlds.push({box,bodies,W,H}); updateRanks(ci);
  });
}
function applySize(b){const d=b.r*2; b.el.style.width=d+'px'; b.el.style.height=d+'px'; b.el.style.fontSize=fontOf(d)+'px';}
function updateRanks(ci){
  const w=worlds[ci]; if(!w) return;
  const sorted=[...w.bodies].sort((a,b)=>b.t.v-a.t.v);
  w.bodies.forEach(b=>{ const rank=sorted.indexOf(b);
    b.el.classList.toggle('top',rank===0); b.el.classList.toggle('show-cnt',rank<2);
    const c=b.el.querySelector('.cnt'); if(c) c.textContent=b.t.v; });
}
function vote(b){
  b.t.v++; b.tr=sizeOf(b.t.v,b.idx)/2;
  b.el.classList.remove('pop'); void b.el.offsetWidth; b.el.classList.add('pop');
  const w=worlds[b.ci], p=document.createElement('div'); p.className='plus1'; p.textContent='+1';
  p.style.left=(b.x-8)+'px'; p.style.top=(b.y-b.r-26)+'px'; w.box.appendChild(p); setTimeout(()=>p.remove(),800);
  updateRanks(b.ci);
}

// ── 재생 ──
let curBody=null, dragging=false, seekFrac=0;
const audioEl=document.getElementById('audioEl');
function flat(){ const a=[]; worlds.forEach(w=>w.bodies.forEach(b=>a.push(b))); return a; }
function play(b, fromFrac){
  if(!b.t.audioUrl){ toast('⚠️ 이 곡엔 음원이 없어요'); return; }
  curBody=b;
  document.querySelectorAll('.shape.playing').forEach(e=>e.classList.remove('playing'));
  b.el.classList.add('playing');
  const c=getComputedStyle(b.el).getPropertyValue('--sc').trim();
  const disc=document.getElementById('pbDisc'); disc.classList.add('spin'); disc.style.setProperty('--pbc',c);
  document.getElementById('pbTitle').innerHTML=esc(b.t.artist)+' <small>「'+esc(b.t.title)+'」</small>';
  document.getElementById('pbPlay').textContent='⏸';
  if(audioEl.src!==b.t.audioUrl) audioEl.src=b.t.audioUrl;
  audioEl.currentTime=(fromFrac||0)*(audioEl.duration||0);
  audioEl.play().catch(()=>toast('⚠️ 재생할 수 없는 곡'));
}
function endPlay(){ if(curBody) curBody.el.classList.remove('playing'); document.getElementById('pbDisc').classList.remove('spin'); document.getElementById('pbPlay').textContent='▶'; }
audioEl.addEventListener('ended',()=>{ endPlay(); const l=flat(); if(curBody&&l.length){ const i=l.indexOf(curBody); const n=l[(i+1)%l.length]; if(n) play(n); } });
audioEl.addEventListener('pause',()=>{ if(!audioEl.ended) document.getElementById('pbPlay').textContent='▶'; });
audioEl.addEventListener('play',()=>{ document.getElementById('pbPlay').textContent='⏸'; document.getElementById('pbDisc').classList.add('spin'); if(curBody) curBody.el.classList.add('playing'); });
function setProg(f){ document.getElementById('pbFill').style.width=(f*100)+'%'; document.getElementById('pbKnob').style.left=(f*100)+'%'; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1500); }
function wire(){
  document.getElementById('pbPlay').addEventListener('click',()=>{ if(!curBody){ const l=flat(); if(l.length) play(l[0]); return; } audioEl.paused?audioEl.play().catch(()=>{}):audioEl.pause(); });
  document.getElementById('pbPrev').addEventListener('click',()=>{ const l=flat(); if(!l.length)return; let i=curBody?l.indexOf(curBody):0; play(l[(i-1+l.length)%l.length]); });
  document.getElementById('pbNext').addEventListener('click',()=>{ const l=flat(); if(!l.length)return; let i=curBody?l.indexOf(curBody):-1; play(l[(i+1)%l.length]); });
  const prog=document.getElementById('pbProg');
  const frac=e=>{ const r=prog.getBoundingClientRect(); const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left; return Math.max(0,Math.min(1,x/r.width)); };
  const start=e=>{ if(!curBody)return; dragging=true; seekFrac=frac(e); setProg(seekFrac); };
  const move=e=>{ if(!dragging)return; seekFrac=frac(e); setProg(seekFrac); e.preventDefault&&e.preventDefault(); };
  const end=()=>{ if(!dragging)return; dragging=false; if(curBody) play(curBody,seekFrac); };
  prog.addEventListener('mousedown',start); window.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
  prog.addEventListener('touchstart',start,{passive:false}); window.addEventListener('touchmove',move,{passive:false}); window.addEventListener('touchend',end);
  setInterval(()=>{ if(!dragging&&audioEl.duration) setProg(audioEl.currentTime/audioEl.duration); },80);
}

// ── 물리 ──
let last=performance.now();
function step(now){
  const dt=Math.min((now-last)/1000,.05); last=now;
  worlds.forEach(w=>{ w.W=w.box.clientWidth; w.H=w.box.clientHeight; const bs=w.bodies;
    bs.forEach(b=>{ if(Math.abs(b.tr-b.r)>0.3){b.r+=(b.tr-b.r)*0.08;applySize(b);}
      b.x+=b.vx*dt; b.y+=b.vy*dt;
      if(b.x<b.r){b.x=b.r;b.vx=Math.abs(b.vx);} if(b.x>w.W-b.r){b.x=w.W-b.r;b.vx=-Math.abs(b.vx);}
      if(b.y<b.r+6){b.y=b.r+6;b.vy=Math.abs(b.vy);} if(b.y>w.H-b.r-6){b.y=w.H-b.r-6;b.vy=-Math.abs(b.vy);} });
    for(let a=0;a<bs.length;a++)for(let c=a+1;c<bs.length;c++){ const A=bs[a],B=bs[c];
      const dx=B.x-A.x,dy=B.y-A.y,d=Math.hypot(dx,dy)||.01,m=A.r+B.r-6;
      if(d<m){ const nx=dx/d,ny=dy/d,o=(m-d)/2; A.x-=nx*o;A.y-=ny*o;B.x+=nx*o;B.y+=ny*o;
        const an=A.vx*nx+A.vy*ny,bn=B.vx*nx+B.vy*ny,p=(bn-an)*.9; A.vx+=nx*p;A.vy+=ny*p;B.vx-=nx*p;B.vy-=ny*p; } }
    bs.forEach(b=>{ const sp=Math.hypot(b.vx,b.vy); if(sp>26){b.vx*=26/sp;b.vy*=26/sp;} if(sp<6){b.vx*=6/(sp||1);b.vy*=6/(sp||1);}
      b.el.style.transform=`translate(${(b.x-b.r).toFixed(1)}px,${(b.y-b.r).toFixed(1)}px)`; });
  });
  requestAnimationFrame(step);
}
// 배경 도형
(function bgDeco(){
  const COL=['#E24A9C','#7FB2EC','#86CE34','#B49BEE','#F06CA8','#FFB03A','#FFFFFF']; const CL=['c-c','c-s','c-t'];
  let h=''; for(let i=0;i<9;i++){ const cl=CL[i%3],c=COL[i%COL.length],w=60+Math.random()*90;
    h+=`<span class="${cl}" style="width:${w}px;height:${w}px;left:${Math.random()*90}%;top:${Math.random()*92}%;--c:${c};transform:rotate(${(Math.random()*40-20)|0}deg);"><i></i></span>`; }
  document.getElementById('bgLayer').innerHTML=h;
})();
// 카운트다운 (이달 말일까지)
(function cd(){
  const now0=new Date(), end=new Date(now0.getFullYear(),now0.getMonth()+1,1,0,0,0);
  const p=n=>String(n).padStart(2,'0');
  function tick(){ let s=Math.max(0,Math.floor((end-new Date())/1000));
    const d=Math.floor(s/86400); s-=d*86400; const h=Math.floor(s/3600); s-=h*3600; const m=Math.floor(s/60); s-=m*60;
    const html=(d>0?`<small>D-${d}</small>`:'')+p(h)+'<span class="colon">:</span>'+p(m)+'<span class="colon">:</span>'+p(s);
    CATS.forEach((c,ci)=>{ const el=document.getElementById('cd'+ci); if(el) el.innerHTML=html; }); }
  tick(); setInterval(tick,1000);
})();

(async function init(){ if(!(await loadData())) return; build(); wire(); requestAnimationFrame(step); })();
