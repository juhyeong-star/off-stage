<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>프로듀싱 게시판 — 테스트</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #07060d; color: #F4F4F7; font-family: 'Pretendard', sans-serif; max-width: 440px; margin: 0 auto; padding-bottom: 30px; }
  .testbar { background: #1a1530; border-bottom: 1px solid rgba(167,139,250,.3); color: #C9C4F5; font-size: 11px; font-weight: 800; text-align: center; padding: 7px; line-height: 1.4; }

  .top { display: flex; align-items: center; gap: 10px; padding: 12px 14px; position: sticky; top: 0; background: rgba(7,6,13,.82); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); z-index: 20; }
  .top i { font-size: 22px; } .top-t { font-size: 16px; font-weight: 900; } .top-sp { margin-left: auto; }
  .seg { display: flex; gap: 6px; background: #14111f; border-radius: 12px; padding: 4px; margin: 8px 14px 16px; }
  .seg b { flex: 1; text-align: center; padding: 8px; border-radius: 9px; font-size: 12.5px; font-weight: 800; color: rgba(255,255,255,.5); cursor: pointer; }
  .seg b.on { background: #2a2440; color: #fff; }

  .card { margin: 0 14px 34px; }
  .cover { position: relative; height: 174px; border-radius: 20px; overflow: hidden; display: flex; align-items: flex-end; }
  .cover.g1 { background: linear-gradient(150deg, #6d28d9, #db2777 70%, #7c3aed); }
  .cover.g2 { background: linear-gradient(150deg, #0ea5b7, #6d28d9 75%, #db2777); }
  .cover.g3 { background: linear-gradient(150deg, #db2777, #7c3aed 70%, #0ea5b7); }
  .cover::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(7,6,13,.85), transparent 55%); }
  .cover-face { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); font-size: 60px; opacity: .92; filter: drop-shadow(0 0 16px rgba(236,72,153,.55)); }
  .cover-tag { position: absolute; top: 12px; right: 12px; font-size: 10px; font-weight: 800; background: rgba(0,0,0,.4); -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); padding: 5px 10px; border-radius: 999px; }
  .song { position: relative; z-index: 1; display: flex; align-items: center; gap: 10px; padding: 14px; width: 100%; }
  .song-ic { width: 40px; height: 40px; border-radius: 11px; background: linear-gradient(135deg,#c9c4f5,#8b7cf6); display: flex; align-items: center; justify-content: center; font-size: 19px; color: #1a1030; flex-shrink: 0; }
  .song-t { font-size: 16px; font-weight: 900; } .song-s { font-size: 11px; color: rgba(255,255,255,.55); }

  .q { text-align: center; font-size: 13.5px; font-weight: 800; color: rgba(255,255,255,.82); margin: 16px 0 12px; }
  .vs { display: flex; align-items: stretch; }
  .opt { flex: 1; border-radius: 18px; padding: 15px 12px 14px; text-align: center; position: relative; cursor: pointer; border: 1.5px solid transparent; transition: all .18s; }
  .opt.a { background: radial-gradient(120% 100% at 50% 0%, rgba(34,211,238,.22), rgba(34,211,238,.06)); border-color: rgba(34,211,238,.5); }
  .opt.b { background: radial-gradient(120% 100% at 50% 0%, rgba(251,73,138,.22), rgba(251,73,138,.06)); border-color: rgba(251,73,138,.5); }
  .opt.on { transform: translateY(-2px); }
  .opt.a.on { border-color: #22d3ee; box-shadow: 0 0 26px rgba(34,211,238,.4); }
  .opt.b.on { border-color: #fb498a; box-shadow: 0 0 26px rgba(251,73,138,.4); }
  .opt-badge { font-size: 12px; font-weight: 900; } .opt.a .opt-badge { color: #22d3ee; } .opt.b .opt-badge { color: #fb6f92; }
  .opt-play { width: 52px; height: 52px; border-radius: 50%; margin: 10px auto 9px; display: flex; align-items: center; justify-content: center; font-size: 23px; }
  .opt.a .opt-play { background: #22d3ee; color: #06222b; box-shadow: 0 0 20px rgba(34,211,238,.5); }
  .opt.b .opt-play { background: #fb498a; color: #3b0a1e; box-shadow: 0 0 20px rgba(251,73,138,.5); }
  .opt.simple { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 118px; }
  .opt-name { font-size: 13.5px; font-weight: 800; } .opt-name.big { font-size: 19px; font-weight: 900; margin-top: 8px; }
  .opt-wave { display: flex; align-items: center; gap: 9px; margin-top: 11px; background: rgba(0,0,0,.3); border-radius: 10px; padding: 7px 9px; }
  .opt-wave i { font-size: 14px; opacity: .85; } .opt-wave .wf { flex: 1; height: 15px; background: repeating-linear-gradient(90deg, currentColor 0 2px, transparent 2px 4px); opacity: .5; border-radius: 2px; }
  .opt.a .opt-wave { color: #22d3ee; } .opt.b .opt-wave { color: #fb6f92; }
  .vsmid { display: flex; align-items: center; padding: 0 6px; font-size: 13px; font-weight: 900; color: rgba(255,255,255,.45); }

  .pct-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .pct { flex: 1; } .pct-bar { height: 8px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; } .pct-bar > span { display: block; height: 100%; border-radius: 999px; transition: width .5s; }
  .pct.a .pct-bar > span { background: #22d3ee; } .pct.b .pct-bar > span { background: #fb498a; }
  .pct-n { font-size: 13px; font-weight: 900; margin-top: 5px; } .pct.a .pct-n { color: #22d3ee; text-align: left; } .pct.b .pct-n { color: #fb6f92; text-align: right; }
  .blindbar { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 14px; font-size: 11.5px; font-weight: 700; color: rgba(255,255,255,.5); background: rgba(255,255,255,.04); border: 1px dashed rgba(255,255,255,.14); border-radius: 12px; padding: 11px; }
  .blindbar i { color: #C9C4F5; }

  .voices { margin-top: 20px; }
  .voices-h { display: flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 900; margin-bottom: 4px; } .voices-h i { color: #fb6f92; }
  .voices-s { font-size: 10.5px; color: rgba(255,255,255,.45); margin-bottom: 10px; }
  .cmt { display: flex; gap: 10px; padding: 9px 2px; align-items: flex-start; }
  .cmt-av { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; }
  .cmt-bd { flex: 1; min-width: 0; } .cmt-u { font-size: 11px; font-weight: 700; color: rgba(255,255,255,.6); } .cmt-u .top1 { color: #FFD166; font-size: 9px; font-weight: 900; margin-left: 5px; background: rgba(255,209,102,.14); padding: 1px 6px; border-radius: 999px; }
  .cmt-t { font-size: 13px; margin-top: 1px; line-height: 1.4; }
  .cmt-like { display: flex; flex-direction: column; align-items: center; gap: 1px; flex-shrink: 0; cursor: pointer; }
  .cmt-like i { font-size: 18px; color: rgba(255,255,255,.4); } .cmt-like.on i { color: #fb6f92; } .cmt-like b { font-size: 10px; font-weight: 800; }
  .cmt-pct { font-size: 9.5px; color: rgba(255,255,255,.4); }
  .more { text-align: center; font-size: 12px; font-weight: 700; color: rgba(255,255,255,.5); padding: 9px; cursor: pointer; }
  .vote-cta { width: 100%; border: none; border-radius: 14px; padding: 13px; margin-top: 11px; font-family: inherit; font-size: 14px; font-weight: 800; color: #fff; background: linear-gradient(135deg, #a855f7, #d946b8); box-shadow: 0 6px 22px rgba(168,85,247,.38); cursor: pointer; }

  .sheet-back { position: fixed; inset: 0; background: rgba(0,0,0,.55); opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 60; }
  .sheet-back.on { opacity: 1; pointer-events: auto; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; max-width: 440px; margin: 0 auto; height: 76vh; background: #100d18; border-radius: 22px 22px 0 0; transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); z-index: 61; display: flex; flex-direction: column; }
  .sheet.on { transform: translateY(0); }
  .sheet-grab { width: 38px; height: 4px; border-radius: 999px; background: rgba(255,255,255,.25); margin: 9px auto 4px; }
  .sheet-h { text-align: center; font-size: 13px; font-weight: 800; padding: 6px 0 10px; border-bottom: 1px solid rgba(255,255,255,.07); position: relative; }
  .sheet-h .x { position: absolute; right: 14px; top: 4px; font-size: 20px; color: rgba(255,255,255,.6); cursor: pointer; }
  .sheet-list { flex: 1; overflow-y: auto; padding: 6px 14px; }
  .sheet-hint { font-size: 10.5px; color: #fb6f92; text-align: center; padding: 8px; background: rgba(251,111,146,.08); border-radius: 10px; margin: 8px 0 4px; }
  .sheet-add { display: flex; gap: 9px; align-items: center; padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,.07); }
  .sheet-add input { flex: 1; background: #1b1726; border: 1px solid rgba(255,255,255,.1); border-radius: 999px; padding: 11px 15px; color: #fff; font-family: inherit; font-size: 13px; }
  .sheet-add button { border: none; background: none; color: #8b7cf6; font-weight: 800; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
  <div class="testbar">🧪 테스트 — 주절주절 자리 '프로듀싱' 게시판 · 음원버전 + 간단투표(의상 등) 둘 다 · 댓글=인스타창</div>

  <div class="top"><i class="ri-arrow-left-line"></i><span class="top-t">🎬 프로듀싱</span><i class="ri-search-line top-sp"></i></div>
  <div class="seg"><b class="on" onclick="setSeg(this,true)">🔥 진행 중</b><b onclick="setSeg(this,false)">🏁 마감</b></div>

  <div id="feed"></div>

  <div class="sheet-back" id="sheetBack" onclick="closeSheet()"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-grab"></div>
    <div class="sheet-h" id="sheetH">댓글<span class="x" onclick="closeSheet()"><i class="ri-close-line"></i></span></div>
    <div class="sheet-hint">💡 하트 1등 댓글이 <b>제안 배틀(C안)</b>에 올라가요</div>
    <div class="sheet-list" id="sheetList"></div>
    <div class="sheet-add"><input id="newCmt" placeholder="의견 남기기…" maxlength="500"><button onclick="addCmt()">게시</button></div>
  </div>

<script>
  var rounds = [
    { id:'r1', g:'g1', face:'👩‍🎤', tag:'데모 2 · 음원', song:'Plastic Days', ver:'(v2.1)', sub:'서실음 3학년 · THUNDER',
      q:'후렴, 어떤 버전으로 갈까요?',
      options:[{key:'a',name:'몽환 신스 버전',audio:true,v:312},{key:'b',name:'펑키 기타 버전',audio:true,v:235}],
      comments:[
        {id:'c1',u:'사현',t:'A안이 훨씬 칼답! 후렴 킬 베이스 취기좀',likes:330,c:'#fb6f92'},
        {id:'c2',u:'존모',t:'신낭염 기타 좀 솎오면 이떼요?',likes:76,c:'#22d3ee'},
        {id:'c3',u:'민',t:'B안 살리되 드럼만 더 단단하게',likes:54,c:'#FFD166'},
        {id:'c4',u:'하루',t:'2절만 A, 1절은 B 섞는 건?',likes:33,c:'#8b7cf6'}
      ], myVote:null },
    { id:'r2', g:'g2', face:'🎛️', tag:'편곡 · 간단투표', song:'Plastic Days', ver:'(다음 데모)', sub:'서실음 3학년 · THUNDER',
      q:'2절에 뭐 더 넣을까?',
      options:[{key:'a',name:'드럼 추가',audio:false,v:140},{key:'b',name:'기타 추가',audio:false,v:121}],
      comments:[
        {id:'e1',u:'지호',t:'드럼 들어가면 후반 떡상',likes:48,c:'#fb6f92'},
        {id:'e2',u:'민',t:'기타 솔로 한 번만 더 ㅠ',likes:39,c:'#22d3ee'},
        {id:'e3',u:'서연',t:'둘 다 넣고 1절은 비우자',likes:27,c:'#FFD166'}
      ], myVote:null },
    { id:'r3', g:'g3', face:'🎤', tag:'공연 · 간단투표', song:'졸업 공연', ver:'', sub:'서실음 3학년 · THUNDER',
      q:'무대 의상 뭐 입을까?',
      options:[{key:'a',name:'빨간 옷',audio:false,v:88},{key:'b',name:'파란 옷',audio:false,v:102}],
      comments:[
        {id:'d1',u:'지호',t:'빨간 옷이 조명 받으면 미쳤을듯',likes:54,c:'#fb6f92'},
        {id:'d2',u:'서연',t:'반반! 상의 빨강 하의 파랑 ㄱ',likes:61,c:'#22d3ee'},
        {id:'d3',u:'민',t:'무대 배경이 파랑이면 빨강이 튐',likes:22,c:'#FFD166'}
      ], myVote:null }
  ];
  var blind = true, activeRound = null;
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function R(id){ return rounds.find(function(r){return r.id===id;}); }

  function setSeg(el, isLive){ document.querySelectorAll('.seg b').forEach(function(b){b.classList.remove('on');}); el.classList.add('on'); blind=isLive; rounds.forEach(function(r){r.myVote=null;}); render(); }

  function optHtml(r, o){
    var on = r.myVote===o.key;
    var inner = o.audio
      ? '<div class="opt-play"><i class="ri-play-fill"></i></div><div class="opt-name">'+esc(o.name)+'</div><div class="opt-wave"><i class="ri-play-mini-fill"></i><span class="wf"></span></div>'
      : '<div class="opt-name big">'+esc(o.name)+'</div>';
    return '<div class="opt '+o.key+(o.audio?'':' simple')+(on?' on':'')+'" onclick="vote(\''+r.id+'\',\''+o.key+'\')"><div class="opt-badge">'+o.key.toUpperCase()+'안</div>'+inner+'</div>';
  }
  function pctHtml(r){
    if(blind) return '<div class="blindbar"><i class="ri-eye-off-line"></i> 투표 중이라 결과는 가려져 있어요 · 마감 후 공개</div>';
    var a=r.options[0].v, b=r.options[1].v, ap=Math.round(a/(a+b)*100), bp=100-ap;
    return '<div class="pct-row"><div class="pct a"><div class="pct-bar"><span style="width:'+ap+'%"></span></div><div class="pct-n">'+ap+'%</div></div><div class="pct b"><div class="pct-bar"><span style="width:'+bp+'%;margin-left:auto"></span></div><div class="pct-n">'+bp+'%</div></div></div>';
  }
  function cmtRow(r, c, total, full){
    var on=r.myVote===c.id, pct=Math.round(c.likes/total*100);
    return '<div class="cmt"><div class="cmt-av" style="background:'+c.c+'">'+esc(c.u[0])+'</div>'
      +'<div class="cmt-bd"><div class="cmt-u">'+esc(c.u)+(c.top?'<span class="top1">🏆 배틀 합류</span>':'')+'</div><div class="cmt-t">'+esc(c.t)+'</div></div>'
      +'<div class="cmt-like'+(on?' on':'')+'" onclick="event.stopPropagation(); likeCmt(\''+r.id+'\',\''+c.id+'\')"><i class="'+(on?'ri-heart-3-fill':'ri-heart-3-line')+'"></i><b>'+c.likes+'</b>'+(!blind&&full?'<span class="cmt-pct">'+pct+'%</span>':'')+'</div></div>';
  }
  function cardHtml(r){
    var total=r.options[0].v+r.options[1].v+r.comments.reduce(function(s,c){return s+c.likes;},0);
    var sorted=r.comments.slice().sort(function(a,b){return b.likes-a.likes;});
    sorted.forEach(function(c,i){c.top=(i===0);});
    var top3=sorted.slice(0,3).map(function(c){return cmtRow(r,c,total,false);}).join('');
    return '<div class="card" data-r="'+r.id+'">'
      +'<div class="cover '+r.g+'"><div class="cover-face">'+r.face+'</div><div class="cover-tag">'+r.tag+'</div>'
        +'<div class="song"><div class="song-ic"><i class="ri-disc-line"></i></div><div><div class="song-t">'+esc(r.song)+' <span style="font-size:12px;color:rgba(255,255,255,.55)">'+r.ver+'</span></div><div class="song-s">'+esc(r.sub)+'</div></div></div></div>'
      +'<div class="q">'+esc(r.q)+'</div>'
      +'<div class="vs">'+optHtml(r,r.options[0])+'<div class="vsmid">VS</div>'+optHtml(r,r.options[1])+'</div>'
      +pctHtml(r)
      +'<div class="voices"><div class="voices-h"><i class="ri-chat-heart-fill"></i> 우리의 목소리 <span style="margin-left:auto;font-size:11px;color:rgba(255,255,255,.45);font-weight:600">'+r.comments.length+'</span></div>'
      +'<div class="voices-s">A·B 말고 다른 의견? 하트 1등은 <b style="color:#FFD166">제안 배틀(C안)</b>로 합류!</div>'+top3
      +'<div class="more" onclick="openSheet(\''+r.id+'\')">댓글 '+r.comments.length+'개 모두 보기 ▾</div></div>'
      +'<button class="vote-cta" onclick="openSheet(\''+r.id+'\')"><i class="ri-quill-pen-line"></i> 이 데모에 의견 투지하기</button></div>';
  }
  function render(){
    document.getElementById('feed').innerHTML = rounds.map(cardHtml).join('');
    if(activeRound){ renderSheet(); }
  }
  function renderSheet(){
    var r=R(activeRound); if(!r) return;
    var total=r.options[0].v+r.options[1].v+r.comments.reduce(function(s,c){return s+c.likes;},0);
    var sorted=r.comments.slice().sort(function(a,b){return b.likes-a.likes;});
    sorted.forEach(function(c,i){c.top=(i===0);});
    document.getElementById('sheetH').firstChild.textContent='댓글 '+r.comments.length+' ';
    document.getElementById('sheetList').innerHTML=sorted.map(function(c){return cmtRow(r,c,total,true);}).join('');
  }
  function vote(rid, side){
    var r=R(rid); if(r.myVote===side){r.myVote=null;} else { r.myVote=side; } render();
  }
  function likeCmt(rid, id){
    var r=R(rid), c=r.comments.find(function(x){return x.id===id;}); if(!c)return;
    if(r.myVote===id){c.likes--; r.myVote=null;}
    else { if(r.myVote&&r.myVote!=='a'&&r.myVote!=='b'){var pc=r.comments.find(function(x){return x.id===r.myVote;}); if(pc)pc.likes--;} c.likes++; r.myVote=id; }
    render();
  }
  function addCmt(){ var r=R(activeRound); if(!r)return; var v=(document.getElementById('newCmt').value||'').trim(); if(!v)return; var id='n'+(r.comments.length+1); r.comments.push({id:id,u:'나',t:v,likes:1,c:'#a78bfa'}); document.getElementById('newCmt').value=''; r.myVote=id; render(); document.getElementById('sheetList').scrollTop=0; }
  function openSheet(rid){ activeRound=rid; renderSheet(); document.getElementById('sheetBack').classList.add('on'); document.getElementById('sheet').classList.add('on'); }
  function closeSheet(){ document.getElementById('sheetBack').classList.remove('on'); document.getElementById('sheet').classList.remove('on'); activeRound=null; }

  render();
</script>
</body>
</html>
